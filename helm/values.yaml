# NovaNas umbrella chart default values.
# Values are opinionated defaults for a single-node k3s appliance but all
# image registries, replica counts, and resource limits are overridable.
# See values/values-{dev,beta,production}.yaml for channel-specific overrides.

global:
  # Registry prefix applied to all NovaNas-owned images (api, ui, operators,
  # storage-*). Subcharts publish their own images via their own values.
  imageRegistry: ghcr.io/azrtydxb
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []
  clusterName: novanas
  # Default StorageClass created by the storage chart and consumed by all
  # PersistentVolumeClaims unless overridden at the component level.
  storageClass: novanas-default
  # mDNS domain advertised by the discovery DaemonSet (Avahi/SSDP).
  mdnsDomain: nas.local
  # Public hostname is optional; if unset the UI is reachable via mDNS only.
  publicHostname: ""
  # PodSecurityStandards level enforced on user namespaces.
  psaProfile: restricted

namespaces:
  system: novanas-system
  appsSystem: novanas-apps-system
  vms: novanas-vms
  # users is a prefix; per-user namespaces are created at runtime by the
  # operator as novanas-user-<uid>.
  users: novanas-users

# -----------------------------------------------------------------------------
# NovaNas-owned workloads
# -----------------------------------------------------------------------------

api:
  enabled: true
  image:
    repository: novanas/api
    tag: ""  # defaults to .Chart.AppVersion
    pullPolicy: ""
  replicas: 1
  # Browser-facing base URL the api uses to build its OIDC callback URL
  # (returned to the SPA in /api/v1/auth/login responses). Empty →
  # derived from ingress.host (recommended).
  publicUrl: ""
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  env:
    NODE_ENV: production
    LOG_LEVEL: info
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: true
    className: novaedge
    hostOverride: ""
  serviceMonitor:
    enabled: true
    interval: 30s

ui:
  enabled: true
  image:
    repository: novanas/ui
    tag: ""
    pullPolicy: ""
  replicas: 1
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: true
    className: novaedge
    hostOverride: ""

operators:
  enabled: true
  image:
    repository: novanas/operators
    tag: ""
    pullPolicy: ""
  replicas: 1
  leaderElect: true
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  metricsPort: 8080
  healthPort: 8081
  serviceMonitor:
    enabled: true
    interval: 30s

# -----------------------------------------------------------------------------
# Storage control plane + data plane
# -----------------------------------------------------------------------------
storage:
  meta:
    enabled: true
    image:
      repository: novanas/storage-meta
      tag: ""
    replicas: 1
    resources:
      requests: { cpu: "200m", memory: "512Mi" }
      limits:   { cpu: "2",    memory: "4Gi" }
    persistence:
      enabled: true
      size: 20Gi
      storageClass: ""  # hostPath fallback if empty
    # Metadata-as-chunks mode is a forward-looking scheme (see A4). Default off.
    chunkBacked:
      enabled: false
      minMetadataDisks: 1
      bootstrapTimeout: 120s
    encryption:
      mode: "off"  # off | mandatory
    service:
      grpcPort: 9100
  agent:
    enabled: true
    image:
      repository: novanas/storage-agent
      tag: ""
    resources:
      requests: { cpu: "100m", memory: "256Mi" }
      limits:   { cpu: "2",    memory: "2Gi" }
    # Host path where chunk files are persisted on each node.
    dataDir: /var/lib/novanas/chunks
    service:
      grpcPort: 9200
  csi:
    enabled: true
    controller:
      image:
        repository: novanas/storage-csi
        tag: ""
      replicas: 1
      resources:
        requests: { cpu: "50m",  memory: "128Mi" }
        limits:   { cpu: "500m", memory: "512Mi" }
    node:
      image:
        repository: novanas/storage-csi
        tag: ""
      resources:
        requests: { cpu: "50m",  memory: "64Mi" }
        limits:   { cpu: "500m", memory: "256Mi" }
  controller:
    enabled: true
    image:
      repository: novanas/storage-controller
      tag: ""
    replicas: 1
    resources:
      requests: { cpu: "100m", memory: "128Mi" }
      limits:   { cpu: "500m", memory: "512Mi" }
  scheduler:
    enabled: true
    image:
      repository: novanas/storage-scheduler
      tag: ""
    replicas: 1
  webhook:
    enabled: true
    image:
      repository: novanas/storage-webhook
      tag: ""
    replicas: 1
  s3gw:
    enabled: true
    image:
      repository: novanas/storage-s3gw
      tag: ""
    replicas: 1
    service:
      port: 8333
    resources:
      requests: { cpu: "100m", memory: "256Mi" }
      limits:   { cpu: "2",    memory: "2Gi" }
  dataplane:
    # SPDK dataplane pod. Requires hugepages + SYS_ADMIN on the host.
    # Default disabled until the host is prepared (see os/ chart from A5-OS).
    enabled: false
    image:
      repository: novanas/storage-dataplane
      tag: ""
    hugepages:
      size: 2Mi
      requests: 1Gi
    resources:
      requests: { cpu: "1", memory: "1Gi" }
      limits:   { cpu: "4", memory: "4Gi" }
  storageClass:
    name: novanas-default
    isDefault: true
    reclaimPolicy: Delete

# -----------------------------------------------------------------------------
# Access protocols
# -----------------------------------------------------------------------------

smb:
  enabled: true
  image:
    repository: novanas/samba
    tag: ""
  replicas: 1
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "1",    memory: "512Mi" }

nfs:
  # Privileged operator pod that manages host knfsd. Single instance per node.
  enabled: true
  image:
    repository: novanas/nfs-operator
    tag: ""
  resources:
    requests: { cpu: "50m",  memory: "64Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }

# -----------------------------------------------------------------------------
# disk-agent — node-local DaemonSet that scans /sys/block and creates/updates
# Disk CRs. Required for any storage to show up in the UI.
# -----------------------------------------------------------------------------
diskAgent:
  enabled: true
  image:
    repository: novanas/disk-agent
    tag: ""  # defaults to .Chart.AppVersion
    pullPolicy: ""
  # Poll interval. Hot-plug is picked up on the next tick.
  interval: 30s
  logLevel: info
  resources:
    requests: { cpu: "10m",  memory: "32Mi" }
    limits:   { cpu: "100m", memory: "128Mi" }

discovery:
  enabled: true
  image:
    repository: novanas/discovery
    tag: ""
  # Avahi + SSDP + WS-Discovery exposed on the host network for LAN discovery.

# -----------------------------------------------------------------------------
# Subchart dependencies. Keys at this level are consumed by the respective
# subchart; see each project's values reference for the full schema.
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# Postgres — own template under templates/postgres/, official upstream image.
# -----------------------------------------------------------------------------
postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  auth:
    database: novanas
    username: novanas
  service:
    port: 5432
  persistence:
    enabled: true
    size: 50Gi
    storageClass: ""
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "2",    memory: "2Gi"   }

# -----------------------------------------------------------------------------
# Keycloak — own template under templates/keycloak/, official upstream image.
# -----------------------------------------------------------------------------
keycloak:
  enabled: true
  image:
    registry: quay.io
    repository: keycloak/keycloak
    tag: "26.0"
    pullPolicy: IfNotPresent
  replicas: 1
  # In dev mode we run `start-dev` (no TLS, ephemeral hostname) so the
  # smoke-test deploy comes up without a CA. Production overlays set this
  # to false and configure KC_HOSTNAME explicitly.
  devMode: true
  # Externally-visible URL the SPA hits — forwarded into KC_HOSTNAME so
  # issuer/auth/token URLs are emitted correctly. Empty disables the
  # explicit hostname (kc falls back to the request's host header).
  hostname: ""
  service:
    type: ClusterIP
  auth:
    adminUser: admin
  database:
    name: keycloak
    username: keycloak
  realm:
    enabled: true
    name: novanas
    adminGroup: admins
  resources:
    requests: { cpu: "250m", memory: "512Mi" }
    limits:   { cpu: "2",    memory: "2Gi"   }
  # Internal URL the realm-import + rotation Jobs use.
  internalURL: "http://novanas-keycloak.novanas-system.svc"
  adminPasswordRotation:
    enabled: true
    # Image used by the rotation CronJob (must include kcadm.sh).
    image: "quay.io/keycloak/keycloak:26.0"
    schedule: "15 3 1 * *"
    minAgeDays: 90

# -----------------------------------------------------------------------------
# OpenBao — own template under templates/openbao/, official upstream image.
# -----------------------------------------------------------------------------
openbao:
  enabled: true
  image:
    registry: quay.io
    repository: openbao/openbao
    tag: "2.2.0"
    pullPolicy: IfNotPresent
  # File-backend production mode. The init Job runs `bao operator init`
  # on first install and persists the unseal key + root token in Secret
  # novanas-openbao-keys. The unseal sidecar in the StatefulSet pod
  # reads that Secret to unseal the server on every restart.
  #
  # This is a stand-in for proper auto-unseal (TPM, KMS, HSM); see GH
  # issue for the production-grade hardening path. Removing the keys
  # Secret will lock the data permanently — back it up.
  address: "http://novanas-openbao:8200"
  tls:
    enabled: false
  service:
    port: 8200
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "1",    memory: "1Gi"   }
  policies:
    enabled: true

# -----------------------------------------------------------------------------
# cert-manager integration.
#
# cert-manager (https://cert-manager.io) is a hard prerequisite of this
# chart whenever any TLS-issuing feature is enabled. Install it cluster-
# wide before installing NovaNas:
#
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.2/cert-manager.yaml
#
# We don't bundle cert-manager itself (CRDs + webhook + cainjector are
# >500KB of generated YAML and don't fit a "single appliance chart"
# shape), but we DO own the Issuer + Certificate resources that
# cert-manager consumes — they live under templates/cert-manager/.
#
# Three ClusterIssuers are created when enabled:
#   - novanas-selfsigned (always): a CA-issuer chained from a self-
#     signed root, used for internal certs (openbao server cert, etc)
#     and as the dev-box ingress fallback (raw IP, no DNS).
#   - novanas-acme-staging / novanas-acme-prod (acme.enabled): Let's
#     Encrypt HTTP-01 issuers for production browser-trusted certs.
# -----------------------------------------------------------------------------
certManager:
  enabled: true
  # Issuer the unified ingress requests its cert from. One of:
  # "selfsigned" (default — dev/raw-IP), "acme-staging", "acme-prod".
  ingressIssuer: selfsigned
  # Secret name the Certificate writes to. Must match the ingress's
  # spec.tls.secretName so traefik picks up the right cert. The default
  # tracks the helm-baked self-signed Secret name so a single value can
  # switch between cert-manager and helm-baked TLS without rewiring.
  ingressSecretName: ""    # empty → defaults to "{fullname}-tls"
  acme:
    enabled: false
    # Email address Let's Encrypt sends expiration warnings to. Required
    # when acme.enabled is true.
    email: ""

# -----------------------------------------------------------------------------
# Redis — own template under templates/redis/, official upstream image.
# Used by the api for pub/sub and ephemeral caches.
# -----------------------------------------------------------------------------
redis:
  enabled: true
  image:
    registry: docker.io
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  auth:
    # Disable auth in the default chart — production overlays should
    # turn this back on and provide a password via bootstrapSecret.
    enabled: false
  persistence:
    # Empty save spec disables RDB snapshots (cache-only role).
    save: ""
  resources:
    requests: { cpu: "50m",  memory: "64Mi"  }
    limits:   { cpu: "500m", memory: "256Mi" }

observability:
  # kube-prometheus-stack subchart.
  enabled: true
  fullnameOverride: novanas-observability
  crds:
    enabled: true
  prometheus:
    prometheusSpec:
      retention: 15d
      resources:
        requests: { cpu: "200m", memory: "1Gi" }
        limits:   { cpu: "2",    memory: "4Gi" }
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 30Gi
  alertmanager:
    alertmanagerSpec:
      resources:
        requests: { cpu: "50m", memory: "128Mi" }
        limits:   { cpu: "500m", memory: "512Mi" }
  grafana:
    enabled: true
    adminPassword: ""  # auto-generated and stored in OpenBao
    defaultDashboardsEnabled: true
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
      datasources:
        enabled: true
        label: grafana_datasource

loki:
  enabled: true
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 20Gi
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0

tempo:
  enabled: true
  tempo:
    retention: 24h
  persistence:
    enabled: true
    size: 10Gi

alloy:
  enabled: true
  alloy:
    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
      - name: otlp-http
        port: 4318
        targetPort: 4318

kubevirt:
  enabled: true

novanet:
  enabled: true
  overlay: geneve

novaedge:
  enabled: true
  vipPool:
    enabled: true
    range: "192.168.1.200-192.168.1.240"

# -----------------------------------------------------------------------------
# Meta: alerts, network policies, ingress
# -----------------------------------------------------------------------------

# NovaNas-owned Grafana dashboard provisioning. The Grafana sidecar in the
# observability subchart picks up ConfigMaps labeled `grafana_dashboard=1`;
# this section controls which dashboards the umbrella chart ships.
grafana:
  dashboards:
    enabled: true
    # Empty list means "ship all". Override to a subset in channel overlays.
    list:
      - system-overview
      - storage-pools
      - storage-disks
      - storage-datasets
      - protocols
      - apps
      - vms
      - network
      - cluster
      - security

alerts:
  enabled: true
  defaults:
    # Names mirror rule IDs in docs/12-observability.md. Any missing key
    # defaults to true via `default true` in the template.
    # Disk / filesystem
    diskSmartFailing: true
    diskFull90: true
    diskFull95: true
    # Pool
    poolDegraded: true
    poolNearFull: true
    poolRebuildSlow: true
    poolRebuildFailed: true
    metadataQuorumLost: true
    storageEngineUnhealthy: true
    # Scrub
    scrubFailed: true
    scrubErrors: true
    # Data protection
    snapshotMissed: true
    replicationFailed: true
    replicationBehind: true
    cloudBackupFailed: true
    # Node
    nodeHighCPU: true
    nodeHighMemory: true
    nodeHighTemperature: true
    # Platform
    certificateExpirySoon: true
    openbaoSealed: true
    openbaoUnhealthy: true
    keycloakUnhealthy: true
    apiErrorRateHigh: true
    operatorReconcileBacklog: true
    updateAvailable: true
    # Security
    securityFailedLogin: true
    security2faBruteForce: true
    securityAdminAction: true

networkPolicy:
  enabled: true
  # Default-deny in system namespaces; operator-managed policies wire per-user
  # allowlists. Toggle off only for debugging.
  denySystemIngressFromUsers: true

# -----------------------------------------------------------------------------
# Bootstrap secrets. These are seeded at first install and subsequently
# rotated into OpenBao. Empty values mean "generate me".
# -----------------------------------------------------------------------------
# -----------------------------------------------------------------------------
# Unified Ingress — single external entry point that routes to UI, API,
# and Keycloak by path. This replaces per-component NodePorts / ingresses
# in the standard layout. The IngressClass owner (traefik in k3s,
# novaedge in production) handles TLS termination + headers.
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  className: traefik
  # External hostname clients use to reach the appliance. Falls back to
  # global.publicHostname, then global.mdnsDomain when empty.
  host: ""
  # Extra annotations passed through to the Ingress (e.g. cert-manager).
  annotations: {}
  tls:
    # HTTPS is the default. Production overlays should set secretName
    # to a cert-manager-issued Secret (or a Secret synced from an
    # external secret store). Leaving secretName empty makes the chart
    # generate a self-signed cert on first install (kept across
    # upgrades via helm.sh/resource-policy=keep) so the appliance is
    # immediately reachable over HTTPS without external dependencies.
    enabled: true
    secretName: ""
    # Self-signed cert generation parameters (used only when
    # secretName is empty and tls.enabled is true).
    selfSigned:
      # Cert validity in days. Defaults to ~1 year; rotation is
      # straightforward — delete the Secret and helm upgrade.
      validityDays: 365
      # Extra DNS names / IPs added to the SAN list alongside
      # ingress.host. Useful for LAN access via the IP literal
      # in addition to the canonical hostname.
      extraNames: []

bootstrapSecret:
  create: true
  name: novanas-bootstrap
  postgresPassword: ""        # generated if empty
  keycloakDbPassword: ""      # generated if empty
  keycloakAdminPassword: ""   # generated if empty (Keycloak master-realm admin)
  openbaoDbPassword: ""       # generated if empty
  openbaoRootToken: ""        # generated if empty (dev-mode root token)
  redisPassword: ""           # generated if empty
