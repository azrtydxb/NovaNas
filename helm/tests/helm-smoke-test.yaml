{{/*
`helm test` smoke test. Curls the API /livez endpoint and exits 0 on 200.
*/}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-smoke
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          url="http://novanas-api.{{ include "novanas.systemNamespace" . }}.svc:{{ .Values.api.service.port }}/livez"
          for i in 1 2 3 4 5 6; do
            if curl -fsS "$url" >/dev/null; then
              echo "api is live"
              exit 0
            fi
            echo "attempt $i failed, retrying..."
            sleep 5
          done
          echo "api did not become live in time"
          exit 1
