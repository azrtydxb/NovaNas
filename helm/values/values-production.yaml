# Production/stable channel. Default values.yaml is already production-
# oriented; this file exists for channel-specific overrides (image pull
# policy, retention, etc) without touching the shared defaults.
global:
  imagePullPolicy: IfNotPresent

api:
  env:
    NODE_ENV: production
    LOG_LEVEL: info

observability:
  prometheus:
    prometheusSpec:
      retention: 30d

alerts:
  enabled: true
