# Production/stable channel. Default values.yaml is already production-
# oriented; this file exists for channel-specific overrides (image pull
# policy, retention, etc) without touching the shared defaults.
# Observability retention will land here once the in-house observability
# templates are ready (they replace kube-prometheus-stack).
global:
  imagePullPolicy: IfNotPresent

api:
  env:
    NODE_ENV: production
    LOG_LEVEL: info

keycloak:
  devMode: false

openbao:
  devMode: false

alerts:
  enabled: true
