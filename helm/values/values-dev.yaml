# Development channel overrides: single replica, looser limits, debug logs.
# Subchart-shaped keys (postgresql.primary.*, observability.prometheus.*,
# loki.singleBinary.*) are gone — see helm/values.yaml for the in-house
# shape. Observability/loki templates are still TODO; they're disabled by
# default until we ship our own.
global:
  imagePullPolicy: Always

api:
  replicas: 1
  env:
    NODE_ENV: development
    LOG_LEVEL: debug

ui:
  replicas: 1

operators:
  replicas: 1
  leaderElect: false

storage:
  meta:
    replicas: 1
    persistence:
      size: 5Gi
  dataplane:
    enabled: false

postgresql:
  persistence:
    size: 10Gi

keycloak:
  devMode: true

openbao:
  devMode: true

alerts:
  enabled: false
