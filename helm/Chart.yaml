apiVersion: v2
name: novanas
version: 0.1.0
appVersion: "26.07.0-dev"
type: application
description: NovaNas — Kubernetes-native NAS appliance umbrella chart
kubeVersion: ">=1.28-0"
home: https://github.com/azrtydxb/NovaNas
sources:
  - https://github.com/azrtydxb/NovaNas
keywords:
  - nas
  - storage
  - kubernetes
  - appliance
maintainers:
  - name: NovaNas Team
    url: https://github.com/azrtydxb/NovaNas
# Subchart dependency versions below are the "latest-known-good" at time of
# writing; Renovate keeps them fresh. See README for the upgrade protocol.
dependencies:
  - name: keycloak
    version: "~24.0"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: keycloak.enabled
  - name: openbao
    version: "~0.11"
    repository: https://openbao.github.io/openbao-helm
    alias: openbao
    condition: openbao.enabled
  - name: postgresql
    version: "~16.0"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled
  - name: redis
    version: "~20.0"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: redis.enabled
  - name: kube-prometheus-stack
    version: "~65.0"
    repository: https://prometheus-community.github.io/helm-charts
    alias: observability
    condition: observability.enabled
  - name: loki
    version: "~6.0"
    repository: https://grafana.github.io/helm-charts
    condition: loki.enabled
  - name: tempo
    version: "~1.10"
    repository: https://grafana.github.io/helm-charts
    condition: tempo.enabled
  - name: alloy
    version: "~0.9"
    repository: https://grafana.github.io/helm-charts
    condition: alloy.enabled
  - name: kubevirt
    version: "~0.4"
    repository: "oci://ghcr.io/azrtydxb/charts"
    condition: kubevirt.enabled
  - name: novanet
    version: "~0"
    repository: "oci://ghcr.io/azrtydxb/charts"
    condition: novanet.enabled
  - name: novaedge
    version: "~0"
    repository: "oci://ghcr.io/azrtydxb/charts"
    condition: novaedge.enabled
