# NovaNas owns every chart it ships. We deliberately have no third-party
# Helm dependencies — only third-party container *images*, pulled from
# their official upstream registries (see values.yaml for the references).
# This guarantees reproducibility, avoids licensing surprises (e.g. the
# Bitnami "secure-images" relicensing of 2025), and lets us evolve the
# operational shape of every component on our own schedule.
dependencies: []
