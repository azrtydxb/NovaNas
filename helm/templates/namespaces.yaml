{{/*
Static namespaces declared by the umbrella chart. Per-user namespaces
(novanas-user-<uid>) are created at runtime by the operators.

The release namespace itself ($ns.system) is NOT declared here — helm
creates it via `--create-namespace` to keep ownership metadata clean
and avoid a "namespace already exists" collision on first install.
*/}}
{{- $ns := .Values.namespaces -}}
{{- range $key, $name := (dict "appsSystem" $ns.appsSystem "vms" $ns.vms) -}}
{{- if $name }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $name }}
  labels:
    {{- include "novanas.labels" $ | nindent 4 }}
    novanas.io/tier: system
    {{- if eq $key "vms" }}
    pod-security.kubernetes.io/enforce: baseline
    {{- else }}
    pod-security.kubernetes.io/enforce: {{ $.Values.global.psaProfile | default "restricted" }}
    {{- end }}
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
{{- end }}
{{- end }}
