{{/*
Samba server Pod.

Runs upstream samba (not an in-house build); the configuration
(smb.conf + share definitions) is sourced from the NovaNas API
rather than from a chart-rendered ConfigMap. A polling sidecar
reads /api/v1/{smb-servers,shares} via TokenReview-authenticated
SA JWT and writes /etc/samba/smb.conf, then SIGHUPs smbd. The
sidecar lives under helm/templates/smb/api-config-sidecar.yaml
(tracked in #55 — not shipped here yet; until then the Pod runs
with stock smb.conf and exposes nothing).
*/}}
{{- if .Values.smb.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: novanas-smb
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "smb") | nindent 4 }}
spec:
  replicas: {{ .Values.smb.replicas }}
  selector:
    matchLabels:
      {{- include "novanas.selectorLabels" (dict "ctx" . "component" "smb") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "novanas.selectorLabels" (dict "ctx" . "component" "smb") | nindent 8 }}
    spec:
      # Use the shared host-agent SA so the sidecar's bearer token
      # presents to the api as the "novanas-host-agent" principal
      # (#55). The samba container itself doesn't talk to the api.
      serviceAccountName: novanas-host-agent
      {{- include "novanas.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: samba
          image: "{{ .Values.smb.image.registry }}/{{ .Values.smb.image.repository }}:{{ .Values.smb.image.tag }}"
          imagePullPolicy: {{ .Values.smb.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: smb
              containerPort: 445
              protocol: TCP
          resources:
            {{- toYaml .Values.smb.resources | nindent 12 }}
          securityContext:
            # Samba needs CAP_NET_BIND_SERVICE for 445 and capabilities to set
            # effective UIDs on behalf of authenticated users.
            allowPrivilegeEscalation: false
            capabilities:
              add: ["NET_BIND_SERVICE", "SETUID", "SETGID"]
              drop: ["ALL"]
          volumeMounts:
            - name: samba-config
              mountPath: /etc/samba
            - name: samba-runtime
              mountPath: /var/run/samba
        # Config-poller sidecar (#55) — same generic binary as the
        # nfs-ganesha sidecar; only the resource + template differ.
        - name: config-poller
          image: "{{ include "novanas.image" (dict "ctx" . "image" .Values.hostAgent.image) }}"
          imagePullPolicy: {{ include "novanas.imagePullPolicy" (dict "ctx" . "image" .Values.hostAgent.image) }}
          args:
            - -api-url=http://novanas-api.{{ include "novanas.systemNamespace" . }}.svc:8080
            - -resource=smb-servers
            - -template=/etc/host-agent-templates/smb.conf.tmpl
            - -output=/etc/samba/smb.conf
            - -reload-cmd=smbcontrol smbd reload-config
            - -interval={{ .Values.hostAgent.interval | default "30s" }}
          volumeMounts:
            - name: samba-config
              mountPath: /etc/samba
            - name: host-agent-templates
              mountPath: /etc/host-agent-templates
              readOnly: true
      volumes:
        - name: samba-config
          emptyDir: {}
        - name: samba-runtime
          emptyDir: {}
        - name: host-agent-templates
          configMap:
            name: novanas-host-agent-templates
{{- end }}
