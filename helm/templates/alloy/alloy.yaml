{{- if .Values.alloy.enabled }}
{{- $ns := include "novanas.systemNamespace" . }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: novanas-alloy
  namespace: {{ $ns }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "alloy") | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: novanas-alloy
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "alloy") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "nodes/metrics", "services", "endpoints", "pods", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: novanas-alloy
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "alloy") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: novanas-alloy
subjects:
  - kind: ServiceAccount
    name: novanas-alloy
    namespace: {{ $ns }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: novanas-alloy-config
  namespace: {{ $ns }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "alloy") | nindent 4 }}
data:
  config.alloy: |
    // Container log discovery + push to Loki.
    discovery.kubernetes "pods" {
      role = "pod"
    }
    discovery.relabel "pods" {
      targets = discovery.kubernetes.pods.targets
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
    }
    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.pods.output
      forward_to = [loki.write.default.receiver]
    }
    loki.write "default" {
      endpoint {
        url = "http://novanas-loki.{{ $ns }}.svc:3100/loki/api/v1/push"
      }
    }
    // OTLP receiver — forwards traces to Tempo and metrics back to
    // Prometheus' OTLP-receive endpoint via remote_write.
    otelcol.receiver.otlp "default" {
      grpc { endpoint = "0.0.0.0:4317" }
      http { endpoint = "0.0.0.0:4318" }
      output {
        traces  = [otelcol.exporter.otlp.tempo.input]
      }
    }
    otelcol.exporter.otlp "tempo" {
      client {
        endpoint = "novanas-tempo.{{ $ns }}.svc:4317"
        tls { insecure = true }
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: novanas-alloy
  namespace: {{ $ns }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "alloy") | nindent 4 }}
spec:
  selector:
    {{- include "novanas.selectorLabels" (dict "ctx" . "component" "alloy") | nindent 4 }}
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: novanas-alloy
  namespace: {{ $ns }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "alloy") | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "novanas.selectorLabels" (dict "ctx" . "component" "alloy") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "novanas.selectorLabels" (dict "ctx" . "component" "alloy") | nindent 8 }}
    spec:
      serviceAccountName: novanas-alloy
      containers:
        - name: alloy
          image: "{{ .Values.alloy.image.repository }}:{{ .Values.alloy.image.tag }}"
          imagePullPolicy: {{ .Values.alloy.image.pullPolicy }}
          args:
            - run
            - /etc/alloy/config.alloy
            - --server.http.listen-addr=0.0.0.0:12345
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: containers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            {{- toYaml .Values.alloy.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: novanas-alloy-config
        - name: varlog
          hostPath: { path: /var/log }
        - name: containers
          hostPath: { path: /var/lib/docker/containers }
{{- end }}
