{{- if .Values.ui.enabled -}}
{{- $ns := include "novanas.systemNamespace" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: novanas-ui-nginx
  namespace: {{ $ns }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "ui") | nindent 4 }}
data:
  default.conf: |
    server {
      listen {{ .Values.ui.service.port }};
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      # Proxy /api/* and /docs/* and websocket /ws/* to the api Service.
      location /api/ {
        proxy_pass http://novanas-api.{{ $ns }}.svc:{{ .Values.api.service.port }};
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /docs {
        proxy_pass http://novanas-api.{{ $ns }}.svc:{{ .Values.api.service.port }};
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
      }

      location /ws/ {
        proxy_pass http://novanas-api.{{ $ns }}.svc:{{ .Values.api.service.port }};
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
      }

      # Proxy keycloak under /auth/ so the SPA's client-side OIDC
      # discovery works (UI hits /auth/realms/novanas/.well-known/...).
      # Keycloak 17+ no longer prefixes its routes with /auth, so we
      # rewrite the prefix away on the way through.
      location /auth/ {
        rewrite ^/auth/(.*)$ /$1 break;
        proxy_pass http://novanas-keycloak.{{ $ns }}.svc:80;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
      location /realms/ {
        proxy_pass http://novanas-keycloak.{{ $ns }}.svc:80;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      # SPA fallback for everything else.
      location / {
        try_files $uri $uri/ /index.html;
      }
    }
{{- end }}
