{{/*
Discovery DaemonSet — Avahi (mDNS), SSDP, and WS-Discovery on the host
network so clients on the LAN can browse the NovaNas appliance.
*/}}
{{- if .Values.discovery.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: novanas-discovery
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "discovery") | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "novanas.selectorLabels" (dict "ctx" . "component" "discovery") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "novanas.selectorLabels" (dict "ctx" . "component" "discovery") | nindent 8 }}
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- include "novanas.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: discovery
          image: {{ include "novanas.image" (dict "ctx" . "image" .Values.discovery.image) }}
          imagePullPolicy: {{ include "novanas.imagePullPolicy" (dict "ctx" . "image" .Values.discovery.image) }}
          env:
            - name: NOVANAS_MDNS_DOMAIN
              value: {{ .Values.global.mdnsDomain | quote }}
            - name: NOVANAS_CLUSTER_NAME
              value: {{ .Values.global.clusterName | quote }}
          securityContext:
            capabilities:
              add: ["NET_BIND_SERVICE", "NET_RAW"]
              drop: ["ALL"]
{{- end }}
