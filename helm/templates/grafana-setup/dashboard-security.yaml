{{- if eq (include "novanas.dashboard.enabled" (dict "ctx" . "slug" "security")) "true" }}
---
{{- $json := `{
  "uid": "novanas-security",
  "title": "NovaNas / Security",
  "tags": ["novanas", "security", "audit"],
  "timezone": "browser",
  "schemaVersion": 39,
  "refresh": "30s",
  "time": { "from": "now-24h", "to": "now" },
  "templating": { "list": [
    { "name": "DS_PROMETHEUS", "type": "datasource", "query": "prometheus", "current": { "text": "Prometheus", "value": "prometheus" } },
    { "name": "DS_POSTGRES",   "type": "datasource", "query": "postgres",   "current": { "text": "Audit-Postgres", "value": "audit_postgres" } }
  ] },
  "panels": [
    { "id": 1, "type": "stat", "title": "Failed logins (1h)", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
      "targets": [{ "expr": "sum(increase(novanas_auth_failures_total[1h]))" }] },
    { "id": 2, "type": "stat", "title": "2FA failures (1h)", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
      "targets": [{ "expr": "sum(increase(novanas_2fa_failures_total[1h]))" }] },
    { "id": 3, "type": "stat", "title": "Tokens issued (1h)", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
      "targets": [{ "expr": "sum(increase(novanas_tokens_issued_total[1h]))" }] },
    { "id": 4, "type": "stat", "title": "Admin actions (24h)", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
      "targets": [{ "expr": "sum(increase(novanas_admin_action_total[24h]))" }] },
    { "id": 5, "type": "timeseries", "title": "Auth failure rate", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
      "targets": [{ "expr": "sum by (user)(rate(novanas_auth_failures_total[5m]))", "legendFormat": "USER_PLACEHOLDER" }] },
    { "id": 6, "type": "timeseries", "title": "Admission rejections", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
      "targets": [{ "expr": "sum by (webhook)(rate(apiserver_admission_webhook_rejection_count[5m]))", "legendFormat": "WEBHOOK_PLACEHOLDER" }] },
    { "id": 7, "type": "timeseries", "title": "Token issuances", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
      "targets": [{ "expr": "rate(novanas_tokens_issued_total[5m])", "legendFormat": "AUD_PLACEHOLDER" }] },
    { "id": 8, "type": "timeseries", "title": "OpenBao policy changes", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
      "targets": [{ "expr": "rate(novanas_openbao_policy_writes_total[5m])", "legendFormat": "policy writes" }] },
    { "id": 9, "type": "table", "title": "Recent admin actions", "datasource": "${DS_POSTGRES}", "gridPos": { "h": 10, "w": 24, "x": 0, "y": 20 },
      "targets": [{ "rawSql": "SELECT ts AS time, actor, verb, target, result FROM audit_events WHERE category = 'admin' ORDER BY ts DESC LIMIT 100", "format": "table" }] }
  ]
}` }}
{{- $json = $json | replace "USER_PLACEHOLDER" "{{ user }}" | replace "WEBHOOK_PLACEHOLDER" "{{ webhook }}" | replace "AUD_PLACEHOLDER" "{{ audience }}" }}
{{ include "novanas.dashboard.cm" (dict "ctx" . "slug" "security" "json" $json) }}
{{- end }}
