{{- if eq (include "novanas.dashboard.enabled" (dict "ctx" . "slug" "storage-disks")) "true" }}
---
{{- $json := `{
  "uid": "novanas-storage-disks",
  "title": "NovaNas / Storage — Disks",
  "tags": ["novanas", "storage", "disks"],
  "timezone": "browser",
  "schemaVersion": 39,
  "refresh": "30s",
  "time": { "from": "now-6h", "to": "now" },
  "templating": {
    "list": [
      { "name": "DS_PROMETHEUS", "type": "datasource", "query": "prometheus", "current": { "text": "Prometheus", "value": "prometheus" } },
      { "name": "disk", "label": "Disk", "type": "query", "datasource": "${DS_PROMETHEUS}", "query": "label_values(novanas_disk_smart_temperature, disk)", "refresh": 2, "includeAll": true, "multi": true }
    ]
  },
  "panels": [
    { "id": 1, "type": "stat", "title": "Disks total", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
      "targets": [{ "expr": "count(count by (disk)(novanas_disk_smart_temperature))" }] },
    { "id": 2, "type": "stat", "title": "SMART failing", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
      "targets": [{ "expr": "sum(novanas_disk_smart_failing)" }],
      "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": 0 }, { "color": "red", "value": 1 }] } } } },
    { "id": 3, "type": "stat", "title": "Max temperature", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
      "targets": [{ "expr": "max(novanas_disk_smart_temperature)" }],
      "fieldConfig": { "defaults": { "unit": "celsius", "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 50 }, { "color": "red", "value": 60 }] } } } },
    { "id": 4, "type": "stat", "title": "Reallocated sectors", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
      "targets": [{ "expr": "sum(novanas_disk_reallocated_sectors)" }],
      "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 10 }] } } } },
    { "id": 5, "type": "timeseries", "title": "Temperature", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
      "targets": [{ "expr": "novanas_disk_smart_temperature{disk=~\"$disk\"}", "legendFormat": "DISK_PLACEHOLDER" }],
      "fieldConfig": { "defaults": { "unit": "celsius", "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 50 }, { "color": "red", "value": 60 }] }, "custom": { "thresholdsStyle": { "mode": "line" } } } } },
    { "id": 6, "type": "timeseries", "title": "Reallocated/pending sectors", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
      "targets": [
        { "expr": "novanas_disk_reallocated_sectors{disk=~\"$disk\"}", "legendFormat": "realloc DISK_PLACEHOLDER" },
        { "expr": "novanas_disk_pending_sectors{disk=~\"$disk\"}",     "legendFormat": "pending DISK_PLACEHOLDER" }
      ] },
    { "id": 7, "type": "timeseries", "title": "Per-disk IOPS", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
      "targets": [
        { "expr": "rate(node_disk_reads_completed_total[5m])",   "legendFormat": "r DEVICE_PLACEHOLDER" },
        { "expr": "rate(node_disk_writes_completed_total[5m])",  "legendFormat": "w DEVICE_PLACEHOLDER" }
      ] },
    { "id": 8, "type": "timeseries", "title": "Per-disk latency", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
      "targets": [
        { "expr": "rate(node_disk_read_time_seconds_total[5m])  / ignoring(op) rate(node_disk_reads_completed_total[5m])",  "legendFormat": "r DEVICE_PLACEHOLDER" },
        { "expr": "rate(node_disk_write_time_seconds_total[5m]) / ignoring(op) rate(node_disk_writes_completed_total[5m])", "legendFormat": "w DEVICE_PLACEHOLDER" }
      ],
      "fieldConfig": { "defaults": { "unit": "s" } } },
    { "id": 9, "type": "timeseries", "title": "IO errors", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 24, "x": 0, "y": 20 },
      "targets": [{ "expr": "rate(novanas_disk_io_errors_total{disk=~\"$disk\"}[5m])", "legendFormat": "DISK_PLACEHOLDER" }] }
  ]
}` }}
{{- $json = $json | replace "DISK_PLACEHOLDER" "{{ disk }}" | replace "DEVICE_PLACEHOLDER" "{{ device }}" }}
{{ include "novanas.dashboard.cm" (dict "ctx" . "slug" "storage-disks" "json" $json) }}
{{- end }}
