{{- if eq (include "novanas.dashboard.enabled" (dict "ctx" . "slug" "system-overview")) "true" }}
---
{{- $json := `{
  "uid": "novanas-system-overview",
  "title": "NovaNas / System Overview",
  "tags": ["novanas", "system"],
  "timezone": "browser",
  "schemaVersion": 39,
  "refresh": "30s",
  "time": { "from": "now-6h", "to": "now" },
  "templating": {
    "list": [
      { "name": "DS_PROMETHEUS", "type": "datasource", "query": "prometheus", "current": { "text": "Prometheus", "value": "prometheus" } },
      { "name": "node", "label": "Node", "type": "query", "datasource": "${DS_PROMETHEUS}", "query": "label_values(node_uname_info, instance)", "refresh": 2, "includeAll": true, "multi": true }
    ]
  },
  "panels": [
    { "id": 1, "type": "stat", "title": "Uptime", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
      "targets": [{ "expr": "time() - node_boot_time_seconds{instance=~\"$node\"}" }],
      "fieldConfig": { "defaults": { "unit": "s" } } },
    { "id": 2, "type": "gauge", "title": "CPU Usage", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 6, "x": 4, "y": 0 },
      "targets": [{ "expr": "100 - (avg by (instance)(rate(node_cpu_seconds_total{mode=\"idle\",instance=~\"$node\"}[5m])) * 100)" }],
      "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }] } } } },
    { "id": 3, "type": "gauge", "title": "Memory Usage", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 6, "x": 10, "y": 0 },
      "targets": [{ "expr": "(1 - node_memory_MemAvailable_bytes{instance=~\"$node\"} / node_memory_MemTotal_bytes{instance=~\"$node\"}) * 100" }],
      "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 75 }, { "color": "red", "value": 90 }] } } } },
    { "id": 4, "type": "stat", "title": "Load (1m)", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 4, "w": 4, "x": 16, "y": 0 },
      "targets": [{ "expr": "avg(node_load1{instance=~\"$node\"})" }],
      "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 4 }, { "color": "red", "value": 8 }] } } } },
    { "id": 5, "type": "timeseries", "title": "CPU by mode", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
      "targets": [{ "expr": "avg by (mode)(rate(node_cpu_seconds_total{instance=~\"$node\",mode!=\"idle\"}[5m]))", "legendFormat": "MODE_PLACEHOLDER" }] },
    { "id": 6, "type": "timeseries", "title": "Memory breakdown", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
      "targets": [
        { "expr": "node_memory_MemTotal_bytes{instance=~\"$node\"} - node_memory_MemAvailable_bytes{instance=~\"$node\"}", "legendFormat": "used" },
        { "expr": "node_memory_Cached_bytes{instance=~\"$node\"}", "legendFormat": "cached" },
        { "expr": "node_memory_Buffers_bytes{instance=~\"$node\"}", "legendFormat": "buffers" }
      ],
      "fieldConfig": { "defaults": { "unit": "bytes" } } },
    { "id": 7, "type": "timeseries", "title": "Disk IO", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
      "targets": [
        { "expr": "sum by (device)(rate(node_disk_read_bytes_total{instance=~\"$node\"}[5m]))",  "legendFormat": "r DEVICE_PLACEHOLDER" },
        { "expr": "sum by (device)(rate(node_disk_written_bytes_total{instance=~\"$node\"}[5m]))", "legendFormat": "w DEVICE_PLACEHOLDER" }
      ],
      "fieldConfig": { "defaults": { "unit": "Bps" } } },
    { "id": 8, "type": "timeseries", "title": "Network traffic", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
      "targets": [
        { "expr": "sum by (device)(rate(node_network_receive_bytes_total{instance=~\"$node\",device!~\"lo|veth.*|docker.*\"}[5m]))",  "legendFormat": "rx DEVICE_PLACEHOLDER" },
        { "expr": "sum by (device)(rate(node_network_transmit_bytes_total{instance=~\"$node\",device!~\"lo|veth.*|docker.*\"}[5m]))", "legendFormat": "tx DEVICE_PLACEHOLDER" }
      ],
      "fieldConfig": { "defaults": { "unit": "Bps" } } },
    { "id": 9, "type": "timeseries", "title": "Filesystem usage", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 24, "x": 0, "y": 24 },
      "targets": [{ "expr": "(1 - node_filesystem_avail_bytes{instance=~\"$node\",fstype!~\"tmpfs|overlay\"} / node_filesystem_size_bytes{instance=~\"$node\",fstype!~\"tmpfs|overlay\"}) * 100", "legendFormat": "MOUNTPOINT_PLACEHOLDER" }],
      "fieldConfig": { "defaults": { "unit": "percent", "max": 100 } } }
  ]
}` }}
{{- $json = $json | replace "MODE_PLACEHOLDER" "{{ mode }}" | replace "DEVICE_PLACEHOLDER" "{{ device }}" | replace "MOUNTPOINT_PLACEHOLDER" "{{ mountpoint }}" }}
{{ include "novanas.dashboard.cm" (dict "ctx" . "slug" "system-overview" "json" $json) }}
{{- end }}
