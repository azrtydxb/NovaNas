{{- if eq (include "novanas.dashboard.enabled" (dict "ctx" . "slug" "vms")) "true" }}
---
{{- $json := `{
  "uid": "novanas-vms",
  "title": "NovaNas / VMs",
  "tags": ["novanas", "vms", "kubevirt"],
  "timezone": "browser",
  "schemaVersion": 39,
  "refresh": "30s",
  "time": { "from": "now-6h", "to": "now" },
  "templating": {
    "list": [
      { "name": "DS_PROMETHEUS", "type": "datasource", "query": "prometheus", "current": { "text": "Prometheus", "value": "prometheus" } },
      { "name": "vm", "label": "VM", "type": "query", "datasource": "${DS_PROMETHEUS}", "query": "label_values(kubevirt_vmi_info, name)", "refresh": 2, "includeAll": true, "multi": true }
    ]
  },
  "panels": [
    { "id": 1, "type": "stat", "title": "Running VMs", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
      "targets": [{ "expr": "count(kubevirt_vmi_phase_count{phase=\"Running\"})" }] },
    { "id": 2, "type": "stat", "title": "Total vCPU", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
      "targets": [{ "expr": "sum(kubevirt_vmi_cpu_allocated_cores)" }] },
    { "id": 3, "type": "stat", "title": "Total vRAM", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
      "targets": [{ "expr": "sum(kubevirt_vmi_memory_domain_bytes)" }],
      "fieldConfig": { "defaults": { "unit": "bytes" } } },
    { "id": 4, "type": "stat", "title": "Migrations running", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
      "targets": [{ "expr": "sum(kubevirt_migrate_vmi_pending_count)" }] },
    { "id": 5, "type": "timeseries", "title": "Per-VM CPU", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
      "targets": [{ "expr": "rate(kubevirt_vmi_cpu_usage_seconds_total{name=~\"$vm\"}[5m])", "legendFormat": "NAME_PLACEHOLDER" }] },
    { "id": 6, "type": "timeseries", "title": "Per-VM memory", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
      "targets": [{ "expr": "kubevirt_vmi_memory_used_bytes{name=~\"$vm\"}", "legendFormat": "NAME_PLACEHOLDER" }],
      "fieldConfig": { "defaults": { "unit": "bytes" } } },
    { "id": 7, "type": "timeseries", "title": "VirtIO block IO", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
      "targets": [
        { "expr": "rate(kubevirt_vmi_storage_read_traffic_bytes_total{name=~\"$vm\"}[5m])",  "legendFormat": "r NAME_PLACEHOLDER" },
        { "expr": "rate(kubevirt_vmi_storage_write_traffic_bytes_total{name=~\"$vm\"}[5m])", "legendFormat": "w NAME_PLACEHOLDER" }
      ],
      "fieldConfig": { "defaults": { "unit": "Bps" } } },
    { "id": 8, "type": "timeseries", "title": "VirtIO net IO", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
      "targets": [
        { "expr": "rate(kubevirt_vmi_network_receive_bytes_total{name=~\"$vm\"}[5m])",  "legendFormat": "rx NAME_PLACEHOLDER" },
        { "expr": "rate(kubevirt_vmi_network_transmit_bytes_total{name=~\"$vm\"}[5m])", "legendFormat": "tx NAME_PLACEHOLDER" }
      ],
      "fieldConfig": { "defaults": { "unit": "Bps" } } }
  ]
}` }}
{{- $json = $json | replace "NAME_PLACEHOLDER" "{{ name }}" }}
{{ include "novanas.dashboard.cm" (dict "ctx" . "slug" "vms" "json" $json) }}
{{- end }}
