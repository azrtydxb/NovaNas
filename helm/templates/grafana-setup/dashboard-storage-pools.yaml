{{- if eq (include "novanas.dashboard.enabled" (dict "ctx" . "slug" "storage-pools")) "true" }}
---
{{- $json := `{
  "uid": "novanas-storage-pools",
  "title": "NovaNas / Storage — Pools",
  "tags": ["novanas", "storage", "pools"],
  "timezone": "browser",
  "schemaVersion": 39,
  "refresh": "30s",
  "time": { "from": "now-6h", "to": "now" },
  "templating": {
    "list": [
      { "name": "DS_PROMETHEUS", "type": "datasource", "query": "prometheus", "current": { "text": "Prometheus", "value": "prometheus" } },
      { "name": "pool", "label": "Pool", "type": "query", "datasource": "${DS_PROMETHEUS}", "query": "label_values(novanas_pool_capacity_bytes, pool)", "refresh": 2, "includeAll": true, "multi": true }
    ]
  },
  "panels": [
    { "id": 1, "type": "stat", "title": "Pools total", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
      "targets": [{ "expr": "count(count by (pool)(novanas_pool_capacity_bytes))" }] },
    { "id": 2, "type": "stat", "title": "Pools degraded", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
      "targets": [{ "expr": "sum(novanas_pool_health{status=\"degraded\"})" }],
      "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": 0 }, { "color": "red", "value": 1 }] } } } },
    { "id": 3, "type": "stat", "title": "Pools rebuilding", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
      "targets": [{ "expr": "sum(novanas_pool_rebuild_active)" }] },
    { "id": 4, "type": "stat", "title": "Scrubs running", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
      "targets": [{ "expr": "sum(novanas_pool_scrub_active)" }] },
    { "id": 5, "type": "timeseries", "title": "Capacity used by pool", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
      "targets": [{ "expr": "novanas_pool_used_bytes{pool=~\"$pool\"}", "legendFormat": "POOL_PLACEHOLDER" }],
      "fieldConfig": { "defaults": { "unit": "bytes" } } },
    { "id": 6, "type": "timeseries", "title": "Used ratio", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
      "targets": [{ "expr": "novanas_pool_used_ratio{pool=~\"$pool\"}", "legendFormat": "POOL_PLACEHOLDER" }],
      "fieldConfig": { "defaults": { "unit": "percentunit", "max": 1 } } },
    { "id": 7, "type": "timeseries", "title": "IOPS per pool", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
      "targets": [
        { "expr": "rate(novanas_pool_io_ops_total{pool=~\"$pool\",op=\"read\"}[5m])",  "legendFormat": "r POOL_PLACEHOLDER" },
        { "expr": "rate(novanas_pool_io_ops_total{pool=~\"$pool\",op=\"write\"}[5m])", "legendFormat": "w POOL_PLACEHOLDER" }
      ] },
    { "id": 8, "type": "timeseries", "title": "Throughput per pool", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
      "targets": [
        { "expr": "rate(novanas_pool_io_bytes_total{pool=~\"$pool\",op=\"read\"}[5m])",  "legendFormat": "r POOL_PLACEHOLDER" },
        { "expr": "rate(novanas_pool_io_bytes_total{pool=~\"$pool\",op=\"write\"}[5m])", "legendFormat": "w POOL_PLACEHOLDER" }
      ],
      "fieldConfig": { "defaults": { "unit": "Bps" } } },
    { "id": 9, "type": "timeseries", "title": "Rebuild progress", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
      "targets": [{ "expr": "novanas_pool_rebuild_progress{pool=~\"$pool\"}", "legendFormat": "POOL_PLACEHOLDER" }],
      "fieldConfig": { "defaults": { "unit": "percentunit", "max": 1 } } },
    { "id": 10, "type": "timeseries", "title": "Last scrub result", "datasource": "${DS_PROMETHEUS}", "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
      "targets": [{ "expr": "novanas_pool_scrub_errors{pool=~\"$pool\"}", "legendFormat": "errors POOL_PLACEHOLDER" }] }
  ]
}` }}
{{- $json = $json | replace "POOL_PLACEHOLDER" "{{ pool }}" }}
{{ include "novanas.dashboard.cm" (dict "ctx" . "slug" "storage-pools" "json" $json) }}
{{- end }}
