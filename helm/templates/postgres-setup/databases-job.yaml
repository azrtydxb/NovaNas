{{/*
Creates the novanas, keycloak, openbao databases + users on first install.
Idempotent: all statements use IF NOT EXISTS / CREATE OR REPLACE semantics.
*/}}
{{- if .Values.postgresql.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: novanas-postgres-init
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "postgres-setup") | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "1"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "novanas.selectorLabels" (dict "ctx" . "component" "postgres-setup") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: psql
          image: docker.io/bitnami/postgresql:16
          env:
            - name: PGHOST
              value: novanas-postgresql.{{ include "novanas.systemNamespace" . }}.svc
            - name: PGUSER
              value: postgres
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: novanas-postgresql
                  key: postgres-password
            - name: KEYCLOAK_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrapSecret.name }}
                  key: keycloak-db-password
            - name: OPENBAO_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrapSecret.name }}
                  key: openbao-db-password
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              until pg_isready -q; do
                echo "waiting for postgres..."
                sleep 3
              done
              psql -v ON_ERROR_STOP=1 <<SQL
              SELECT 'CREATE DATABASE novanas'   WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'novanas')\gexec
              SELECT 'CREATE DATABASE keycloak'  WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'keycloak')\gexec
              SELECT 'CREATE DATABASE openbao'   WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'openbao')\gexec

              DO \$\$ BEGIN
                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'keycloak') THEN
                  CREATE ROLE keycloak LOGIN PASSWORD '$KEYCLOAK_DB_PASSWORD';
                END IF;
                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'openbao') THEN
                  CREATE ROLE openbao LOGIN PASSWORD '$OPENBAO_DB_PASSWORD';
                END IF;
              END \$\$;

              GRANT ALL PRIVILEGES ON DATABASE keycloak TO keycloak;
              GRANT ALL PRIVILEGES ON DATABASE openbao  TO openbao;
              SQL
{{- end }}
