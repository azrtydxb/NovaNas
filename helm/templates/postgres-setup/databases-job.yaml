{{/*
Creates the novanas, keycloak, openbao databases + users on first install.
Idempotent: all statements use IF NOT EXISTS / CREATE OR REPLACE semantics.
*/}}
{{- if .Values.postgresql.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: novanas-postgres-init
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "postgres-setup") | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "1"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "novanas.selectorLabels" (dict "ctx" . "component" "postgres-setup") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: psql
          image: "{{ .Values.postgresql.image.registry }}/{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          env:
            - name: PGHOST
              value: novanas-postgresql.{{ include "novanas.systemNamespace" . }}.svc
            - name: PGUSER
              value: postgres
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: novanas-postgresql
                  key: postgres-password
            - name: KEYCLOAK_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrapSecret.name }}
                  key: keycloak-db-password
            - name: OPENBAO_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrapSecret.name }}
                  key: openbao-db-password
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              until pg_isready -q; do
                echo "waiting for postgres..."
                sleep 3
              done

              # Create roles first (idempotent)
              psql -v ON_ERROR_STOP=1 <<SQL
              DO \$\$ BEGIN
                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'novanas') THEN
                  CREATE ROLE novanas LOGIN PASSWORD '$PGPASSWORD';
                END IF;
                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'keycloak') THEN
                  CREATE ROLE keycloak LOGIN PASSWORD '$KEYCLOAK_DB_PASSWORD';
                END IF;
                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'openbao') THEN
                  CREATE ROLE openbao LOGIN PASSWORD '$OPENBAO_DB_PASSWORD';
                END IF;
              END \$\$;
              SQL

              # Then create databases owned by their respective roles.
              # CREATE DATABASE cannot run inside a transaction, so each
              # database goes through its own one-line invocation guarded
              # by a SELECT against pg_database.
              for db in "novanas:novanas" "keycloak:keycloak" "openbao:openbao"; do
                name="${db%:*}"; owner="${db#*:}"
                exists=$(psql -tAc "SELECT 1 FROM pg_database WHERE datname='${name}'")
                if [ -z "$exists" ]; then
                  psql -v ON_ERROR_STOP=1 -c "CREATE DATABASE ${name} OWNER ${owner}"
                fi
              done

              psql -v ON_ERROR_STOP=1 <<SQL
              GRANT ALL PRIVILEGES ON DATABASE novanas  TO novanas;
              GRANT ALL PRIVILEGES ON DATABASE keycloak TO keycloak;
              GRANT ALL PRIVILEGES ON DATABASE openbao  TO openbao;
              SQL

              # Reassign anything already owned by `postgres` in the
              # novanas db to the `novanas` role. Covers the case where
              # something seeded a table as superuser before the api's
              # migration runner came online (#43): the api connects as
              # `novanas` and \`CREATE INDEX ... ON <table>\` requires
              # ownership of <table>.
              psql -v ON_ERROR_STOP=1 -d novanas -c "REASSIGN OWNED BY postgres TO novanas;" || true
{{- end }}
