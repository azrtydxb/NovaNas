{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: novanas-api
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "novanas.selectorLabels" (dict "ctx" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "novanas.selectorLabels" (dict "ctx" . "component" "api") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/config/api-configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: novanas-api
      {{- include "novanas.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "novanas.securityContext" . | nindent 8 }}
      containers:
        - name: api
          image: {{ include "novanas.image" (dict "ctx" . "image" .Values.api.image) }}
          imagePullPolicy: {{ include "novanas.imagePullPolicy" (dict "ctx" . "image" .Values.api.image) }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
          env:
            {{- range $k, $v := .Values.api.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: PORT
              value: {{ .Values.api.service.port | quote }}
            # Pod's namespace via downward API. Used as the target for
            # cert-manager Certificate projections in #51.
            - name: SYSTEM_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: novanas-postgresql
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://novanas:$(DATABASE_PASSWORD)@novanas-postgresql.{{ include "novanas.systemNamespace" . }}.svc:5432/novanas?sslmode=disable"
            - name: REDIS_URL
              {{- if .Values.redis.enabled }}
              value: "redis://novanas-redis.{{ include "novanas.systemNamespace" . }}.svc:6379"
              {{- else }}
              value: "memory://"
              {{- end }}
            # KEYCLOAK_ISSUER_URL must match the issuer keycloak publishes
            # in its well-known document (the openid-client library does
            # strict issuer-string comparison). When KC_HOSTNAME is set
            # to the external ingress URL, that's the issuer kc emits —
            # so the api has to use the same URL even for in-cluster
            # backchannel calls. Connections go pod→Service→ingress→kc.
            - name: KEYCLOAK_ISSUER_URL
              value: {{ printf "%s/realms/%s" (.Values.keycloak.hostname | default (printf "http://novanas-keycloak.%s.svc" (include "novanas.systemNamespace" .))) (.Values.keycloak.realm.name | default "novanas") | quote }}
            # In-cluster Service URL for openid-client discovery — plain
            # HTTP, bypasses Node/undici NODE_EXTRA_CA_CERTS handling for
            # the well-known fetch (#49). The api still validates token
            # `iss` against the public KEYCLOAK_ISSUER_URL above.
            - name: KEYCLOAK_INTERNAL_ISSUER_URL
              value: {{ printf "http://novanas-keycloak.%s.svc/realms/%s" (include "novanas.systemNamespace" .) (.Values.keycloak.realm.name | default "novanas") | quote }}
            {{- if and .Values.ingress.tls.enabled (not .Values.ingress.tls.secretName) }}
            # Trust our own CA (cert-manager-issued Certificate carries
            # ca.crt; the helm self-signed fallback puts the cert at
            # tls.crt and there's no separate ca.crt — fall back to
            # tls.crt in that case so the chart works without cert-manager).
            - name: NODE_EXTRA_CA_CERTS
              value: {{ ternary "/etc/novanas/tls/ca.crt" "/etc/novanas/tls/tls.crt" .Values.certManager.enabled | quote }}
            {{- end }}
            # Browser-facing base URL the api uses to construct its OIDC
            # callback URL. Must match what the SPA reaches the api on,
            # which in our standard layout is the unified ingress host.
            - name: API_PUBLIC_URL
              value: {{ .Values.api.publicUrl | default (printf "%s://%s" (.Values.ingress.tls.enabled | ternary "https" "http") (.Values.ingress.host | default .Values.global.publicHostname | default .Values.global.mdnsDomain)) | quote }}
            - name: KEYCLOAK_CLIENT_ID
              value: "novanas-api"
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrapSecret.name }}
                  key: keycloak-api-client-secret
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrapSecret.name }}
                  key: api-session-secret
          envFrom:
            - configMapRef:
                name: novanas-api-config
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            {{- include "novanas.containerSecurityContext" . | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if and .Values.ingress.tls.enabled (not .Values.ingress.tls.secretName) }}
            - name: ingress-ca
              mountPath: /etc/novanas/tls
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if and .Values.ingress.tls.enabled (not .Values.ingress.tls.secretName) }}
        - name: ingress-ca
          secret:
            secretName: {{ printf "%s-tls" (include "novanas.fullname" .) }}
            items:
              - key: tls.crt
                path: tls.crt
              {{- if .Values.certManager.enabled }}
              - key: ca.crt
                path: ca.crt
              {{- end }}
        {{- end }}
{{- end }}
