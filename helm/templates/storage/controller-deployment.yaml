{{- if .Values.storage.controller.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: novanas-storage-controller
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "storage-controller") | nindent 4 }}
spec:
  replicas: {{ .Values.storage.controller.replicas }}
  selector:
    matchLabels:
      {{- include "novanas.selectorLabels" (dict "ctx" . "component" "storage-controller") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "novanas.selectorLabels" (dict "ctx" . "component" "storage-controller") | nindent 8 }}
    spec:
      serviceAccountName: novanas-storage
      {{- include "novanas.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "novanas.securityContext" . | nindent 8 }}
      containers:
        - name: controller
          image: {{ include "novanas.image" (dict "ctx" . "image" .Values.storage.controller.image) }}
          imagePullPolicy: {{ include "novanas.imagePullPolicy" (dict "ctx" . "image" .Values.storage.controller.image) }}
          command: ["/usr/local/bin/novanas-storage-controller"]
          args:
            - -meta-addr=novanas-storage-meta.{{ include "novanas.systemNamespace" . }}.svc:{{ .Values.storage.meta.service.grpcPort }}
          env:
            # NovaNas API endpoint for the pool poller (#50). When
            # storage.controller.poolPoller is true the legacy
            # controller-runtime watch is replaced with an HTTP poll.
            - name: NOVANAS_API_URL
              value: "http://novanas-api.{{ include "novanas.systemNamespace" . }}.svc:8080"
            {{- if .Values.storage.controller.poolPoller }}
            - name: NOVANAS_POOL_POLLER
              value: "1"
            {{- end }}
          resources:
            {{- toYaml .Values.storage.controller.resources | nindent 12 }}
          securityContext:
            {{- include "novanas.containerSecurityContext" . | nindent 12 }}
{{- end }}
