{{- if .Values.storage.csi.enabled }}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.storage.storageClass.name }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "storage") | nindent 4 }}
  {{- if .Values.storage.storageClass.isDefault }}
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
  {{- end }}
provisioner: novanas.storage.csi
reclaimPolicy: {{ .Values.storage.storageClass.reclaimPolicy }}
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
parameters:
  encryption: {{ .Values.storage.meta.encryption.mode }}
{{- end }}
