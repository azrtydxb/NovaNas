{{- if .Values.storage.agent.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: novanas-storage-agent
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "storage-agent") | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "novanas.selectorLabels" (dict "ctx" . "component" "storage-agent") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "novanas.selectorLabels" (dict "ctx" . "component" "storage-agent") | nindent 8 }}
    spec:
      serviceAccountName: novanas-storage
      hostPID: false
      {{- include "novanas.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          image: {{ include "novanas.image" (dict "ctx" . "image" .Values.storage.agent.image) }}
          imagePullPolicy: {{ include "novanas.imagePullPolicy" (dict "ctx" . "image" .Values.storage.agent.image) }}
          command: ["/bin/sh", "-c"]
          # Flag set per storage/cmd/agent/main.go (#38). Host/pod IPs
          # come from the downward API; substituted in by sh because
          # K8s args don't shell-expand $(...) on their own at runtime.
          args:
            - exec /usr/local/bin/novanas-storage-agent
              -listen=:{{ .Values.storage.agent.service.grpcPort }}
              -host-ip=$HOST_IP
              -pod-ip=$POD_IP
              -meta-addr=novanas-storage-meta.{{ include "novanas.systemNamespace" . }}.svc:{{ .Values.storage.meta.service.grpcPort }}
              -dataplane-addr={{ .Values.storage.agent.dataplaneAddr | default "localhost:9500" }}
              -spdk-base-bdev={{ .Values.storage.agent.spdkBaseBdev | default "novanas_pool" }}
          env:
            - name: HOST_IP
              valueFrom: { fieldRef: { fieldPath: status.hostIP } }
            - name: POD_IP
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
          ports:
            - name: grpc
              containerPort: {{ .Values.storage.agent.service.grpcPort }}
              hostPort: {{ .Values.storage.agent.service.grpcPort }}
          envFrom:
            - configMapRef:
                name: novanas-storage-config
          resources:
            {{- toYaml .Values.storage.agent.resources | nindent 12 }}
          securityContext:
            # Agents need raw disk access for chunk persistence; capabilities
            # are constrained but privilege escalation is allowed for mount
            # operations when provisioning new pools.
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: true
            capabilities:
              add: ["SYS_ADMIN"]
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: {{ .Values.storage.agent.dataDir }}
            - name: dev
              mountPath: /dev
      volumes:
        - name: data
          hostPath:
            path: {{ .Values.storage.agent.dataDir }}
            type: DirectoryOrCreate
        - name: dev
          hostPath:
            path: /dev
{{- end }}
