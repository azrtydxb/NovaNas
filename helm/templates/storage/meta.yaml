{{/*
Metadata service. Deployed as a StatefulSet for stable identity even with
a single replica — allows predictable pod DNS for gRPC clients and a
persistent PVC for embedded metadata storage.
*/}}
{{- if .Values.storage.meta.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: novanas-storage-meta
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "storage-meta") | nindent 4 }}
spec:
  serviceName: novanas-storage-meta
  replicas: {{ .Values.storage.meta.replicas }}
  selector:
    matchLabels:
      {{- include "novanas.selectorLabels" (dict "ctx" . "component" "storage-meta") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "novanas.selectorLabels" (dict "ctx" . "component" "storage-meta") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/config/storage-configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: novanas-storage
      {{- include "novanas.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "novanas.securityContext" . | nindent 8 }}
      containers:
        - name: meta
          image: {{ include "novanas.image" (dict "ctx" . "image" .Values.storage.meta.image) }}
          imagePullPolicy: {{ include "novanas.imagePullPolicy" (dict "ctx" . "image" .Values.storage.meta.image) }}
          command: ["/usr/local/bin/novanas-storage-meta"]
          args:
            # Flags must match storage/cmd/meta/main.go — single-dash form,
            # `-grpc-addr` (not `--grpc-port`), `-data-dir` for the legacy
            # local-BadgerDB path. Chunk-backed mode requires a running
            # dataplane (storage.dataplane.enabled=true).
            - -grpc-addr=:{{ .Values.storage.meta.service.grpcPort }}
            - -data-dir=/var/lib/novanas/meta
            {{- if .Values.storage.meta.chunkBacked.enabled }}
            - -chunk-backed=true
            - -bootstrap-timeout={{ .Values.storage.meta.chunkBacked.bootstrapTimeout }}
            {{- end }}
            - -encryption-mode={{ .Values.storage.meta.encryption.mode }}
          ports:
            - name: grpc
              containerPort: {{ .Values.storage.meta.service.grpcPort }}
          envFrom:
            - configMapRef:
                name: novanas-storage-config
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.storage.meta.resources | nindent 12 }}
          securityContext:
            {{- include "novanas.containerSecurityContext" . | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/novanas/meta
  {{- if .Values.storage.meta.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "novanas.componentLabels" (dict "ctx" . "component" "storage-meta") | nindent 10 }}
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.storage.meta.persistence.size }}
        {{- with .Values.storage.meta.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
  {{- end }}
{{- end }}
