{{/*
Bootstrap-only K8s Secrets seeded at first install. After the first successful
boot the OpenBao init job migrates these into Transit-wrapped entries and the
Secret becomes informational (kept in-cluster for idempotent upgrade).

TODO(Wave 5+): replace with operator-driven secret rotation out of OpenBao.
*/}}
{{- if .Values.bootstrapSecret.create }}
{{- $existing := (lookup "v1" "Secret" (include "novanas.systemNamespace" .) .Values.bootstrapSecret.name) -}}
{{- $postgres := .Values.bootstrapSecret.postgresPassword | default (randAlphaNum 32) -}}
{{- $keycloak := .Values.bootstrapSecret.keycloakDbPassword | default (randAlphaNum 32) -}}
{{- $openbao  := .Values.bootstrapSecret.openbaoDbPassword  | default (randAlphaNum 32) -}}
{{- if $existing }}
{{- $postgres = index $existing.data "postgres-password" | b64dec -}}
{{- $keycloak = index $existing.data "keycloak-db-password" | b64dec -}}
{{- $openbao  = index $existing.data "openbao-db-password"  | b64dec -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.bootstrapSecret.name }}
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  postgres-password: {{ $postgres | quote }}
  keycloak-db-password: {{ $keycloak | quote }}
  openbao-db-password: {{ $openbao | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: novanas-postgresql
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  postgres-password: {{ $postgres | quote }}
  password: {{ $postgres | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: novanas-redis
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  redis-password: {{ .Values.bootstrapSecret.redisPassword | default (randAlphaNum 32) | quote }}
{{- end }}
