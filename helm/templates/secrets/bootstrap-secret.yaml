{{/*
Bootstrap-only K8s Secrets seeded at first install. After the first successful
boot the OpenBao init job migrates these into Transit-wrapped entries; the
Secret is kept (resource-policy: keep) for idempotent helm upgrade.

TODO(Wave 5+): replace with operator-driven secret rotation out of OpenBao.
*/}}
{{- if .Values.bootstrapSecret.create }}
{{- $existing := (lookup "v1" "Secret" (include "novanas.systemNamespace" .) .Values.bootstrapSecret.name) -}}
{{- $postgres      := .Values.bootstrapSecret.postgresPassword      | default (randAlphaNum 32) -}}
{{- $keycloakDb    := .Values.bootstrapSecret.keycloakDbPassword    | default (randAlphaNum 32) -}}
{{- $keycloakAdmin := .Values.bootstrapSecret.keycloakAdminPassword | default (randAlphaNum 24) -}}
{{- $openbaoDb     := .Values.bootstrapSecret.openbaoDbPassword     | default (randAlphaNum 32) -}}
{{- $openbaoToken  := .Values.bootstrapSecret.openbaoRootToken      | default (printf "novanas-dev-%s" (randAlphaNum 16)) -}}
{{- $kcApiSecret   := randAlphaNum 32 -}}
{{- $apiSession    := randAlphaNum 48 -}}
{{- if $existing }}
{{- with index $existing.data "postgres-password"            }}{{- $postgres      = . | b64dec }}{{- end }}
{{- with index $existing.data "keycloak-db-password"         }}{{- $keycloakDb    = . | b64dec }}{{- end }}
{{- with index $existing.data "keycloak-admin-password"      }}{{- $keycloakAdmin = . | b64dec }}{{- end }}
{{- with index $existing.data "openbao-db-password"          }}{{- $openbaoDb     = . | b64dec }}{{- end }}
{{- with index $existing.data "openbao-root-token"           }}{{- $openbaoToken  = . | b64dec }}{{- end }}
{{- with index $existing.data "keycloak-api-client-secret"   }}{{- $kcApiSecret   = . | b64dec }}{{- end }}
{{- with index $existing.data "api-session-secret"           }}{{- $apiSession    = . | b64dec }}{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.bootstrapSecret.name }}
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  postgres-password: {{ $postgres | quote }}
  keycloak-db-password: {{ $keycloakDb | quote }}
  keycloak-admin-password: {{ $keycloakAdmin | quote }}
  keycloak-api-client-secret: {{ $kcApiSecret | quote }}
  openbao-db-password: {{ $openbaoDb | quote }}
  openbao-root-token: {{ $openbaoToken | quote }}
  api-session-secret: {{ $apiSession | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: novanas-postgresql
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  postgres-password: {{ $postgres | quote }}
  password: {{ $postgres | quote }}
{{- if .Values.redis.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: novanas-redis
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  redis-password: {{ .Values.bootstrapSecret.redisPassword | default (randAlphaNum 32) | quote }}
{{- end }}
{{- end }}
