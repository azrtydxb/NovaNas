{{- if .Values.postgresql.enabled -}}
{{- $ns := include "novanas.systemNamespace" . -}}
apiVersion: v1
kind: Service
metadata:
  name: novanas-postgresql
  namespace: {{ $ns }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "postgresql") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: tcp
      port: 5432
      targetPort: 5432
  selector:
    {{- include "novanas.selectorLabels" (dict "ctx" . "component" "postgresql") | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: novanas-postgresql-headless
  namespace: {{ $ns }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "postgresql") | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: tcp
      port: 5432
      targetPort: 5432
  selector:
    {{- include "novanas.selectorLabels" (dict "ctx" . "component" "postgresql") | nindent 4 }}
{{- end }}
