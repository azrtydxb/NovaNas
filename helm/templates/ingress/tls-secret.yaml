{{/*
Self-signed TLS secret for the unified ingress.

Created only when:
  - ingress.enabled is true
  - ingress.tls.enabled is true
  - ingress.tls.secretName is empty (i.e. the user hasn't supplied a
    cert-manager-issued or otherwise-managed Secret)

The Secret is annotated with helm.sh/resource-policy=keep so it
survives `helm uninstall` and `helm upgrade` re-renders — that means
the cert+key remain stable across upgrades. To rotate, delete the
Secret manually and run `helm upgrade` again.

Browsers will display the standard "untrusted CA" warning since the
cert is self-signed. Production overlays should always supply
ingress.tls.secretName from cert-manager (or equivalent) and never
rely on this fallback.
*/}}
{{- /*
  Skip the helm-baked self-signed Secret when cert-manager is enabled —
  the Certificate resource creates the Secret with a real cert chain.
*/}}
{{- if and .Values.ingress.enabled .Values.ingress.tls.enabled (not .Values.ingress.tls.secretName) (not .Values.certManager.enabled) }}
{{- $ns := include "novanas.systemNamespace" . -}}
{{- $secretName := printf "%s-tls" (include "novanas.fullname" .) -}}
{{- $existing := (lookup "v1" "Secret" $ns $secretName) -}}
{{- $host := .Values.ingress.host | default .Values.global.publicHostname | default .Values.global.mdnsDomain -}}
{{- $altNames := concat (list $host) (.Values.ingress.tls.selfSigned.extraNames | default list) -}}
{{- $validity := .Values.ingress.tls.selfSigned.validityDays | default 365 | int -}}
{{- if $existing -}}
  {{- $cert := index $existing.data "tls.crt" | b64dec -}}
  {{- $key  := index $existing.data "tls.key" | b64dec -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $ns }}
  labels:
    {{- include "novanas.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert | b64enc | quote }}
  tls.key: {{ $key  | b64enc | quote }}
{{- else -}}
  {{- $cert := genSelfSignedCert $host nil $altNames $validity -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $ns }}
  labels:
    {{- include "novanas.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc | quote }}
  tls.key: {{ $cert.Key  | b64enc | quote }}
{{- end }}
{{- end }}
