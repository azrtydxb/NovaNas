{{/*
NFS-Ganesha server Pod.

Runs upstream nfs-ganesha userspace NFSv3/v4 server in a container.
Replaces the previous privileged-host-knfsd DaemonSet ("our own
build of kubernetes/nfs"). Configuration comes from the NovaNas API
(NfsServer + Share rows) — a polling sidecar will read
/api/v1/{nfs-servers,shares} via TokenReview-authenticated SA JWT
and write /etc/ganesha/ganesha.conf, then SIGHUP ganesha.nfsd.
The sidecar is tracked in #55; until it ships the Pod runs with
stock config and exports nothing.
*/}}
{{- if .Values.nfs.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: novanas-nfs
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "nfs") | nindent 4 }}
spec:
  replicas: {{ .Values.nfs.replicas }}
  selector:
    matchLabels:
      {{- include "novanas.selectorLabels" (dict "ctx" . "component" "nfs") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "novanas.selectorLabels" (dict "ctx" . "component" "nfs") | nindent 8 }}
    spec:
      # Use the shared host-agent SA so the sidecar's bearer token
      # presents to the api as the "novanas-host-agent" principal
      # (#55). The ganesha container itself doesn't talk to the api.
      serviceAccountName: novanas-host-agent
      {{- include "novanas.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: ganesha
          image: "{{ .Values.nfs.image.registry }}/{{ .Values.nfs.image.repository }}:{{ .Values.nfs.image.tag }}"
          imagePullPolicy: {{ .Values.nfs.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: nfs
              containerPort: 2049
              protocol: TCP
            - name: rpcbind
              containerPort: 111
              protocol: TCP
          resources:
            {{- toYaml .Values.nfs.resources | nindent 12 }}
          securityContext:
            # nfs-ganesha needs SYS_ADMIN for nfs4 mount-flagged dentries
            # and DAC_READ_SEARCH to traverse exported filesystems.
            allowPrivilegeEscalation: false
            capabilities:
              add: ["SYS_ADMIN", "DAC_READ_SEARCH", "SETUID", "SETGID"]
              drop: ["ALL"]
          volumeMounts:
            - name: ganesha-config
              mountPath: /etc/ganesha
            - name: ganesha-runtime
              mountPath: /var/run
        # Config-poller sidecar (#55). Renders /etc/ganesha/ganesha.conf
        # from /api/v1/nfs-servers + /api/v1/shares state and SIGHUPs
        # ganesha.nfsd whenever the rendered config changes.
        - name: config-poller
          image: "{{ include "novanas.image" (dict "ctx" . "image" .Values.hostAgent.image) }}"
          imagePullPolicy: {{ include "novanas.imagePullPolicy" (dict "ctx" . "image" .Values.hostAgent.image) }}
          args:
            - -api-url=http://novanas-api.{{ include "novanas.systemNamespace" . }}.svc:8080
            - -resource=nfs-servers
            - -template=/etc/host-agent-templates/ganesha.conf.tmpl
            - -output=/etc/ganesha/ganesha.conf
            - -pidfile=/var/run/ganesha.pid
            - -interval={{ .Values.hostAgent.interval | default "30s" }}
          volumeMounts:
            - name: ganesha-config
              mountPath: /etc/ganesha
            - name: ganesha-runtime
              mountPath: /var/run
            - name: host-agent-templates
              mountPath: /etc/host-agent-templates
              readOnly: true
      volumes:
        - name: ganesha-config
          emptyDir: {}
        - name: ganesha-runtime
          emptyDir: {}
        - name: host-agent-templates
          configMap:
            name: novanas-host-agent-templates
{{- end }}
