{{/*
NovaNas theme. Shipped as a ConfigMap mounted by the Keycloak StatefulSet
as an extra volume; the post-install job kicks Keycloak to pick it up.

TODO(Wave 5+): generate theme files from packages/ui design tokens.
*/}}
{{- if .Values.keycloak.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: novanas-keycloak-theme
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "keycloak-setup") | nindent 4 }}
data:
  theme.properties: |-
    parent=keycloak.v2
    import=common/keycloak
    styles=css/novanas.css
  novanas.css: |-
    /* Placeholder. Real theme assets will be wired in from the design system. */
    :root { --nn-brand: #3b82f6; }
{{- end }}
