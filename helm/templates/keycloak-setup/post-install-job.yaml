{{/*
Keycloak post-install Job.

Approach: use kcadm.sh (bundled in the Keycloak image) rather than the
external keycloak-config-cli so we can stay on the same image stream as
the server. The Job is idempotent — realm-exists / client-exists / theme-
sync are skipped when already in place.

Sequence:
  1. Wait for /realms/master/.well-known/openid-configuration to return 200
  2. kcadm config credentials (admin / password from OpenBao-minted Secret)
  3. Fetch per-client secrets from OpenBao (mounted via agent sidecar) and
     perform envsubst on the realm JSON (ADMIN_PASSWORD, NOVANAS_API_CLIENT_SECRET,
     GRAFANA_CLIENT_SECRET).
  4. If the `novanas` realm exists, `update` it; otherwise `create`.
  5. The theme is delivered via ConfigMap-mounted files in the Keycloak
     pod (see theme-configmap.yaml). This Job only bumps a marker attribute
     on the realm to force Keycloak to clear the theme cache.
*/}}
{{- if and .Values.keycloak.enabled (default true .Values.keycloak.realm.enabled) }}
{{- $hostname := .Values.global.publicHostname | default (printf "novanas.%s" .Values.global.mdnsDomain) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: novanas-keycloak-setup
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "keycloak-setup") | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "novanas.selectorLabels" (dict "ctx" . "component" "keycloak-setup") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: novanas-operators
      containers:
        - name: kcadm
          image: "{{ .Values.keycloak.image.registry }}/{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          command: ["/bin/bash", "-c"]
          env:
            - name: KC_SERVER
              value: "http://novanas-keycloak.{{ include "novanas.systemNamespace" . }}.svc"
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloak.auth.adminUser | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrapSecret.name }}
                  key: keycloak-admin-password
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrapSecret.name }}
                  key: keycloak-admin-password
            - name: NOVANAS_API_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: novanas-bootstrap
                  key: keycloak-api-client-secret
                  optional: true
            - name: GRAFANA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: novanas-bootstrap
                  key: keycloak-grafana-secret
                  optional: true
          args:
            - |
              set -euo pipefail

              # --- Wait for Keycloak readiness -------------------------------
              # The keycloak container image does NOT ship curl/wget. We use
              # kcadm's `config credentials` against the master realm as the
              # readiness probe — it's idempotent and guaranteed to be on
              # the PATH inside this image.
              echo "[keycloak-setup] waiting for keycloak master realm ..."
              attempts=0
              until /opt/keycloak/bin/kcadm.sh config credentials \
                  --server "${KC_SERVER}" \
                  --realm master \
                  --user "${KEYCLOAK_ADMIN}" \
                  --password "${KEYCLOAK_ADMIN_PASSWORD}" >/dev/null 2>&1; do
                attempts=$((attempts + 1))
                if [ $attempts -gt 60 ]; then
                  echo "[keycloak-setup] keycloak did not become ready in 5min — giving up"
                  exit 1
                fi
                sleep 5
              done
              echo "[keycloak-setup] keycloak is ready"

              # --- Authenticate ---------------------------------------------
              /opt/keycloak/bin/kcadm.sh config credentials \
                --server "${KC_SERVER}" \
                --realm master \
                --user "${KEYCLOAK_ADMIN}" \
                --password "${KEYCLOAK_ADMIN_PASSWORD}"

              # --- Envsubst the realm JSON ---------------------------------
              # Defaults for optional secrets (kcadm will accept placeholder
              # secrets; the operator reconciler will rotate them).
              : "${ADMIN_PASSWORD:=ChangeMeOnFirstLogin!}"
              : "${NOVANAS_API_CLIENT_SECRET:=$(head -c 32 /dev/urandom | base64 | tr -d '=+/' | head -c 32)}"
              : "${GRAFANA_CLIENT_SECRET:=$(head -c 32 /dev/urandom | base64 | tr -d '=+/' | head -c 32)}"

              # The keycloak image doesn't ship envsubst. Substitute the
              # placeholders we know about by hand. Each value is escaped
              # for sed by doubling slashes/ampersands; in practice these
              # are alphanumeric/randAlphaNum so it's safe.
              sed \
                -e "s|\${ADMIN_PASSWORD}|${ADMIN_PASSWORD}|g" \
                -e "s|\${NOVANAS_API_CLIENT_SECRET}|${NOVANAS_API_CLIENT_SECRET}|g" \
                -e "s|\${GRAFANA_CLIENT_SECRET}|${GRAFANA_CLIENT_SECRET}|g" \
                /realm/novanas-realm.json > /tmp/realm.json

              # --- Create or update the realm ------------------------------
              if /opt/keycloak/bin/kcadm.sh get realms/novanas >/dev/null 2>&1; then
                echo "[keycloak-setup] realm 'novanas' exists — updating partial state"
                /opt/keycloak/bin/kcadm.sh update realms/novanas \
                  -s displayName="NovaNas" \
                  -s loginTheme="{{ default "novanas" "novanas" }}" \
                  -s 'attributes."novanas.realmBootstrap"'="{{ .Chart.AppVersion }}"
              else
                echo "[keycloak-setup] creating realm 'novanas'"
                /opt/keycloak/bin/kcadm.sh create realms -f /tmp/realm.json
              fi

              # --- Ensure standard OIDC client scopes exist ---------------
              # Realm JSON's `clientScopes` array overrides the defaults
              # keycloak would otherwise create. Re-create the standard
              # OIDC scopes (profile/email/roles/web-origins) idempotently
              # so confidential clients can request them. We rely on
              # kcadm rejecting duplicates (exit code != 0) — `|| true`
              # turns that into a no-op.
              EXISTING_SCOPES=$(/opt/keycloak/bin/kcadm.sh get client-scopes -r novanas --fields name 2>/dev/null || echo '[]')
              for scope in profile email roles web-origins; do
                if echo "$EXISTING_SCOPES" | grep -q "\"name\" : \"$scope\""; then
                  continue
                fi
                echo "[keycloak-setup] creating client-scope '$scope'"
                /opt/keycloak/bin/kcadm.sh create client-scopes -r novanas \
                  -s name=$scope -s protocol=openid-connect \
                  -s 'attributes."include.in.token.scope"=true' \
                  -s 'attributes."consent.screen.text"='"$scope" \
                  -s 'attributes."display.on.consent.screen"=true' >/dev/null \
                  || echo "[keycloak-setup] scope '$scope' creation skipped"
              done
              # Re-fetch — the loop above may have added new ones.
              SCOPES_JSON=$(/opt/keycloak/bin/kcadm.sh get client-scopes -r novanas --fields id,name 2>/dev/null)

              # --- Assign standard scopes as defaults on novanas-api ------
              CLIENT_UUID=$(/opt/keycloak/bin/kcadm.sh get clients -r novanas \
                -q clientId=novanas-api --fields id 2>/dev/null \
                | sed -n 's/.*"id" : "\([^"]*\)".*/\1/p' | head -1)
              # Map scope name → scope id from the JSON we just fetched.
              # The keycloak image has neither awk nor python, so we
              # do it in pure bash: kcadm prints each object as
              #   "id" : "<uuid>",\n  "name" : "<n>"\n
              # — the id always immediately precedes its name, so we
              # remember the last id seen and emit it on a name match.
              get_scope_id() {
                local last_id=""
                while IFS= read -r line; do
                  case "$line" in
                    *'"id"'*)
                      last_id=$(echo "$line" | sed -E 's/.*"id" *: *"([^"]+)".*/\1/')
                      ;;
                    *'"name" : "'"$1"'"'*)
                      echo "$last_id"
                      return 0
                      ;;
                  esac
                done <<< "$SCOPES_JSON"
              }
              if [ -n "$CLIENT_UUID" ]; then
                for scope in profile email roles web-origins novanas:roles; do
                  SCOPE_ID=$(get_scope_id "$scope")
                  if [ -n "$SCOPE_ID" ]; then
                    /opt/keycloak/bin/kcadm.sh update \
                      "clients/$CLIENT_UUID/default-client-scopes/$SCOPE_ID" \
                      -r novanas 2>/dev/null || true
                  fi
                done
                echo "[keycloak-setup] ensured default-client-scopes on novanas-api"

                # --- Sync client secret with the bootstrap Secret -----
                # When the realm already existed we did NOT re-import it,
                # so the client's stored secret may diverge from the
                # value the api reads at boot. Force it back into
                # alignment on every run (cheap, idempotent).
                /opt/keycloak/bin/kcadm.sh update "clients/$CLIENT_UUID" -r novanas \
                  -s "secret=$NOVANAS_API_CLIENT_SECRET" 2>/dev/null || true
                echo "[keycloak-setup] synced novanas-api client secret with bootstrap"

                # --- Sync redirect URIs with the current external host
                # When the publicHostname / scheme changes (e.g. moving
                # between dev / prod overlays) the redirectUris baked
                # into the realm during first install go stale. Reset
                # them on every run so users aren't tripped up by
                # "Invalid parameter: redirect_uri".
                /opt/keycloak/bin/kcadm.sh update "clients/$CLIENT_UUID" -r novanas \
                  -s 'redirectUris=["https://{{ $hostname }}/api/v1/auth/callback","http://{{ $hostname }}/api/v1/auth/callback"]' \
                  -s 'webOrigins=["+"]' \
                  -s 'standardFlowEnabled=true' \
                  -s 'directAccessGrantsEnabled=true' \
                  2>/dev/null || true
                echo "[keycloak-setup] synced novanas-api client redirectUris/grants with publicHostname"
              fi

              echo "[keycloak-setup] complete"
          volumeMounts:
            - name: realm
              mountPath: /realm
              readOnly: true
      volumes:
        - name: realm
          configMap:
            name: novanas-keycloak-realm
{{- end }}
