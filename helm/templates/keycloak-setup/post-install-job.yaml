{{/*
Keycloak post-install Job.

Approach: use kcadm.sh (bundled in the Keycloak image) rather than the
external keycloak-config-cli so we can stay on the same image stream as
the server. The Job is idempotent — realm-exists / client-exists / theme-
sync are skipped when already in place.

Sequence:
  1. Wait for /realms/master/.well-known/openid-configuration to return 200
  2. kcadm config credentials (admin / password from OpenBao-minted Secret)
  3. Fetch per-client secrets from OpenBao (mounted via agent sidecar) and
     perform envsubst on the realm JSON (ADMIN_PASSWORD, NOVANAS_API_CLIENT_SECRET,
     GRAFANA_CLIENT_SECRET).
  4. If the `novanas` realm exists, `update` it; otherwise `create`.
  5. The theme is delivered via ConfigMap-mounted files in the Keycloak
     pod (see theme-configmap.yaml). This Job only bumps a marker attribute
     on the realm to force Keycloak to clear the theme cache.
*/}}
{{- if and .Values.keycloak.enabled (default true .Values.keycloak.realm.enabled) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: novanas-keycloak-setup
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "keycloak-setup") | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "novanas.selectorLabels" (dict "ctx" . "component" "keycloak-setup") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: novanas-operators
      containers:
        - name: kcadm
          image: "{{ .Values.keycloak.image.registry }}/{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          command: ["/bin/bash", "-c"]
          env:
            - name: KC_SERVER
              value: "http://novanas-keycloak.{{ include "novanas.systemNamespace" . }}.svc"
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloak.auth.adminUser | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrapSecret.name }}
                  key: keycloak-admin-password
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrapSecret.name }}
                  key: keycloak-admin-password
            - name: NOVANAS_API_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: novanas-bootstrap
                  key: keycloak-novanas-api-secret
                  optional: true
            - name: GRAFANA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: novanas-bootstrap
                  key: keycloak-grafana-secret
                  optional: true
          args:
            - |
              set -euo pipefail

              # --- Wait for Keycloak readiness -------------------------------
              # The keycloak container image does NOT ship curl/wget. We use
              # kcadm's `config credentials` against the master realm as the
              # readiness probe — it's idempotent and guaranteed to be on
              # the PATH inside this image.
              echo "[keycloak-setup] waiting for keycloak master realm ..."
              attempts=0
              until /opt/keycloak/bin/kcadm.sh config credentials \
                  --server "${KC_SERVER}" \
                  --realm master \
                  --user "${KEYCLOAK_ADMIN}" \
                  --password "${KEYCLOAK_ADMIN_PASSWORD}" >/dev/null 2>&1; do
                attempts=$((attempts + 1))
                if [ $attempts -gt 60 ]; then
                  echo "[keycloak-setup] keycloak did not become ready in 5min — giving up"
                  exit 1
                fi
                sleep 5
              done
              echo "[keycloak-setup] keycloak is ready"

              # --- Authenticate ---------------------------------------------
              /opt/keycloak/bin/kcadm.sh config credentials \
                --server "${KC_SERVER}" \
                --realm master \
                --user "${KEYCLOAK_ADMIN}" \
                --password "${KEYCLOAK_ADMIN_PASSWORD}"

              # --- Envsubst the realm JSON ---------------------------------
              # Defaults for optional secrets (kcadm will accept placeholder
              # secrets; the operator reconciler will rotate them).
              : "${ADMIN_PASSWORD:=ChangeMeOnFirstLogin!}"
              : "${NOVANAS_API_CLIENT_SECRET:=$(head -c 32 /dev/urandom | base64 | tr -d '=+/' | head -c 32)}"
              : "${GRAFANA_CLIENT_SECRET:=$(head -c 32 /dev/urandom | base64 | tr -d '=+/' | head -c 32)}"

              # The keycloak image doesn't ship envsubst. Substitute the
              # placeholders we know about by hand. Each value is escaped
              # for sed by doubling slashes/ampersands; in practice these
              # are alphanumeric/randAlphaNum so it's safe.
              sed \
                -e "s|\${ADMIN_PASSWORD}|${ADMIN_PASSWORD}|g" \
                -e "s|\${NOVANAS_API_CLIENT_SECRET}|${NOVANAS_API_CLIENT_SECRET}|g" \
                -e "s|\${GRAFANA_CLIENT_SECRET}|${GRAFANA_CLIENT_SECRET}|g" \
                /realm/novanas-realm.json > /tmp/realm.json

              # --- Create or update the realm ------------------------------
              if /opt/keycloak/bin/kcadm.sh get realms/novanas >/dev/null 2>&1; then
                echo "[keycloak-setup] realm 'novanas' exists — updating partial state"
                # Keycloak doesn't expose a single 'update realm from file' op
                # via kcadm, but partial updates of attributes are safe and
                # trigger a theme-cache clear.
                /opt/keycloak/bin/kcadm.sh update realms/novanas \
                  -s displayName="NovaNas" \
                  -s loginTheme="{{ default "novanas" "novanas" }}" \
                  -s 'attributes."novanas.realmBootstrap"'="{{ .Chart.AppVersion }}"
              else
                echo "[keycloak-setup] creating realm 'novanas'"
                /opt/keycloak/bin/kcadm.sh create realms -f /tmp/realm.json
              fi

              echo "[keycloak-setup] complete"
          volumeMounts:
            - name: realm
              mountPath: /realm
              readOnly: true
      volumes:
        - name: realm
          configMap:
            name: novanas-keycloak-realm
{{- end }}
