{{/*
Keycloak admin password rotation CronJob.

Rotates the realm admin password on a fixed cadence (default every 90d),
stores the new password in OpenBao at
  secret/data/novanas/keycloak/admin
and updates the `novanas-bootstrap` Secret that other components read on
pod boot. The CronJob is idempotent — if a run fails partway (for
example, OpenBao write succeeds but Secret update fails), the next run
will recover because kcadm is called with the OpenBao-stored password,
not the one in the Secret.

Image: reuses the Keycloak image so kcadm.sh is available. Vault agent
sidecar injects the current admin password at /vault/secrets/admin and
an OpenBao token at /vault/token. The rotation script writes the new
password back to OpenBao via curl and patches the Secret via kubectl.
*/}}
{{- if and .Values.keycloak.enabled .Values.keycloak.adminPasswordRotation.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: novanas-keycloak-admin-rotate
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "keycloak-setup") | nindent 4 }}
spec:
  # Default: 03:15 UTC on the first of the month. Frequency is
  # controlled by values.yaml (keycloak.adminPasswordRotation.schedule)
  # and the in-script age-check gate (only rotate when older than N days).
  schedule: {{ .Values.keycloak.adminPasswordRotation.schedule | default "15 3 1 * *" | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            {{- include "novanas.selectorLabels" (dict "ctx" . "component" "keycloak-setup") | nindent 12 }}
          annotations:
            vault.hashicorp.com/agent-inject: "true"
            vault.hashicorp.com/role: "novanas-keycloak-admin"
            vault.hashicorp.com/agent-inject-secret-admin: "secret/data/novanas/keycloak/admin"
            vault.hashicorp.com/agent-inject-template-admin: |
              {{`{{- with secret "secret/data/novanas/keycloak/admin" -}}
              {{ .Data.data.password }}
              {{- end }}`}}
        spec:
          restartPolicy: OnFailure
          serviceAccountName: novanas-operators
          containers:
            - name: rotate
              image: {{ .Values.keycloak.adminPasswordRotation.image | default "quay.io/keycloak/keycloak:26.0" | quote }}
              env:
                - name: KC_URL
                  value: {{ .Values.keycloak.internalURL | default "http://novanas-keycloak:8080" | quote }}
                - name: KC_REALM
                  value: {{ .Values.keycloak.realm.name | default "novanas" | quote }}
                - name: KC_ADMIN_USER
                  value: {{ .Values.keycloak.adminUser | default "admin" | quote }}
                - name: BOOTSTRAP_SECRET
                  value: {{ .Values.keycloak.bootstrapSecretName | default "novanas-bootstrap" | quote }}
                - name: MIN_AGE_DAYS
                  value: {{ .Values.keycloak.adminPasswordRotation.minAgeDays | default 90 | quote }}
                - name: OPENBAO_ADDR
                  value: {{ .Values.openbao.address | default "http://novanas-openbao:8200" | quote }}
              command:
                - /bin/bash
                - -euo
                - pipefail
                - -c
                - |
                  set -euo pipefail

                  CURRENT_PW="$(cat /vault/secrets/admin)"
                  VAULT_TOKEN="$(cat /vault/token)"

                  # Skip if the secret is younger than MIN_AGE_DAYS.
                  AGE_META=$(curl -fsS -H "X-Vault-Token: ${VAULT_TOKEN}" \
                    "${OPENBAO_ADDR}/v1/secret/metadata/novanas/keycloak/admin" || true)
                  UPDATED=$(echo "${AGE_META}" | sed -n 's/.*"updated_time":"\([^"]*\)".*/\1/p')
                  if [[ -n "${UPDATED}" ]]; then
                    if [[ $(( ( $(date +%s) - $(date -d "${UPDATED}" +%s) ) / 86400 )) -lt ${MIN_AGE_DAYS} ]]; then
                      echo "admin password age < ${MIN_AGE_DAYS}d; skipping rotation"
                      exit 0
                    fi
                  fi

                  # Authenticate kcadm with the current password.
                  /opt/keycloak/bin/kcadm.sh config credentials \
                    --server "${KC_URL}" --realm master \
                    --user "${KC_ADMIN_USER}" --password "${CURRENT_PW}"

                  # Generate a 32-byte base64url password.
                  NEW_PW=$(head -c 32 /dev/urandom | base64 | tr '+/' '-_' | tr -d '=')

                  # Apply to Keycloak master realm.
                  /opt/keycloak/bin/kcadm.sh set-password -r master \
                    --username "${KC_ADMIN_USER}" --new-password "${NEW_PW}"

                  # Persist to OpenBao (kv v2).
                  curl -fsS -X POST \
                    -H "X-Vault-Token: ${VAULT_TOKEN}" \
                    -H "Content-Type: application/json" \
                    -d "{\"data\":{\"password\":\"${NEW_PW}\",\"rotated_at\":\"$(date -u +%FT%TZ)\"}}" \
                    "${OPENBAO_ADDR}/v1/secret/data/novanas/keycloak/admin" > /dev/null

                  # Patch the bootstrap Secret so other components pick up the
                  # new password on their next pod restart.
                  NEW_PW_B64=$(printf "%s" "${NEW_PW}" | base64 -w0)
                  kubectl -n {{ include "novanas.systemNamespace" . }} patch secret "${BOOTSTRAP_SECRET}" \
                    --type merge \
                    -p "{\"data\":{\"keycloak-admin-password\":\"${NEW_PW_B64}\"}}"

                  echo "keycloak admin password rotated successfully"
              volumeMounts:
                - name: vault-token
                  mountPath: /vault/token
                  subPath: token
              resources:
                requests:
                  cpu: "50m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "256Mi"
          volumes:
            - name: vault-token
              projected:
                sources:
                  - serviceAccountToken:
                      path: token
                      audience: openbao
                      expirationSeconds: 600
{{- end }}
