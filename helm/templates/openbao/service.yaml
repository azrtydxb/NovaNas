{{- if .Values.openbao.enabled -}}
{{- $ns := include "novanas.systemNamespace" . -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: novanas-openbao
  namespace: {{ $ns }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "openbao") | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: novanas-openbao
  namespace: {{ $ns }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "openbao") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8200
      targetPort: 8200
    - name: cluster
      port: 8201
      targetPort: 8201
  selector:
    {{- include "novanas.selectorLabels" (dict "ctx" . "component" "openbao") | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: novanas-openbao-headless
  namespace: {{ $ns }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "openbao") | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: http
      port: 8200
      targetPort: 8200
    - name: cluster
      port: 8201
      targetPort: 8201
  selector:
    {{- include "novanas.selectorLabels" (dict "ctx" . "component" "openbao") | nindent 4 }}
{{- end }}
