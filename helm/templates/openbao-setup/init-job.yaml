{{/*
OpenBao bootstrap Job (production mode).

Runs once post-install (and on upgrades) to:
  0. INIT — if openbao reports uninitialized, run `bao operator init`
     with one key share, capture the unseal key + root token, and
     persist them as Secret `novanas-openbao-keys`. Subsequent runs
     read the root token back from this Secret.
  1. UNSEAL — if openbao is sealed, apply unseal shares from the
     keys Secret. The unseal sidecar in the openbao pod normally
     handles this on restart; the Job covers the first-install
     window before the sidecar can find the (not-yet-created) Secret.
  2. Enable the engines: transit, pki, kv-v2 at `secret/`.
  3. Configure a root internal CA at `pki/`.
  4. Enable and configure the Kubernetes auth method.
  5. Write all ACL policies from the mounted ConfigMap.
  6. Bind NovaNas ServiceAccounts to their policies (k8s auth roles).
  7. Create the chunk-engine master key:
     `bao write transit/keys/novanas-chunk-master type=aes256-gcm96`

Every step uses `|| true` / idempotent checks. Safe to re-run.

NOTE: this is full file-backend production mode. The unseal key lives
in a Kubernetes Secret on the same cluster, which is fine for a
single-node appliance but should be replaced with TPM/KMS auto-unseal
for multi-tenant production.
*/}}
{{- if and .Values.openbao.enabled .Values.openbao.policies.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: novanas-openbao-init-script
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "openbao-setup") | nindent 4 }}
data:
  init.sh: |-
    #!/bin/sh
    set -eu

    NS="{{ include "novanas.systemNamespace" . }}"
    CLUSTER="{{ .Values.global.clusterName }}"

    echo "[openbao-init] BAO_ADDR=${BAO_ADDR}"

    KEYS_SECRET="novanas-openbao-keys"

    # --- 0a. Wait for the server to respond (any state) ----------------
    # rc 0 = unsealed, 1 = error/uninitialized/transient, 2 = sealed.
    # Any of {0,2} means the server is up; rc=1 with "not yet initialized"
    # also counts as "up". We bail only on persistent connection errors.
    attempts=0
    until bao status >/tmp/s.out 2>&1; rc=$?; [ $rc -eq 0 ] || [ $rc -eq 2 ] || grep -qi 'not yet initialized\|not initialized' /tmp/s.out; do
      attempts=$((attempts + 1))
      if [ "$attempts" -gt 60 ]; then
        echo "[openbao-init] timed out waiting for openbao"
        cat /tmp/s.out
        exit 1
      fi
      echo "[openbao-init] waiting for openbao... (rc=$rc)"
      sleep 5
    done

    # --- 0b. Initialize if needed --------------------------------------
    if grep -qi 'not yet initialized\|not initialized\|Initialized.*false' /tmp/s.out 2>/dev/null \
        || ! bao status -format=json 2>/dev/null | grep -q '"initialized":[[:space:]]*true'; then
      if kubectl -n "${NS}" get secret "${KEYS_SECRET}" >/dev/null 2>&1; then
        echo "[openbao-init] keys Secret exists but server says uninitialized — refusing to re-init (data loss risk)"
        exit 1
      fi
      echo "[openbao-init] running bao operator init (1 share, threshold 1)"
      bao operator init -key-shares=1 -key-threshold=1 -format=json > /tmp/init.json
      UNSEAL_KEY=$(awk -F'"' '/unseal_keys_b64/{f=1;next} f && /"/{print $2; exit}' /tmp/init.json)
      ROOT_TOKEN=$(awk -F'"' '/"root_token"/{print $4; exit}' /tmp/init.json)
      if [ -z "${UNSEAL_KEY}" ] || [ -z "${ROOT_TOKEN}" ]; then
        echo "[openbao-init] failed to parse init output"
        cat /tmp/init.json
        exit 1
      fi
      kubectl -n "${NS}" create secret generic "${KEYS_SECRET}" \
        --from-literal=unseal-key-1="${UNSEAL_KEY}" \
        --from-literal=root-token="${ROOT_TOKEN}"
      echo "[openbao-init] keys Secret created"
    else
      echo "[openbao-init] already initialized"
    fi

    # --- 0c. Load root token + unseal if sealed ------------------------
    ROOT_TOKEN=$(kubectl -n "${NS}" get secret "${KEYS_SECRET}" -o jsonpath='{.data.root-token}' | base64 -d)
    UNSEAL_KEY=$(kubectl -n "${NS}" get secret "${KEYS_SECRET}" -o jsonpath='{.data.unseal-key-1}' | base64 -d)
    if [ -z "${ROOT_TOKEN}" ] || [ -z "${UNSEAL_KEY}" ]; then
      echo "[openbao-init] keys Secret missing required fields"
      exit 1
    fi
    export BAO_TOKEN="${ROOT_TOKEN}"
    export VAULT_TOKEN="${ROOT_TOKEN}"

    # Unseal if needed. rc 0 = unsealed, 2 = sealed, anything else = error.
    bao status >/dev/null 2>&1
    case $? in
      0) echo "[openbao-init] already unsealed" ;;
      2)
        echo "[openbao-init] sealed — unsealing"
        bao operator unseal "${UNSEAL_KEY}" >/dev/null
        bao status >/dev/null 2>&1 || { echo "[openbao-init] unseal failed"; exit 1; }
        ;;
      *) echo "[openbao-init] bao status unreachable"; exit 1 ;;
    esac

    # Helper: run a command, ignore "already exists"/"path is already in use" style errors.
    ok() { "$@" 2>&1 | tee /tmp/out; grep -qi "already\|exist" /tmp/out && return 0 || return ${PIPESTATUS:-0}; }

    # --- 2. Enable engines ---------------------------------------------
    bao secrets enable -path=transit transit            2>/dev/null || true
    bao secrets enable -path=secret -version=2 kv       2>/dev/null || true
    bao secrets enable -path=pki    -max-lease-ttl=87600h pki 2>/dev/null || true

    # --- 3. Configure PKI root -----------------------------------------
    if ! bao read pki/cert/ca >/dev/null 2>&1; then
      bao write -field=certificate pki/root/generate/internal \
        common_name="NovaNas Root CA (${CLUSTER})" \
        ttl=87600h > /dev/null || true
      bao write pki/config/urls \
        issuing_certificates="${BAO_ADDR}/v1/pki/ca" \
        crl_distribution_points="${BAO_ADDR}/v1/pki/crl" >/dev/null || true
    fi
    bao write pki/roles/novanas-internal \
      allowed_domains="svc,cluster.local,${NS}.svc,${NS}.svc.cluster.local" \
      allow_subdomains=true \
      allow_bare_domains=true \
      max_ttl=720h >/dev/null 2>&1 || true

    # --- 4. Enable kubernetes auth -------------------------------------
    bao auth enable kubernetes 2>/dev/null || true
    bao write auth/kubernetes/config \
      kubernetes_host="https://kubernetes.default.svc" \
      kubernetes_ca_cert=@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
      token_reviewer_jwt=@/var/run/secrets/kubernetes.io/serviceaccount/token \
      disable_iss_validation=true >/dev/null 2>&1 || \
    bao write auth/kubernetes/config \
      kubernetes_host="https://kubernetes.default.svc" >/dev/null

    # --- 5. Write all policies -----------------------------------------
    for p in /policies/*.hcl; do
      name=$(basename "$p" .hcl)
      # skip the reference-only template (starts with novanas-user-tmpl)
      case "$name" in
        novanas-user-tmpl) continue ;;
      esac
      echo "[openbao-init] writing policy $name"
      bao policy write "$name" "$p"
    done

    # --- 6. Bind ServiceAccounts to policies ---------------------------
    # Map of role -> (sa, namespace, policy). Kept inline — additions made
    # by operators at runtime via the novanas-operators policy.
    bind_role() {
      role="$1"; sa="$2"; ns="$3"; policy="$4"; ttl="${5:-1h}"
      # OK if the SA doesn't exist yet — Kubernetes binds names to
      # SubjectAccessReviews at auth time, not at role-creation time.
      # The policy must exist though; a typo here would silently bind
      # nothing.
      if ! bao policy list 2>/dev/null | grep -q "^${policy}$"; then
        echo "[openbao-init] skipping role ${role}: policy ${policy} doesn't exist"
        return 0
      fi
      bao write "auth/kubernetes/role/${role}" \
        bound_service_account_names="${sa}" \
        bound_service_account_namespaces="${ns}" \
        policies="${policy}" \
        ttl="${ttl}" >/dev/null || true
    }

    bind_role novanas-api          novanas-api          "${NS}" novanas-api          1h
    bind_role novanas-operators    novanas-operators    "${NS}" novanas-operators    1h
    bind_role novanas-storage-meta novanas-storage-meta "${NS}" novanas-storage-meta 1h
    bind_role novanas-storage-agent novanas-storage-agent "${NS}" novanas-storage-agent 1h
    bind_role novanas-s3gw         novanas-s3gw         "${NS}" novanas-s3gw         1h
    bind_role novanas-admin        novanas-admin        "${NS}" novanas-admin        30m

    # --- 7. Chunk engine master key ------------------------------------
    if ! bao read transit/keys/novanas-chunk-master >/dev/null 2>&1; then
      echo "[openbao-init] creating chunk-engine master key"
      bao write -f transit/keys/novanas-chunk-master type=aes256-gcm96
      bao write transit/keys/novanas-chunk-master/config \
        deletion_allowed=false \
        exportable=false \
        allow_plaintext_backup=false >/dev/null
    fi

    # Convenience keys per component scope. Idempotent.
    for k in novanas-api novanas-kms-default; do
      bao read "transit/keys/${k}" >/dev/null 2>&1 || \
        bao write -f "transit/keys/${k}" type=aes256-gcm96
    done

    # Record a marker so operators can detect completion.
    bao kv put secret/novanas/bootstrap \
      timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
      version="{{ .Chart.AppVersion }}" >/dev/null || true

    echo "[openbao-init] complete"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: novanas-openbao-init
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "openbao-setup") | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "novanas.selectorLabels" (dict "ctx" . "component" "openbao-setup") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: novanas-operators
      initContainers:
        # The openbao image has `bao` but no kubectl; the kubectl image
        # has kubectl but no bao. Static-link advantage of Go: copy the
        # bao binary into a shared volume so the main container has both.
        - name: copy-bao
          image: "{{ .Values.openbao.image.registry }}/{{ .Values.openbao.image.repository }}:{{ .Values.openbao.image.tag }}"
          command: ["/bin/sh", "-c", "cp /bin/bao /tools/bao && chmod +x /tools/bao"]
          volumeMounts:
            - { name: tools, mountPath: /tools }
      containers:
        - name: bootstrap
          # bitnami pruned older tags; use :latest (image is small + stable
          # across kubectl minor versions, and we only run `get/create secret`).
          image: "bitnami/kubectl:latest"
          command: ["/bin/sh", "/scripts/init.sh"]
          env:
            # Prepend /tools (bao binary copied from openbao image) to the
            # default PATH (which already includes the bitnami kubectl dir).
            - name: PATH
              value: "/tools:/opt/bitnami/kubectl/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            {{- $scheme := ternary "https" "http" .Values.openbao.tls.enabled }}
            {{- $svc := printf "novanas-openbao.%s.svc:8200" (include "novanas.systemNamespace" .) }}
            - name: BAO_ADDR
              value: {{ printf "%s://%s" $scheme $svc | quote }}
            - name: VAULT_ADDR
              value: {{ printf "%s://%s" $scheme $svc | quote }}
            {{- if .Values.openbao.tls.enabled }}
            - name: BAO_CACERT
              value: "/openbao/tls/ca.crt"
            - name: VAULT_CACERT
              value: "/openbao/tls/ca.crt"
            {{- end }}
            # No pre-set token. The script either runs `bao operator init`
            # (first install) or reads the root token back from the
            # novanas-openbao-keys Secret created on the previous run.
          volumeMounts:
            - { name: tools,    mountPath: /tools }
            - { name: policies, mountPath: /policies, readOnly: true }
            - { name: scripts,  mountPath: /scripts,  readOnly: true }
            {{- if .Values.openbao.tls.enabled }}
            - { name: tls,      mountPath: /openbao/tls, readOnly: true }
            {{- end }}
      volumes:
        - name: tools
          emptyDir: {}
        - name: policies
          configMap:
            name: novanas-openbao-policies
        - name: scripts
          configMap:
            name: novanas-openbao-init-script
            defaultMode: 0755
        {{- if .Values.openbao.tls.enabled }}
        - name: tls
          secret:
            secretName: novanas-openbao-tls
        {{- end }}
{{- end }}
