{{/*
Templated form of packages/operators/config/manager/manager.yaml.
Keep behaviour parity: same probes, same args, same securityContext.
*/}}
{{- if .Values.operators.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: novanas-operators
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "operators") | nindent 4 }}
    app.kubernetes.io/component: controller-manager
spec:
  replicas: {{ .Values.operators.replicas }}
  selector:
    matchLabels:
      {{- include "novanas.selectorLabels" (dict "ctx" . "component" "operators") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "novanas.selectorLabels" (dict "ctx" . "component" "operators") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/config/operators-configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: novanas-operators
      {{- include "novanas.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: manager
          image: {{ include "novanas.image" (dict "ctx" . "image" .Values.operators.image) }}
          imagePullPolicy: {{ include "novanas.imagePullPolicy" (dict "ctx" . "image" .Values.operators.image) }}
          args:
            - --metrics-bind-address=:{{ .Values.operators.metricsPort }}
            - --health-probe-bind-address=:{{ .Values.operators.healthPort }}
            {{- if .Values.operators.leaderElect }}
            - --leader-elect
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.operators.metricsPort }}
            - name: health
              containerPort: {{ .Values.operators.healthPort }}
          envFrom:
            - configMapRef:
                name: novanas-operators-config
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OPENBAO_ADDR
              value: {{ .Values.openbao.address | default (printf "http://novanas-openbao.%s.svc:8200" (include "novanas.systemNamespace" .)) | quote }}
            {{- if .Values.openbao.devMode }}
            - name: OPENBAO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrapSecret.name }}
                  key: openbao-root-token
            {{- end }}
            - name: KEYCLOAK_URL
              value: {{ .Values.keycloak.internalURL | default (printf "http://novanas-keycloak.%s.svc" (include "novanas.systemNamespace" .)) | quote }}
            {{- if and .Values.storage.meta .Values.storage.meta.enabled }}
            - name: STORAGE_META_ADDR
              value: "novanas-storage-meta.{{ include "novanas.systemNamespace" . }}.svc:7001"
            {{- else }}
            # Storage meta service is disabled in this overlay; the
            # operator falls back to a no-op storage client.
            - name: NOVANAS_DEV
              value: "1"
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.operators.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop: ["ALL"]
{{- end }}
