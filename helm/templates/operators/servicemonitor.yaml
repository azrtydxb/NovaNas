{{- if and .Values.operators.enabled .Values.operators.serviceMonitor.enabled .Values.observability.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: novanas-operators
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "operators") | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "novanas.selectorLabels" (dict "ctx" . "component" "operators") | nindent 6 }}
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.operators.serviceMonitor.interval }}
{{- end }}
