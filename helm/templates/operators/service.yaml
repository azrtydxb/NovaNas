{{- if .Values.operators.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: novanas-operators-metrics
  namespace: {{ include "novanas.systemNamespace" . }}
  labels:
    {{- include "novanas.componentLabels" (dict "ctx" . "component" "operators") | nindent 4 }}
spec:
  selector:
    {{- include "novanas.selectorLabels" (dict "ctx" . "component" "operators") | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.operators.metricsPort }}
      targetPort: metrics
    - name: health
      port: {{ .Values.operators.healthPort }}
      targetPort: health
{{- end }}
