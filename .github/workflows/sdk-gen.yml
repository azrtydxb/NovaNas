name: SDK Generation

# Generates and publishes language SDKs from the NovaNas OpenAPI spec.
# Triggered on release tag for real publishes, and on non-tag pushes in
# dry-run mode to exercise the generation pipeline without side effects.

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do not publish)"
        type: boolean
        default: true

concurrency:
  group: sdk-gen-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  generate-and-publish:
    name: Generate + publish SDKs
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ (startsWith(github.ref, 'refs/tags/v') && 'false') || 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Java (for openapi-generator-cli)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install openapi-generator-cli
        run: npm install -g @openapitools/openapi-generator-cli

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Export OpenAPI spec
        run: |
          mkdir -p dist/openapi
          pnpm --filter @novanas/api run openapi:export \
            -- --out dist/openapi/novanas.json

      - name: Upload OpenAPI spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: dist/openapi/novanas.json

      # ---- JS / TypeScript SDK ---------------------------------------
      - name: Generate @novanas/sdk-js
        run: |
          openapi-generator-cli generate \
            -i dist/openapi/novanas.json \
            -g typescript-fetch \
            -o dist/sdk-js \
            --additional-properties=npmName=@novanas/sdk-js,typescriptThreePlus=true

      - name: Publish @novanas/sdk-js
        if: env.DRY_RUN == 'false'
        working-directory: dist/sdk-js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public --provenance

      # ---- Python SDK -----------------------------------------------
      - name: Generate novanas-sdk (pypi)
        run: |
          openapi-generator-cli generate \
            -i dist/openapi/novanas.json \
            -g python \
            -o dist/sdk-py \
            --additional-properties=packageName=novanas_sdk,projectName=novanas-sdk

      - name: Publish novanas-sdk to pypi
        if: env.DRY_RUN == 'false'
        working-directory: dist/sdk-py
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine upload dist/*

      # ---- Go SDK ----------------------------------------------------
      - name: Generate novanas-sdk-go
        run: |
          openapi-generator-cli generate \
            -i dist/openapi/novanas.json \
            -g go \
            -o dist/sdk-go \
            --additional-properties=packageName=novanas

      - name: Push novanas-sdk-go module
        if: env.DRY_RUN == 'false'
        env:
          GH_TOKEN: ${{ secrets.SDK_GO_PUSH_TOKEN }}
        run: |
          cd dist/sdk-go
          git init -q
          git checkout -q -b main
          git config user.email "noreply@novanas.io"
          git config user.name  "novanas-sdk-bot"
          git add .
          git commit -q -m "chore(sdk): regenerate from ${GITHUB_REF_NAME}"
          git tag "${GITHUB_REF_NAME}"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/azrtydxb/novanas-sdk-go.git"
          git push -f origin main
          git push origin "${GITHUB_REF_NAME}"

      # ---- Rust SDK --------------------------------------------------
      - name: Generate novanas-sdk (crate)
        run: |
          openapi-generator-cli generate \
            -i dist/openapi/novanas.json \
            -g rust \
            -o dist/sdk-rs \
            --additional-properties=packageName=novanas-sdk

      - name: Publish novanas-sdk to crates.io
        if: env.DRY_RUN == 'false'
        working-directory: dist/sdk-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          cargo publish --allow-dirty

      - name: Upload generated SDKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdks
          path: |
            dist/sdk-js/**
            dist/sdk-py/**
            dist/sdk-go/**
            dist/sdk-rs/**
          if-no-files-found: warn
