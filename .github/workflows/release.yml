name: release

# Tag-push release pipeline. Builds every artifact (containers, charts,
# RAUC bundle, ISO, VA images), signs them, generates an SBOM, and
# publishes a GitHub Release.
#
# Signing strategy:
#   - Containers: cosign keyless (Sigstore OIDC via GitHub-hosted runner)
#   - Charts:     cosign keyless via apps/scripts/sign-all.sh
#   - RAUC:       Actions secret for beta (RAUC_SIGNING_KEY / _CERT).
#                 GA migration path — Cloud KMS (AWS KMS / Azure Key
#                 Vault / GCP KMS) — see docs/developer/ci.md.
#   - SBOM:       anchore/sbom-action (SPDX JSON), uploaded to Release.

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # create GitHub release
  packages: write   # push to ghcr
  id-token: write   # cosign keyless

jobs:
  build-sign-release:
    name: Build, sign, release
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      REGISTRY: ghcr.io/azrtydxb
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      # ---------- toolchains ----------
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.1
      - uses: sigstore/cosign-installer@v3

      # ---------- OS deps for RAUC/ISO/VA ----------
      - name: Install OS build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap mmdebstrap qemu-utils qemu-system-x86 qemu-kvm \
            rauc squashfs-tools xorriso ovmf \
            systemd-container arch-install-scripts \
            dosfstools e2fsprogs parted mtools \
            grub-pc-bin grub-efi-amd64-bin
          wget -O - https://apt.releases.hashicorp.com/gpg | \
            sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | \
            sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update && sudo apt-get install -y packer
          sudo chmod 666 /dev/kvm || true

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Helm login to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      # ---------- build container images ----------
      - name: Build and push container images
        run: bash hack/ci/build-images.sh
        env:
          VERSION: ${{ github.ref_name }}

      # ---------- sign containers ----------
      - name: cosign sign containers
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          set -euo pipefail
          for img in \
            ghcr.io/azrtydxb/novanas/api \
            ghcr.io/azrtydxb/novanas/ui \
            ghcr.io/azrtydxb/novanas/operators \
            ghcr.io/azrtydxb/novanas/storage-meta \
            ghcr.io/azrtydxb/novanas/storage-agent; do
            cosign sign --yes "${img}:${VERSION}"
          done

      # ---------- charts ----------
      - name: Publish app charts
        run: ./apps/scripts/publish-all.sh
        env:
          REGISTRY: ghcr.io/azrtydxb/novanas-apps

      - name: Sign app charts
        env:
          REGISTRY: ghcr.io/azrtydxb/novanas-apps
          COSIGN_EXPERIMENTAL: "true"
        run: ./apps/scripts/sign-all.sh

      - name: Package + push umbrella chart
        run: |
          helm dependency update ./helm || true
          helm package ./helm -d /tmp/helm-pkg
          TGZ=$(ls /tmp/helm-pkg/*.tgz | head -1)
          helm push "$TGZ" oci://ghcr.io/azrtydxb/charts

      # ---------- OS artifacts ----------
      - name: Build RAUC bundle + ISO + VA images
        run: sudo --preserve-env=VERSION,CHANNEL,ARCH make -C os all
        env:
          VERSION: ${{ github.ref_name }}
          CHANNEL: stable

      - name: RAUC sign bundle (beta — Actions secret)
        # TODO(GA): migrate to Cloud KMS — AWS KMS / Azure Key Vault /
        # GCP KMS. Beta uses the RAUC_SIGNING_KEY/_CERT repo secrets.
        env:
          RAUC_SIGNING_KEY: ${{ secrets.RAUC_SIGNING_KEY }}
          RAUC_SIGNING_CERT: ${{ secrets.RAUC_SIGNING_CERT }}
          VERSION: ${{ github.ref_name }}
        run: bash hack/ci/rauc-sign-release.sh

      # ---------- SBOM ----------
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          output-file: sbom.spdx.json
          format: spdx-json

      # ---------- GitHub Release ----------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            os/build/out/*.raucb
            os/build/out/*.iso
            os/build/out/*.qcow2
            os/build/out/*.vmdk
            os/build/out/*.ova
            sbom.spdx.json
