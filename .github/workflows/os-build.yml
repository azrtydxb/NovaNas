name: os-build

# mkosi-driven NovaNas OS build.
#
# Jobs run inside debian:trixie containers on the self-hosted runner so we
# get a modern, predictable toolchain regardless of the host OS. The host
# only needs Docker + (for va-images) a working /dev/kvm.
#
# Jobs:
#   1. os-build  - runs mkosi (update profile only), emits ext4 images,
#                  RAUC bundle, and hybrid installer ISO via d-i repack.
#   2. va-images - Packer VM builds from the ISO.
#
# Release signing is a separate, human-approved workflow (release.yml).

on:
  push:
    branches: [main]
    paths:
      - "os/**"
      - "installer-di/**"
      - ".github/workflows/os-build.yml"
  pull_request:
    paths:
      - "os/**"
      - "installer-di/**"
      - ".github/workflows/os-build.yml"
  workflow_dispatch:

concurrency:
  group: os-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # contents: write so the os-build job can publish the rolling-dev
  # release asset.
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  os-build:
    name: mkosi (update) + bundle + ISO
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 180
    # Trixie gives us mkosi >= 22 from apt and matches our target OS exactly.
    # --privileged is required because mkosi drives loop devices,
    # systemd-nspawn, and mounts during the build.
    container:
      image: debian:trixie-slim
      options: --privileged
    steps:
      - name: Install build deps
        run: |
          set -eu
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git make sudo \
            mkosi systemd-container \
            rauc squashfs-tools xorriso cpio isolinux \
            grub-pc-bin grub-efi-amd64-bin mtools dosfstools \
            e2fsprogs parted \
            debian-archive-keyring \
            bubblewrap
          mkosi --version

      - uses: actions/checkout@v5

      - name: Build update (RAUC) rootfs via mkosi
        run: make -C os mkosi-update

      - name: Extract artefacts (ext4 + kernel/initrd)
        run: make -C os update-artifacts

      - name: Build RAUC bundle (unsigned dev cert)
        run: make -C os bundle

      - name: Build hybrid installer ISO
        run: make -C os iso-only

      - name: Upload RAUC bundle + kernel
        uses: actions/upload-artifact@v5
        with:
          name: rauc-bundle-${{ github.sha }}
          path: |
            os/build/out/*.raucb
            os/build/out/kernel.vmlinuz
            os/build/out/kernel.initrd
          retention-days: 14

      - name: Upload ISO
        uses: actions/upload-artifact@v5
        with:
          name: iso-${{ github.sha }}
          path: os/build/out/*.iso
          retention-days: 14

      # ---------- rolling-dev release for IP-KVM virtual media ----------
      - name: Publish rolling-dev ISO
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # Container's default /bin/sh is dash; ${VAR::N} is a bash-ism.
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          apt-get install -y --no-install-recommends gh
          ISO=$(ls os/build/out/*.iso | head -1)
          cp "$ISO" os/build/out/novanas-dev.iso
          gh release delete rolling-dev --yes --cleanup-tag 2>/dev/null || true
          gh release create rolling-dev \
            --title "Rolling dev build (main @ ${GITHUB_SHA::7})" \
            --notes "Auto-published ISO for virtual-media boot. Overwritten on every main push." \
            --prerelease \
            --target "$GITHUB_SHA" \
            os/build/out/novanas-dev.iso

  va-images:
    name: Virtual appliance images (qcow2 / vmdk / ova / raw)
    needs: os-build
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 180
    # KVM passthrough: host /dev/kvm mapped into the container so packer's
    # qemu builder uses hardware acceleration. --privileged also covers the
    # loopback mounts packer performs on the built images.
    container:
      image: debian:trixie-slim
      options: --privileged --device=/dev/kvm
    steps:
      - name: Install KVM + Packer + deps
        run: |
          set -eu
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl gnupg lsb-release \
            git make sudo \
            qemu-system-x86 qemu-utils ovmf
          curl -fsSL https://apt.releases.hashicorp.com/gpg \
            | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com trixie main" \
            > /etc/apt/sources.list.d/hashicorp.list
          apt-get update
          apt-get install -y --no-install-recommends packer
          chmod 666 /dev/kvm || true
          packer --version

      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: iso-${{ github.sha }}
          path: os/build/out/

      - name: Build VA images
        run: make -C os va-only

      - name: Upload serial console log on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: packer-serial-${{ github.sha }}
          path: os/build/out/packer-serial.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload VA images
        uses: actions/upload-artifact@v5
        with:
          name: va-images-${{ github.sha }}
          path: |
            os/build/out/*.qcow2
            os/build/out/*.vmdk
            os/build/out/*.ova
            os/build/out/*.raw
          retention-days: 14
