name: os-build

# mkosi-driven NovaNas OS build.
#
# Jobs:
#   1. os-build  - runs mkosi twice (live + update profiles), emits squashfs,
#                  ext4 images, RAUC bundle, and hybrid installer ISO.
#   2. va-images - Packer VM builds from the ISO.
#
# Release signing is a separate, human-approved workflow (release.yml).

on:
  push:
    branches: [main]
    paths:
      - "os/**"
      - "installer/**"
      - ".github/workflows/os-build.yml"
  pull_request:
    paths:
      - "os/**"
      - "installer/**"
      - ".github/workflows/os-build.yml"
  workflow_dispatch:

concurrency:
  group: os-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # contents: write so the os-build job can publish the rolling-dev
  # release asset.
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  os-build:
    name: mkosi (live + update) + bundle + ISO
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v5

      - name: Install build deps
        run: |
          sudo apt-get update
          # mkosi ships in trixie; on older runners fall back to pip.
          sudo apt-get install -y \
            mkosi systemd-container \
            rauc squashfs-tools xorriso \
            grub-pc-bin grub-efi-amd64-bin mtools dosfstools \
            e2fsprogs parted \
            debian-archive-keyring \
            || { sudo apt-get install -y python3-pip && \
                 sudo pip3 install --break-system-packages mkosi; }
          mkosi --version

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache-dependency-path: installer/go.sum

      - name: Build installer binary (baked into live rootfs)
        run: |
          cd installer && GOWORK=off go build -o bin/novanas-installer .

      - name: Build update (RAUC) rootfs via mkosi
        run: sudo --preserve-env=VERSION,CHANNEL,ARCH,INSTALLER_BINARY make -C os mkosi-update

      - name: Build live (ISO) rootfs via mkosi
        run: sudo --preserve-env=VERSION,CHANNEL,ARCH,INSTALLER_BINARY make -C os mkosi-live

      - name: Extract artefacts (squashfs + ext4 + kernel/initrd)
        run: |
          sudo --preserve-env=VERSION,CHANNEL,ARCH,INSTALLER_BINARY make -C os update-artifacts
          sudo --preserve-env=VERSION,CHANNEL,ARCH,INSTALLER_BINARY make -C os live-artifacts

      - name: Build RAUC bundle (unsigned dev cert)
        run: sudo --preserve-env=VERSION,CHANNEL,ARCH make -C os bundle

      - name: Build hybrid installer ISO
        run: sudo --preserve-env=VERSION,CHANNEL,ARCH,INSTALLER_BINARY make -C os iso-only

      - name: Upload RAUC bundle + kernel + squashfs
        uses: actions/upload-artifact@v5
        with:
          name: rauc-bundle-${{ github.sha }}
          path: |
            os/build/out/*.raucb
            os/build/out/kernel.vmlinuz
            os/build/out/kernel.initrd
            os/build/out/filesystem.squashfs
          retention-days: 14

      - name: Upload ISO
        uses: actions/upload-artifact@v5
        with:
          name: iso-${{ github.sha }}
          path: os/build/out/*.iso
          retention-days: 14

      # ---------- rolling-dev release for IP-KVM virtual media ----------
      - name: Publish rolling-dev ISO
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          ISO=$(ls os/build/out/*.iso | head -1)
          cp "$ISO" os/build/out/novanas-dev.iso
          gh release delete rolling-dev --yes --cleanup-tag 2>/dev/null || true
          gh release create rolling-dev \
            --title "Rolling dev build (main @ ${GITHUB_SHA::7})" \
            --notes "Auto-published ISO for virtual-media boot. Overwritten on every main push." \
            --prerelease \
            --target "$GITHUB_SHA" \
            os/build/out/novanas-dev.iso

  va-images:
    name: Virtual appliance images (qcow2 / vmdk / ova / raw)
    needs: os-build
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v5

      - name: Install KVM + Packer
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm qemu-utils qemu-system-x86 ovmf
          wget -O - https://apt.releases.hashicorp.com/gpg | \
            sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | \
            sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update && sudo apt-get install -y packer
          sudo chmod 666 /dev/kvm || true

      - uses: actions/download-artifact@v5
        with:
          name: iso-${{ github.sha }}
          path: os/build/out/

      - name: Build VA images
        run: sudo --preserve-env=VERSION,CHANNEL,ARCH make -C os va-only

      - name: Upload serial console log on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: packer-serial-${{ github.sha }}
          path: os/build/out/packer-serial.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload VA images
        uses: actions/upload-artifact@v5
        with:
          name: va-images-${{ github.sha }}
          path: |
            os/build/out/*.qcow2
            os/build/out/*.vmdk
            os/build/out/*.ova
            os/build/out/*.raw
          retention-days: 14
