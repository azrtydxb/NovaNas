name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-ts:
    name: Lint (TypeScript / Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  lint-go:
    name: Lint (Go / golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Run golangci-lint per module
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          for mod in installer packages/cli packages/operators storage; do
            echo "::group::golangci-lint $mod"
            (cd "$mod" && "$(go env GOPATH)/bin/golangci-lint" run --timeout 5m ./...)
            echo "::endgroup::"
          done

  # Rust lint/build/test lives in .github/workflows/storage-spdk.yml because
  # it needs SPDK-specific scope narrowing (the main novanas-dataplane crate
  # requires protoc + has SPDK-gated code that doesn't cfg-gate cleanly —
  # tracked in #36). The self-contained subcrates (ndp, nbd, nvmeof-tcp)
  # are fully lint/build/test-covered there.

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build schemas + db (upstream deps)
        run: pnpm --filter @novanas/schemas --filter @novanas/db build
      - run: pnpm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build schemas + db (upstream deps)
        run: pnpm --filter @novanas/schemas --filter @novanas/db build
      - run: pnpm run test
