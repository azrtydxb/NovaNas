      type: string
    - jsonPath: .spec.timezone
      name: Timezone
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SystemSettings — Hostname, timezone, NTP, locale, SMTP cluster
          knobs.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SystemSettingsSpec defines the desired state of SystemSettings.
            properties:
              hostname:
                type: string
              locale:
                type: string
              motd:
                type: string
              ntp:
                description: SystemNtpSettings configures the host clock source.
                properties:
                  enabled:
                    type: boolean
                  servers:
                    items:
                      type: string
                    type: array
                required:
                - servers
                type: object
              smtp:
