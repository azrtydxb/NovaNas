  name: systemsettings.novanas.io
spec:
  group: novanas.io
  names:
    categories:
    - novanas
    kind: SystemSettings
    listKind: SystemSettingsList
    plural: systemsettings
    singular: systemsettings
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.hostname
