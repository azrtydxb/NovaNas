---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: smartpolicies.novanas.io
spec:
  group: novanas.io
  names:
    categories:
    - novanas
    kind: SmartPolicy
    listKind: SmartPolicyList
    plural: smartpolicies
    shortNames:
    - smartp
    singular: smartpolicy
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.diskCount
      name: Disks
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SmartPolicy — SMART self-test cadence and threshold-driven disk
          actions.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SmartPolicySpec defines the desired state of SmartPolicy.
            properties:
              actions:
                description: SmartActions ties threshold breaches to operator actions.
                properties:
                  onCritical:
                    enum:
                    - alert
                    - alertAndMarkDegraded
                    - markDegraded
                    - none
                    type: string
                  onWarning:
                    enum:
                    - alert
                    - alertAndMarkDegraded
                    - markDegraded
                    - none
                    type: string
                type: object
              appliesTo:
                description: SmartAppliesTo narrows which disks the policy monitors.
                properties:
                  all:
                    type: boolean
                  classes:
                    items:
                      enum:
                      - nvme
                      - ssd
                      - hdd
                      type: string
                    type: array
                  disks:
                    items:
                      type: string
                    type: array
                  pools:
                    items:
                      type: string
                    type: array
                type: object
              longTest:
                description: SmartTest configures a scheduled self-test (short/long)
                  by cron expression.
                properties:
                  cron:
                    minLength: 1
                    type: string
                required:
                - cron
                type: object
              shortTest:
                description: SmartTest configures a scheduled self-test (short/long)
                  by cron expression.
                properties:
                  cron:
                    minLength: 1
                    type: string
                required:
                - cron
                type: object
              thresholds:
                description: SmartThresholds bundles per-attribute warning/critical
                  values.
                properties:
                  pendingSectors:
                    description: SmartThreshold pairs warning/critical levels for
                      a single attribute.
                    properties:
                      critical:
                        type: string
                      warning:
                        type: string
                    required:
                    - critical
                    - warning
                    type: object
                  powerOnHours:
                    description: SmartThreshold pairs warning/critical levels for
                      a single attribute.
                    properties:
                      critical:
                        type: string
                      warning:
                        type: string
                    required:
                    - critical
                    - warning
                    type: object
                  reallocatedSectors:
                    description: SmartThreshold pairs warning/critical levels for
                      a single attribute.
                    properties:
                      critical:
                        type: string
                      warning:
                        type: string
                    required:
                    - critical
                    - warning
                    type: object
                  temperature:
                    description: SmartThreshold pairs warning/critical levels for
                      a single attribute.
                    properties:
                      critical:
                        type: string
                      warning:
                        type: string
                    required:
                    - critical
                    - warning
                    type: object
                type: object
            required:
            - appliesTo
            type: object
          status:
            description: SmartPolicyStatus defines observed state of SmartPolicy.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              diskCount:
                format: int32
                type: integer
              observedGeneration:
                description: ObservedGeneration is the generation last processed by
                  the controller.
                format: int64
                type: integer
              phase:
                enum:
                - Active
                - Failed
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
