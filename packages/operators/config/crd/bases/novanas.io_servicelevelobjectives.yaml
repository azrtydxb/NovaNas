---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: servicelevelobjectives.novanas.io
spec:
  group: novanas.io
  names:
    categories:
    - novanas
    kind: ServiceLevelObjective
    listKind: ServiceLevelObjectiveList
    plural: servicelevelobjectives
    singular: servicelevelobjective
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.target
      name: Target
      type: string
    - jsonPath: .spec.window
      name: Window
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.currentSLI
      name: SLI
      type: string
    - jsonPath: .status.errorBudgetRemainingPercent
      name: BudgetLeft
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ServiceLevelObjective describes an SLI/SLO with burn-rate alerting.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ServiceLevelObjectiveSpec defines desired state.
            properties:
              alertChannels:
                description: AlertChannels is the channel set notified on burn-rate
                  alerts.
                items:
                  type: string
                type: array
              burnRateAlerts:
                description: |-
                  BurnRateAlerts configures per-window burn-rate alerts projected
                  into PrometheusRule.
                items:
                  description: SLOBurnRateAlert configures a multi-window burn-rate
                    alert.
                  properties:
                    longWindow:
                      description: LongWindow is the slow-burn window, e.g. "1h".
                      type: string
                    severity:
                      description: Severity maps to an AlertSeverity.
                      enum:
                      - info
                      - warning
                      - critical
                      type: string
                    shortWindow:
                      description: ShortWindow is the fast-burn window, e.g. "5m".
                      type: string
                    threshold:
                      description: |-
                        Threshold is the multiple of the error budget consumption rate
                        that triggers the alert (default 14.4 for 2% budget/hour).
                      type: string
                  type: object
                type: array
              description:
                type: string
              evalIntervalSeconds:
                description: |-
                  EvalIntervalSeconds controls how often the controller polls
                  Prometheus for the current SLI. Default 60 when unset.
                format: int32
                type: integer
              indicator:
                description: SLOIndicator expresses a SLI as two PromQL queries.
                properties:
                  goodQuery:
                    description: GoodQuery counts events meeting the SLO.
                    type: string
                  totalQuery:
                    description: TotalQuery counts all SLI-eligible events.
                    type: string
                required:
                - goodQuery
                - totalQuery
                type: object
              prometheusURL:
                description: |-
                  PrometheusURL is the base URL of the Prometheus HTTP API used to
                  query the current SLI. Defaults to
                  http://prometheus.novanas-system:9090 when empty.
                type: string
              target:
                description: |-
                  Target is the SLO target percentage as a decimal string (0..100,
                  e.g. "99.9"). Stored as string to preserve precision across
                  JSON round-trips; the controller parses it to a float64.
                pattern: ^(100(\.0+)?|[0-9]{1,2}(\.[0-9]+)?)$
                type: string
              window:
                description: Window is the rolling evaluation window, e.g. "30d".
                type: string
            required:
            - indicator
            - target
            - window
            type: object
          status:
            description: ServiceLevelObjectiveStatus reports observed state.
            properties:
              burnRate:
                description: BurnRate is the current normalised error-budget burn
                  rate.
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              currentSLI:
                description: CurrentSLI is the most recent computed SLI as a percentage
                  string.
                type: string
              errorBudgetRemainingPercent:
                description: ErrorBudgetRemainingPercent is the remaining budget as
                  a percentage.
                type: string
              errorBudgetRemainingSeconds:
                description: |-
                  ErrorBudgetRemainingSeconds is the remaining budget expressed as
                  "unavailability time" within Window (lower is worse).
                format: int64
                type: integer
              lastError:
                description: LastError is the most recent evaluation error, if any.
                type: string
              lastEvaluation:
                description: LastEvaluation is the time of the last Prometheus query.
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                enum:
                - Pending
                - Active
                - AtRisk
                - Breached
                - Failed
                type: string
              renderedRuleName:
                description: RenderedRuleName is the child PrometheusRule name.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
