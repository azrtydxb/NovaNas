---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: cloudbackupjobs.novanas.io
spec:
  group: novanas.io
  names:
    categories:
    - novanas
    kind: CloudBackupJob
    listKind: CloudBackupJobList
    plural: cloudbackupjobs
    singular: cloudbackupjob
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.target
      name: Target
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.progressPercent
      name: Progress
      type: integer
    - jsonPath: .status.lastRun
      name: LastRun
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: CloudBackupJob is a volume-to-cloud backup job (one-shot or cron).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CloudBackupJobSpec defines desired state.
            properties:
              cron:
                description: Cron is an optional schedule; when empty the job is one-shot.
                type: string
              excludes:
                items:
                  type: string
                type: array
              parallelism:
                description: Parallelism bounds concurrent upload streams (engine-specific).
                format: int32
                type: integer
              retention:
                description: CloudBackupRetention is a minimal restic-style retention
                  policy.
                properties:
                  keepDaily:
                    format: int32
                    type: integer
                  keepHourly:
                    format: int32
                    type: integer
                  keepLast:
                    format: int32
                    type: integer
                  keepMonthly:
                    format: int32
                    type: integer
                  keepWeekly:
                    format: int32
                    type: integer
                  keepYearly:
                    format: int32
                    type: integer
                type: object
              source:
                description: |-
                  VolumeSourceRef is a discriminated reference to a snapshottable source.
                  Kind must be one of BlockVolume, Dataset, Bucket, AppInstance, Vm.
                properties:
                  kind:
                    enum:
                    - BlockVolume
                    - Dataset
                    - Bucket
                    - AppInstance
                    - Vm
                    type: string
                  name:
                    minLength: 1
                    type: string
                  namespace:
                    type: string
                required:
                - kind
                - name
                type: object
              suspended:
                type: boolean
              target:
                description: Target is the name of a CloudBackupTarget in the same
                  namespace.
                type: string
              timeout:
                description: Timeout bounds an individual run, e.g. "4h".
                type: string
            required:
            - source
            - target
            type: object
          status:
            description: CloudBackupJobStatus reports observed state.
            properties:
              bytesTotal:
                description: BytesTotal is the expected total bytes for the current
                  run.
                format: int64
                type: integer
              bytesTransferred:
                description: BytesTransferred is the cumulative bytes uploaded in
                  the last run.
                format: int64
                type: integer
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              failureCount:
                description: FailureCount is the cumulative failure count.
                format: int64
                type: integer
              filesProcessed:
                description: FilesProcessed is the count of files in the last run.
                format: int64
                type: integer
              lastError:
                description: LastError is the most recent run error.
                type: string
              lastRun:
                description: LastRun is the start time of the most recent run.
                format: date-time
                type: string
              lastSuccessfulRun:
                description: LastSuccessfulRun is the start time of the most recent
                  successful run.
                format: date-time
                type: string
              nextRun:
                description: NextRun is the next scheduled invocation (cron jobs only).
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                enum:
                - Pending
                - Scheduled
                - Running
                - Succeeded
                - Failed
                - Suspended
                - Cancelled
                type: string
              progressPercent:
                description: ProgressPercent is 0..100 for the current run.
                format: int32
                type: integer
              snapshotId:
                description: SnapshotID is the engine snapshot identifier produced
                  by the last run.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
