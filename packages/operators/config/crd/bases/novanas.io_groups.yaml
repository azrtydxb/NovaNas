  name: groups.novanas.io
spec:
  group: novanas.io
  names:
    categories:
    - novanas
    kind: Group
    listKind: GroupList
    plural: groups
    singular: group
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.memberCount
      name: Members
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Group — Keycloak group projection with optional K8s RBAC binding.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              GroupSpec mirrors packages/schemas/src/identity/group.ts. A Group is
              projected into Keycloak and also drives K8s RBAC RoleBinding generation
              so cluster tools can authorise on group membership.
            properties:
              clusterRole:
                description: |-
                  ClusterRole optionally names a Kubernetes ClusterRole that the
                  controller should bind to this group via a generated
                  ClusterRoleBinding.
                type: string
              displayName:
                description: DisplayName is a human-readable label for the UI.
                type: string
              federated:
                description: Federated is true for groups mirrored from an external
                  IdP.
                type: boolean
              gid:
                description: GID is the POSIX group-id projected into /etc/group.
                format: int64
                minimum: 0
                type: integer
              members:
                description: |-
                  Members is the list of User CR names that should belong to this
                  group. The controller reconciles membership to Keycloak in both
                  directions (adds and removes).
                items:
                  type: string
                type: array
              name:
                description: Name is the realm-unique group name.
                maxLength: 255
                minLength: 1
                type: string
              realm:
                description: Realm overrides the operator's default Keycloak realm.
                type: string
            required:
            - name
            type: object
          status:
            description: GroupStatus is the observed state of the Group projection.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
