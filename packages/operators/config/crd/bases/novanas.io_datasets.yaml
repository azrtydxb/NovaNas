---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: datasets.novanas.io
spec:
  group: novanas.io
  names:
    categories:
    - novanas
    kind: Dataset
    listKind: DatasetList
    plural: datasets
    shortNames:
    - ds
    singular: dataset
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.pool
      name: Pool
      type: string
    - jsonPath: .spec.size
      name: Size
      type: string
    - jsonPath: .spec.filesystem
      name: FS
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Dataset is a BlockVolume + filesystem + mountable storage area.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DatasetSpec defines the desired state of Dataset.
            properties:
              aclMode:
                enum:
                - posix
                - nfsv4
                - smb
                - mixed
                type: string
              allowDataLoss:
                description: |-
                  AllowDataLoss permits deletion even when Snapshots/Shares reference
                  this Dataset. Without it the controller cascades Snapshots first.
                type: boolean
              compression:
                enum:
                - none
                - lz4
                - zstd
                - gzip
                type: string
              defaults:
                description: DatasetDefaults sets default ownership and permissions.
                properties:
                  group:
                    type: string
                  mode:
                    pattern: ^0?[0-7]{3,4}$
                    type: string
                  owner:
                    type: string
                type: object
              encryption:
                description: EncryptionSettings toggles dataset-at-rest encryption.
                properties:
                  enabled:
                    type: boolean
                  kmsKey:
                    type: string
                type: object
              filesystem:
                enum:
                - xfs
                - ext4
                - btrfs
                - zfs
                type: string
              pool:
                minLength: 1
                type: string
              protection:
                description: |-
                  ProtectionPolicy encodes replication / erasure coding choice.
                  Mirror of the discriminated-union Zod schema.
                properties:
                  erasureCoding:
                    description: ErasureCodingSpec configures EC parameters.
                    properties:
                      dataShards:
                        format: int32
                        minimum: 2
                        type: integer
                      parityShards:
                        format: int32
                        minimum: 1
                        type: integer
                    required:
                    - dataShards
                    - parityShards
                    type: object
                  mode:
                    enum:
                    - replication
                    - erasureCoding
                    type: string
                  replicas:
                    description: Replicas is retained for back-compat with mode=replication.
                    format: int32
                    type: integer
                  replication:
                    description: ReplicationProtection holds N-copy params.
                    properties:
                      copies:
                        format: int32
                        maximum: 8
                        minimum: 1
                        type: integer
                    required:
                    - copies
                    type: object
                required:
                - mode
                type: object
              quota:
                description: DatasetQuota sets quota thresholds.
                properties:
                  hard:
                    type: string
                  soft:
                    type: string
                type: object
              size:
                minLength: 1
                type: string
              tiering:
                description: TieringPolicy describes cross-pool data movement.
                properties:
                  demoteAfter:
                    type: string
                  demoteTo:
                    type: string
                  primary:
                    minLength: 1
                    type: string
                  promoteAfterAccesses:
                    format: int32
                    type: integer
                  promoteOn:
                    type: string
                type: object
            required:
            - filesystem
            - pool
            - size
            type: object
          status:
            description: DatasetStatus defines observed state.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              encryption:
                description: Encryption carries the wrapped DK produced at provision
                  time.
                properties:
                  keyVersion:
                    format: int64
                    type: integer
                  provisioned:
                    type: boolean
                  provisionedAt:
                    format: date-time
                    type: string
                  wrappedDK:
                    format: byte
                    type: string
                type: object
              mountPath:
                type: string
              mountPoint:
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                enum:
                - Pending
                - Mounted
                - Degraded
                - Failed
                - Ready
                type: string
              usedBytes:
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
