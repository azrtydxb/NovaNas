---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: keycloakrealms.novanas.io
spec:
  group: novanas.io
  names:
    categories:
    - novanas
    kind: KeycloakRealm
    listKind: KeycloakRealmList
    plural: keycloakrealms
    singular: keycloakrealm
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.userCount
      name: Users
      type: integer
    - jsonPath: .status.groupCount
      name: Groups
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: KeycloakRealm — Keycloak realm configuration with federations
          and MFA.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: KeycloakRealmSpec mirrors packages/schemas/src/identity/keycloak-realm.ts.
            properties:
              defaultLocale:
                type: string
              displayName:
                type: string
              federations:
                items:
                  description: RealmFederation is one identity provider attached to
                    the realm.
                  properties:
                    connection:
                      description: RealmFederationConnection describes LDAP/AD/OIDC
                        connection settings.
                      properties:
                        baseDn:
                          type: string
                        bindDn:
                          type: string
                        bindSecret:
                          description: |-
                            SecretKeyReference names a Secret (optionally in a specific namespace)
                            plus an optional key. It mirrors packages/schemas common
                            SecretReferenceSchema and is used by IAM-domain specs (Certificate,
                            AuditPolicy, KeycloakRealm) to reference bind credentials, webhook
                            auth material, and ACME/upload bundles.
                          properties:
                            key:
                              description: |-
                                Key selects a specific key inside the Secret. When empty, the
                                consumer picks a type-appropriate default (e.g. "tls.crt").
                              type: string
                            name:
                              description: Name is the Secret name.
                              minLength: 1
                              type: string
                            namespace:
                              description: Namespace defaults to the referencing CR's
                                namespace when empty.
                              type: string
                          required:
                          - name
                          type: object
                        groupsDn:
                          type: string
                        startTls:
                          type: boolean
                        url:
                          minLength: 1
                          type: string
                        usersDn:
                          type: string
                      required:
                      - url
                      type: object
                    displayName:
                      type: string
                    syncPeriod:
                      description: SyncPeriod is a Go duration string for the federation
                        sync cadence.
                      type: string
                    type:
                      enum:
                      - activeDirectory
                      - ldap
                      - oidc
                      type: string
                  required:
                  - connection
                  - type
                  type: object
                type: array
              mfa:
                description: RealmMFA configures the realm's MFA requirements.
                properties:
                  required:
                    type: boolean
                  totp:
                    type: boolean
                  webauthn:
                    type: boolean
                type: object
              passwordPolicy:
                description: |-
                  PasswordPolicy is the Keycloak password policy expression, e.g.
                  "length(12) and upperCase(1) and digits(1)".
                type: string
            type: object
          status:
            description: KeycloakRealmStatus reports sync state for the realm.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              groupCount:
                format: int32
                minimum: 0
                type: integer
              lastSync:
                format: date-time
                type: string
              phase:
                enum:
                - Pending
                - Active
                - Failed
                type: string
              userCount:
                format: int32
                minimum: 0
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
