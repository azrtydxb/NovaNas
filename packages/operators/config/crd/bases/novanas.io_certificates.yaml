---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: certificates.novanas.io
spec:
  group: novanas.io
  names:
    categories:
    - novanas
    kind: Certificate
    listKind: CertificateList
    plural: certificates
    shortNames:
    - cert
    singular: certificate
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.commonName
      name: CN
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.notAfter
      name: NotAfter
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Certificate — Namespaced TLS certificate managed by the operator.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              CertificateSpec mirrors packages/schemas/src/crypto/certificate.ts. A
              Certificate is issued either by an ACME-compliant CA (via cert-manager
              where available) or by the internal OpenBao PKI. Uploaded bundles are
              consumed verbatim. The resulting material lands in a child Secret
              named "<cert-name>-tls" with an owner reference for GC.
            properties:
              acme:
                description: CertificateACMESpec configures an ACME-based issuance.
                properties:
                  directoryUrl:
                    type: string
                  email:
                    pattern: ^[^@\s]+@[^@\s]+\.[^@\s]+$
                    type: string
                  issuer:
                    enum:
                    - letsencrypt
                    - letsencrypt-staging
                    - zerossl
                    - custom
                    type: string
                required:
                - issuer
                type: object
              commonName:
                description: CommonName is the primary subject CN.
                minLength: 1
                type: string
              dnsNames:
                description: DNSNames are additional SAN DNS entries.
                items:
                  type: string
                type: array
              ipAddresses:
                description: IPAddresses are additional SAN IP entries.
                items:
                  type: string
                type: array
              provider:
                description: CertificateProvider is one of the supported issuance
                  backends.
                enum:
                - acme
                - internalPki
                - upload
                type: string
              renewBeforeDays:
                default: 30
                description: RenewBeforeDays triggers a renew this many days before
                  NotAfter.
                format: int32
                minimum: 1
                type: integer
              upload:
                description: CertificateUploadSpec points at Secrets holding a pre-issued
                  bundle.
                properties:
                  certSecret:
                    description: |-
                      SecretKeyReference names a Secret (optionally in a specific namespace)
                      plus an optional key. It mirrors packages/schemas common
                      SecretReferenceSchema and is used by IAM-domain specs (Certificate,
                      AuditPolicy, KeycloakRealm) to reference bind credentials, webhook
                      auth material, and ACME/upload bundles.
                    properties:
                      key:
                        description: |-
                          Key selects a specific key inside the Secret. When empty, the
                          consumer picks a type-appropriate default (e.g. "tls.crt").
                        type: string
                      name:
                        description: Name is the Secret name.
                        minLength: 1
                        type: string
                      namespace:
                        description: Namespace defaults to the referencing CR's namespace
                          when empty.
                        type: string
                    required:
                    - name
                    type: object
                  keySecret:
                    description: |-
                      SecretKeyReference names a Secret (optionally in a specific namespace)
                      plus an optional key. It mirrors packages/schemas common
                      SecretReferenceSchema and is used by IAM-domain specs (Certificate,
                      AuditPolicy, KeycloakRealm) to reference bind credentials, webhook
                      auth material, and ACME/upload bundles.
                    properties:
                      key:
                        description: |-
                          Key selects a specific key inside the Secret. When empty, the
                          consumer picks a type-appropriate default (e.g. "tls.crt").
                        type: string
                      name:
                        description: Name is the Secret name.
                        minLength: 1
                        type: string
                      namespace:
                        description: Namespace defaults to the referencing CR's namespace
                          when empty.
                        type: string
                    required:
                    - name
                    type: object
                required:
                - certSecret
                - keySecret
                type: object
            required:
            - commonName
            - provider
            type: object
          status:
            description: CertificateStatus reports issuance state.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              issuer:
                description: Issuer is the issuing CA's subject DN.
                type: string
              notAfter:
                description: NotAfter is the cert's NotAfter validity instant (expiry).
                format: date-time
                type: string
              notBefore:
                description: NotBefore is the cert's NotBefore validity instant.
                format: date-time
                type: string
              phase:
                enum:
                - Pending
                - Issued
                - Renewing
                - Expired
                - Failed
                type: string
              secretRef:
                description: SecretRef names the TLS Secret holding the issued material.
                type: string
              serialNumber:
                description: SerialNumber is the hex serial of the currently-installed
                  cert.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
