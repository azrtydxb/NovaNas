---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: snapshots.novanas.io
spec:
  group: novanas.io
  names:
    categories:
    - novanas
    kind: Snapshot
    listKind: SnapshotList
    plural: snapshots
    shortNames:
    - snap
    singular: snapshot
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.source.name
      name: Source
      type: string
    - jsonPath: .spec.source.kind
      name: Kind
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.sizeBytes
      name: Size
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Snapshot is a point-in-time image of a BlockVolume, Dataset, or other
          snapshottable source.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SnapshotSpec defines the desired state of Snapshot.
            properties:
              allowDataLoss:
                description: AllowDataLoss bypasses Locked + data-present guards on
                  deletion.
                type: boolean
              labels:
                additionalProperties:
                  type: string
                description: Labels are free-form annotations propagated to the backend.
                type: object
              locked:
                description: |-
                  Locked prevents deletion while true. When set, controllers refuse
                  to remove the finalizer unless spec.allowDataLoss=true.
                type: boolean
              retainUntil:
                description: |-
                  RetainUntil is an RFC-3339 timestamp after which the snapshot is
                  eligible for automatic pruning by retention policy.
                format: date-time
                type: string
              source:
                description: Source is the volume-like object the snapshot is taken
                  from.
                properties:
                  kind:
                    enum:
                    - BlockVolume
                    - Dataset
                    - Bucket
                    - AppInstance
                    - Vm
                    type: string
                  name:
                    minLength: 1
                    type: string
                  namespace:
                    type: string
                required:
                - kind
                - name
                type: object
            required:
            - source
            type: object
          status:
            description: SnapshotStatus defines observed state of Snapshot.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              createdAt:
                description: CreatedAt is when the backend accepted the snapshot.
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: Phase summarises the snapshot lifecycle.
                enum:
                - Pending
                - Ready
                - Failed
                - Deleted
                type: string
              readyAt:
                description: ReadyAt is when the snapshot transitioned to Ready.
                format: date-time
                type: string
              sizeBytes:
                description: SizeBytes is the logical bytes captured at snapshot time.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
