---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: alertpolicies.novanas.io
spec:
  group: novanas.io
  names:
    categories:
    - novanas
    kind: AlertPolicy
    listKind: AlertPolicyList
    plural: alertpolicies
    singular: alertpolicy
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.severity
      name: Severity
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.fireCount
      name: FireCount
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AlertPolicy maps a PromQL-driven threshold to one or more channels.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AlertPolicySpec defines desired state.
            properties:
              annotations:
                additionalProperties:
                  type: string
                type: object
              channels:
                description: Channels lists AlertChannel names to dispatch to.
                items:
                  type: string
                minItems: 1
                type: array
              condition:
                description: AlertCondition is a PromQL threshold evaluation.
                properties:
                  for:
                    description: For is the firing duration (e.g. "5m").
                    type: string
                  operator:
                    description: Operator compares Query result vs Threshold.
                    enum:
                    - '>'
                    - <
                    - '>='
                    - <=
                    - ==
                    - '!='
                    type: string
                  query:
                    description: Query is the PromQL expression evaluated by Prometheus.
                    type: string
                  threshold:
                    description: Threshold is the numeric value Query is compared
                      to.
                    type: string
                required:
                - operator
                - query
                - threshold
                type: object
              description:
                type: string
              labels:
                additionalProperties:
                  type: string
                type: object
              runtimeNamespace:
                description: |-
                  RuntimeNamespace overrides where the projected PrometheusRule is
                  written. Defaults to "novanas-system".
                type: string
              severity:
                description: AlertSeverity is the severity tier of an AlertPolicy.
                enum:
                - info
                - warning
                - critical
                type: string
              suspended:
                description: Suspended disables rule rendering / firing without deletion.
                type: boolean
            required:
            - channels
            - condition
            - severity
            type: object
          status:
            description: AlertPolicyStatus reports observed state.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              fireCount:
                description: FireCount is the total number of transitions into a firing
                  state.
                format: int64
                type: integer
              firingSince:
                description: |-
                  FiringSince is the first observed firing time for the current
                  incident. Cleared on resolve.
                format: date-time
                type: string
              lastFiredAt:
                description: LastFiredAt is the most recent firing timestamp observed.
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                enum:
                - Pending
                - Active
                - Firing
                - Suspended
                - Failed
                type: string
              renderedRuleName:
                description: RenderedRuleName is the child PrometheusRule name.
                type: string
              ruleHash:
                description: |-
                  RuleHash is a SHA-256 of the rendered PrometheusRule spec; used to
                  short-circuit reconciliation when the spec is unchanged.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
