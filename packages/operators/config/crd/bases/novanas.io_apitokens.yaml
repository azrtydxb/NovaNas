---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: apitokens.novanas.io
spec:
  group: novanas.io
  names:
    categories:
    - novanas
    kind: ApiToken
    listKind: ApiTokenList
    plural: apitokens
    singular: apitoken
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.owner
      name: Owner
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.lastRotatedAt
      name: LastRotated
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ApiToken — Scoped API token projection with hashed secret storage.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ApiTokenSpec mirrors packages/schemas/src/identity/api-token.ts. A
              scoped bearer token created on behalf of a User, rotated on a schedule
              set by the controller. The plaintext token is returned exactly once in
              Status.RawTokenSecret and scrubbed on the next reconcile.
            properties:
              description:
                description: Description is a free-form human-readable note shown
                  in the UI.
                type: string
              expiresAt:
                description: ExpiresAt is an optional absolute expiry. Nil means no
                  expiry.
                format: date-time
                type: string
              owner:
                description: Owner is the User CR name that the token authenticates
                  as.
                minLength: 1
                type: string
              rotationPeriod:
                description: |-
                  RotationPeriod triggers automatic rotation at the given interval.
                  Must be a valid Go duration string (e.g. "720h"). Empty disables
                  automatic rotation.
                type: string
              scopes:
                description: |-
                  Scopes is the list of capability strings the token is permitted to
                  use. Scope semantics are enforced by the API layer, not the operator.
                items:
                  type: string
                minItems: 1
                type: array
            required:
            - owner
            - scopes
            type: object
          status:
            description: |-
              ApiTokenStatus reports the token lifecycle. The plaintext token lives
              in RawTokenSecret for exactly one reconcile after creation or rotation
              and is scrubbed on the next pass.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              createdAt:
                description: CreatedAt is when the current token was minted.
                format: date-time
                type: string
              lastRotatedAt:
                description: LastRotatedAt is when the token was last rotated.
                format: date-time
                type: string
              lastUsedAt:
                description: LastUsedAt is when the token was most recently presented.
                format: date-time
                type: string
              phase:
                enum:
                - Pending
                - Active
                - Expired
                - Revoked
                type: string
              rawTokenSecret:
                description: |-
                  RawTokenSecret is the plaintext token delivered exactly once on
                  create or rotation. The controller clears this field on the next
                  reconcile, so clients must capture it immediately.
                type: string
              secretRef:
                description: SecretRef names the Secret holding the token hash.
                type: string
              tokenID:
                description: TokenID is a stable public identifier (SHA-256 of the
                  token).
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
