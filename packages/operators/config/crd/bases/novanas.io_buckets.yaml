kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: buckets.novanas.io
spec:
  group: novanas.io
  names:
    categories:
    - novanas
    kind: Bucket
    listKind: BucketList
    plural: buckets
    shortNames:
    - bk
    singular: bucket
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Bucket is a native S3 object bucket.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BucketSpec defines the desired state of Bucket.
            properties:
              encryption:
                description: EncryptionSettings toggles dataset-at-rest encryption.
                properties:
                  enabled:
                    type: boolean
                  kmsKey:
                    type: string
                type: object
              lifecycle:
                items:
                  description: BucketLifecycleRule is a single lifecycle policy entry.
                  properties:
                    expireAfter:
                      type: string
                    prefix:
                      type: string
                    transitionTo:
                      type: string
                  type: object
                type: array
              objectLock:
                description: ObjectLockConfig configures S3 Object Lock.
                properties:
                  defaultRetention:
                    description: RetentionPeriod expresses a duration.
                    properties:
                      period:
                        type: string
                    type: object
                  enabled:
                    type: boolean
                  mode:
                    type: string
                type: object
              protection:
                description: ProtectionPolicy encodes replication / erasure coding
                  choice.
                properties:
                  erasureCoding:
                    description: ErasureCodingSpec configures EC parameters.
                    properties:
                      dataShards:
                        format: int32
                        type: integer
                      parityShards:
                        format: int32
                        type: integer
                    type: object
                  mode:
                    type: string
                  replicas:
                    format: int32
                    type: integer
                type: object
              quota:
                description: BucketQuota sets bucket-level quotas.
