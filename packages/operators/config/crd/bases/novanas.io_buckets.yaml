                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              encryption:
                description: Encryption carries the wrapped DK produced at provision
                  time.
                properties:
                  keyVersion:
                    description: KeyVersion is the Transit master-key version used
                      to wrap the DK.
                    format: int64
                    type: integer
                  provisioned:
                    description: Provisioned is true once the DK has been generated
                      and wrapped.
                    type: boolean
                  provisionedAt:
                    description: ProvisionedAt records when the DK was created.
                    format: date-time
                    type: string
                  wrappedDK:
                    description: |-
                      WrappedDK is the OpenBao Transit-wrapped Dataset Key, base64-encoded
                      by the JSON marshaller.
                    format: byte
                    type: string
                type: object
              objects:
                description: |-
                  Objects is kept as a synonym for TotalObjects for source compatibility
                  with earlier schema revisions; controllers should populate both.
                  Deprecated: use TotalObjects.
                format: int64
                type: integer
              observedGeneration:
                description: ObservedGeneration is the generation last processed by
                  the controller.
                format: int64
                type: integer
              phase:
                enum:
                - Pending
                - Active
                - Failed
                type: string
              totalObjects:
                description: |-
                  TotalObjects is the aggregate object count reported by the S3
                  gateway's metadata service.
                format: int64
                type: integer
              usedBytes:
                format: int64
                type: integer
            type: object
