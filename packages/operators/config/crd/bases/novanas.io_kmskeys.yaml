---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: kmskeys.novanas.io
spec:
  group: novanas.io
  names:
    categories:
    - novanas
    kind: KmsKey
    listKind: KmsKeyList
    plural: kmskeys
    singular: kmskey
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.keyVersion
      name: Version
      type: integer
    - jsonPath: .status.lastRotatedAt
      name: LastRotated
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: KmsKey — Named data key backed by OpenBao Transit.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              KmsKeySpec mirrors packages/schemas/src/crypto/kms-key.ts plus two
              operator-internal fields (KeyID, TransitPath) carried forward since
              the original S3 gateway integration.
            properties:
              deletionProtection:
                description: DeletionProtection blocks deletion while true.
                type: boolean
              description:
                description: Description is a human-readable note for the UI.
                type: string
              keyId:
                description: |-
                  KeyID is the stable external identifier referenced by S3 clients
                  in x-amz-server-side-encryption-aws-kms-key-id headers, e.g.
                  "arn:novanas:kms:::key/finance-sse-kms".
                type: string
              rotation:
                description: Rotation configures automatic key rotation through OpenBao
                  Transit.
                properties:
                  enabled:
                    description: Enabled toggles automatic rotation.
                    type: boolean
                  period:
                    description: |-
                      Period is a Go duration string (e.g. "720h"). When empty the
                      controller uses a 30-day default.
                    type: string
                required:
                - enabled
                type: object
              transitPath:
                description: |-
                  TransitPath is the OpenBao Transit mount + key path used to unwrap
                  the DK (e.g. "transit/keys/finance-sse-kms").
                type: string
            type: object
          status:
            description: KmsKeyStatus is the observed state of the key.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              createdAt:
                description: CreatedAt is when the backing key was first provisioned.
                format: date-time
                type: string
              keyId:
                description: KeyID is the concrete backend key identifier (Transit
                  key name).
                type: string
              keyVersion:
                description: KeyVersion is the active Transit key version.
                format: int32
                minimum: 0
                type: integer
              lastRotatedAt:
                description: LastRotatedAt is when the key was last rotated.
                format: date-time
                type: string
              phase:
                enum:
                - Pending
                - Active
                - Rotating
                - Disabled
                - Destroyed
                type: string
              wrappedDK:
                description: |-
                  WrappedDK is the OpenBao-wrapped (Transit-encrypted) Dataset Key
                  in its vault "vault:v1:..." form. The S3 gateway's kms_resolver
                  unwraps it via Transit at request time.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
