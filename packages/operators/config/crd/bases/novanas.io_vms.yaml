---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: vms.novanas.io
spec:
  group: novanas.io
  names:
    categories:
    - novanas
    kind: Vm
    listKind: VmList
    plural: vms
    singular: vm
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.powerState
      name: Power
      type: string
    - jsonPath: .status.ip
      name: IP
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Vm — KubeVirt VirtualMachine with NAS-friendly UX.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: VmSpec defines the desired state of Vm.
            properties:
              autostart:
                enum:
                - never
                - onBoot
                - always
                type: string
              cdrom:
                items:
                  description: VmCdrom is a CD-ROM attachment backed by an entry in
                    an IsoLibrary.
                  properties:
                    name:
                      minLength: 1
                      type: string
                    source:
                      description: VmCdromSource identifies the ISO-backed source
                        for a CD-ROM.
                      properties:
                        isoLibrary:
                          type: string
                        type:
                          enum:
                          - iso
                          type: string
                      required:
                      - type
                      type: object
                  required:
                  - name
                  - source
                  type: object
                type: array
              disks:
                items:
                  description: VmDisk is a virtual disk attachment.
                  properties:
                    boot:
                      format: int32
                      type: integer
                    bus:
                      enum:
                      - virtio
                      - scsi
                      - sata
                      - ide
                      type: string
                    name:
                      minLength: 1
                      type: string
                    readOnly:
                      type: boolean
                    source:
                      description: |-
                        VmDiskSource is a discriminated union; exactly one of Dataset / BlockVolume
                        / ISO / Clone should be populated. Type selects which.
                      properties:
                        blockVolume:
                          type: string
                        dataset:
                          type: string
                        isoLibrary:
                          type: string
                        size:
                          type: string
                        sourceDisk:
                          type: string
                        sourceVm:
                          type: string
                        type:
                          enum:
                          - dataset
                          - blockVolume
                          - iso
                          - clone
                          type: string
                      required:
                      - type
                      type: object
                  required:
                  - name
                  - source
                  type: object
                type: array
              gpu:
                description: VmGpu configures passthrough GPU assignment.
                properties:
                  passthrough:
                    items:
                      description: VmGpuPassthroughEntry pins a specific PCI device
                        to the VM.
                      properties:
                        device:
                          type: string
                        deviceName:
                          type: string
                        vendor:
                          type: string
                      required:
                      - device
                      type: object
                    type: array
                type: object
              graphics:
                description: VmGraphics toggles the console (SPICE/VNC).
                properties:
                  enabled:
                    type: boolean
                  type:
                    enum:
                    - spice
                    - vnc
                    type: string
                required:
                - enabled
                type: object
              network:
                items:
                  description: VmNetwork attaches the VM to a host bridge / pod network
                    / masquerade.
                  properties:
                    bridge:
                      type: string
                    mac:
                      type: string
                    model:
                      enum:
                      - virtio
                      - e1000
                      - rtl8139
                      type: string
                    type:
                      enum:
                      - bridge
                      - pod
                      - masquerade
                      type: string
                  required:
                  - type
                  type: object
                type: array
              os:
                description: VmOS describes the guest OS family.
                properties:
                  type:
                    enum:
                    - linux
                    - windows
                    - other
                    type: string
                  variant:
                    type: string
                required:
                - type
                type: object
              owner:
                type: string
              powerState:
                description: PowerState is the desired runtime state.
                enum:
                - Running
                - Stopped
                - Paused
                type: string
              resources:
                description: VmResources captures CPU and memory allocation.
                properties:
                  cores:
                    format: int32
                    type: integer
                  cpu:
                    format: int32
                    minimum: 1
                    type: integer
                  memoryMiB:
                    format: int32
                    minimum: 1
                    type: integer
                  sockets:
                    format: int32
                    type: integer
                  threads:
                    format: int32
                    type: integer
                required:
                - cpu
                - memoryMiB
                type: object
            required:
            - os
            - resources
            type: object
          status:
            description: VmStatus defines observed state of Vm.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              consoleUrl:
                type: string
              ip:
                type: string
              observedGeneration:
                description: ObservedGeneration is the generation last processed by
                  the controller.
                format: int64
                type: integer
              phase:
                enum:
                - Pending
                - Running
                - Stopped
                - Paused
                - Failed
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
