---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: users.novanas.io
spec:
  group: novanas.io
  names:
    categories:
    - novanas
    kind: User
    listKind: UserList
    plural: users
    singular: user
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.username
      name: Username
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.keycloakID
      name: KeycloakID
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: User — Local projection of a Keycloak user.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              UserSpec mirrors packages/schemas/src/identity/user.ts. It describes
              the desired state of a NovaNas User, which is projected into Keycloak
              (users, realm membership, group membership, password rotation) by the
              User controller. The spec also carries POSIX identity attributes that
              the node agent consults when rendering /etc/passwd entries.
            properties:
              admin:
                description: Admin grants cluster-administrator rights via RBAC.
                type: boolean
              displayName:
                description: DisplayName is the human-readable name shown in the UI.
                type: string
              email:
                description: |-
                  Email is the user's primary email. Used by Keycloak for password
                  recovery and notifications.
                pattern: ^[^@\s]+@[^@\s]+\.[^@\s]+$
                type: string
              enabled:
                default: true
                description: Enabled toggles login without deleting the user. Defaults
                  to true.
                type: boolean
              federated:
                description: |-
                  Federated is true when the user is sourced from an external IdP
                  (LDAP/AD/OIDC) and should not receive a local password.
                type: boolean
              groups:
                description: Groups is the list of Group CR names this user belongs
                  to.
                items:
                  type: string
                type: array
              homeDataset:
                description: HomeDataset names a Dataset CR mounted as the user's
                  home directory.
                type: string
              primaryGid:
                description: PrimaryGID is the primary POSIX group-id.
                format: int64
                minimum: 0
                type: integer
              realm:
                description: Realm overrides the operator's default Keycloak realm
                  for this user.
                type: string
              shell:
                description: Shell overrides the default login shell (/bin/bash).
                type: string
              uid:
                description: UID is the POSIX user-id projected into /etc/passwd.
                format: int64
                minimum: 0
                type: integer
              username:
                description: Username is the realm-unique login name.
                maxLength: 255
                minLength: 1
                type: string
            required:
            - username
            type: object
          status:
            description: UserStatus is the observed state of the User projection.
            properties:
              conditions:
                description: Conditions carries Ready/Progressing/Degraded conditions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              keycloakID:
                description: |-
                  KeycloakID is the internal Keycloak UUID returned by the admin API
                  after EnsureUser. Empty while the projection has never succeeded.
                type: string
              lastLogin:
                description: |-
                  LastLogin is the timestamp of the most recent successful login
                  reported by Keycloak. Populated by the sync loop.
                format: date-time
                type: string
              phase:
                description: Phase is a high-level lifecycle state for dashboards.
                enum:
                - Pending
                - Active
                - Disabled
                - Failed
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
