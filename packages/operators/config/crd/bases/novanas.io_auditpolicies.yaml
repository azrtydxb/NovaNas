---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: auditpolicies.novanas.io
spec:
  group: novanas.io
  names:
    categories:
    - novanas
    kind: AuditPolicy
    listKind: AuditPolicyList
    plural: auditpolicies
    singular: auditpolicy
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AuditPolicy — What to audit and where to send it.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              AuditPolicySpec mirrors packages/schemas/src/ops/audit-policy.ts. The
              controller serialises the spec into a ConfigMap that the audit agent
              reads; touching the ConfigMap triggers an agent restart via rollout
              annotation.
            properties:
              events:
                description: |-
                  Events is a list of audit event types to emit (e.g. "user.login",
                  "dataset.mount"). Empty means "all".
                items:
                  type: string
                type: array
              retention:
                description: |-
                  Retention is a Go duration string (e.g. "720h") applied to
                  retention-capable sinks.
                type: string
              severity:
                description: Severity is the minimum severity level recorded.
                enum:
                - info
                - warning
                - critical
                type: string
              sinks:
                description: Sinks is the list of backends receiving records.
                items:
                  description: |-
                    AuditSink is one configured destination for audit records. Exactly
                    one of the backend-specific sub-structs must be set, matching Type.
                  properties:
                    file:
                      description: AuditSinkFile configures an on-disk sink.
                      properties:
                        path:
                          minLength: 1
                          type: string
                      required:
                      - path
                      type: object
                    loki:
                      description: AuditSinkLoki configures a Loki sink.
                      properties:
                        authSecret:
                          description: |-
                            SecretKeyReference names a Secret (optionally in a specific namespace)
                            plus an optional key. It mirrors packages/schemas common
                            SecretReferenceSchema and is used by IAM-domain specs (Certificate,
                            AuditPolicy, KeycloakRealm) to reference bind credentials, webhook
                            auth material, and ACME/upload bundles.
                          properties:
                            key:
                              description: |-
                                Key selects a specific key inside the Secret. When empty, the
                                consumer picks a type-appropriate default (e.g. "tls.crt").
                              type: string
                            name:
                              description: Name is the Secret name.
                              minLength: 1
                              type: string
                            namespace:
                              description: Namespace defaults to the referencing CR's
                                namespace when empty.
                              type: string
                          required:
                          - name
                          type: object
                        url:
                          minLength: 1
                          type: string
                      required:
                      - url
                      type: object
                    name:
                      minLength: 1
                      type: string
                    s3:
                      description: AuditSinkS3 configures an S3 object-store sink.
                      properties:
                        bucket:
                          minLength: 1
                          type: string
                        credentialsSecret:
                          description: |-
                            SecretKeyReference names a Secret (optionally in a specific namespace)
                            plus an optional key. It mirrors packages/schemas common
                            SecretReferenceSchema and is used by IAM-domain specs (Certificate,
                            AuditPolicy, KeycloakRealm) to reference bind credentials, webhook
                            auth material, and ACME/upload bundles.
                          properties:
                            key:
                              description: |-
                                Key selects a specific key inside the Secret. When empty, the
                                consumer picks a type-appropriate default (e.g. "tls.crt").
                              type: string
                            name:
                              description: Name is the Secret name.
                              minLength: 1
                              type: string
                            namespace:
                              description: Namespace defaults to the referencing CR's
                                namespace when empty.
                              type: string
                          required:
                          - name
                          type: object
                        endpoint:
                          type: string
                        prefix:
                          type: string
                      required:
                      - bucket
                      - credentialsSecret
                      type: object
                    syslog:
                      description: AuditSinkSyslog configures a syslog sink.
                      properties:
                        host:
                          minLength: 1
                          type: string
                        port:
                          format: int32
                          maximum: 65535
                          minimum: 1
                          type: integer
                        protocol:
                          enum:
                          - udp
                          - tcp
                          - tls
                          type: string
                      required:
                      - host
                      - port
                      - protocol
                      type: object
                    type:
                      enum:
                      - loki
                      - s3
                      - syslog
                      - file
                      - webhook
                      type: string
                    webhook:
                      description: AuditSinkWebhook configures a generic HTTPS webhook
                        sink.
                      properties:
                        authSecret:
                          description: |-
                            SecretKeyReference names a Secret (optionally in a specific namespace)
                            plus an optional key. It mirrors packages/schemas common
                            SecretReferenceSchema and is used by IAM-domain specs (Certificate,
                            AuditPolicy, KeycloakRealm) to reference bind credentials, webhook
                            auth material, and ACME/upload bundles.
                          properties:
                            key:
                              description: |-
                                Key selects a specific key inside the Secret. When empty, the
                                consumer picks a type-appropriate default (e.g. "tls.crt").
                              type: string
                            name:
                              description: Name is the Secret name.
                              minLength: 1
                              type: string
                            namespace:
                              description: Namespace defaults to the referencing CR's
                                namespace when empty.
                              type: string
                          required:
                          - name
                          type: object
                        url:
                          minLength: 1
                          type: string
                      required:
                      - url
                      type: object
                  required:
                  - name
                  - type
                  type: object
                minItems: 1
                type: array
            required:
            - sinks
            type: object
          status:
            description: AuditPolicyStatus is the observed state of the audit pipeline.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              configMapRef:
                description: ConfigMapRef names the ConfigMap the controller wrote.
                type: string
              eventsEmitted:
                description: EventsEmitted is a best-effort counter of forwarded events.
                format: int64
                minimum: 0
                type: integer
              phase:
                enum:
                - Active
                - Failed
                - Reconciling
                - Ready
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
