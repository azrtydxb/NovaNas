---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: sshkeys.novanas.io
spec:
  group: novanas.io
  names:
    categories:
    - novanas
    kind: SshKey
    listKind: SshKeyList
    plural: sshkeys
    singular: sshkey
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.owner
      name: Owner
      type: string
    - jsonPath: .status.keyType
      name: Type
      type: string
    - jsonPath: .status.fingerprint
      name: Fingerprint
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SshKey — SSH authorized_keys projection with fingerprint tracking.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              SshKeySpec mirrors packages/schemas/src/identity/ssh-key.ts. The
              controller pushes the public key to the host's authorized_keys via
              the node agent and records the SHA-256 fingerprint in status.
            properties:
              comment:
                description: Comment overrides the comment field in the authorized_keys
                  entry.
                type: string
              expiresAt:
                description: |-
                  ExpiresAt disables the key after the given instant by removing it
                  from authorized_keys. Nil means no expiry.
                format: date-time
                type: string
              owner:
                description: |-
                  Owner is the User CR that owns the key. The node agent installs
                  the key into ~owner/.ssh/authorized_keys on targeted hosts.
                minLength: 1
                type: string
              publicKey:
                description: |-
                  PublicKey is the OpenSSH-format public key line
                  (e.g. "ssh-ed25519 AAAA... comment").
                minLength: 1
                type: string
            required:
            - owner
            - publicKey
            type: object
          status:
            description: SshKeyStatus records projection state for the key.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              fingerprint:
                description: |-
                  Fingerprint is the SHA-256 fingerprint of the public key, base64
                  encoded (matches `ssh-keygen -lf`).
                type: string
              keyType:
                description: KeyType is the SSH key algorithm ("ssh-ed25519", "ssh-rsa",
                  etc.).
                type: string
              phase:
                enum:
                - Active
                - Expired
                - Revoked
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
