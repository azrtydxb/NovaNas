      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object }
  /logs/labels:
    get:
      operationId: listLogLabels
      x-required-permissions: [PermLogsRead]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object }
  /logs/labels/{name}/values:
    parameters:
      - in: path
