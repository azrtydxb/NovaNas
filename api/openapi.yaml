openapi: 3.0.3
info:
  title: NovaNAS Storage API
  version: 0.1.0
  description: ZFS-based storage control plane for a single-node NAS appliance.
servers:
  - url: /api/v1

# Default security applies to every operation. /healthz overrides with
# `security: []` to remain public. Per-operation role requirements are
# documented either in the description or via the x-required-permissions
# extension (a list of Permission constants from internal/auth/rbac.go).
security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      summary: Liveness probe
      operationId: getHealthz
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties: { status: { type: string } }

  /metrics:
    get:
      summary: Prometheus metrics
      description: |
        Prometheus text exposition of nova-api metrics: HTTP request
        counters and durations, job dispatch/finish counters and
        durations, ZFS pool/dataset/vdev gauges, and standard Go-runtime
        and process collectors.

        Public endpoint (no bearer required) — operators must restrict
        access via network policy or by setting `METRICS_ADDR` so this
        path is bound on a separate listener (typically a management
        VLAN) instead of the public API listener.

        Note: this path is mounted at the host root, not under the
        `/api/v1` prefix that the rest of this spec uses, to match the
        Prometheus convention.
      operationId: getMetrics
      servers:
        - url: /
      security: []
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string

  /auth/me:
    get:
      summary: Current identity
      description: |
        Returns the authenticated user's Identity (subject, roles, scopes,
        expiresAt). Any valid bearer token is accepted; no specific role
        is required beyond authentication.
      operationId: getAuthMe
      x-required-permissions: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Identity' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /disks:
    get:
      operationId: listDisks
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Disk' }

  /pools:
    get:
      operationId: listPools
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Pool' }
    post:
      operationId: createPool
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PoolCreateSpec' }
      responses:
        '202': { $ref: '#/components/responses/Accepted' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /pools/{name}:
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string }
    get:
      operationId: getPool
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PoolDetail' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: destroyPool
      responses:
        '202': { $ref: '#/components/responses/Accepted' }
        '404': { $ref: '#/components/responses/NotFound' }

  /pools/{name}/scrub:
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string }
      - in: query
        name: action
        schema: { type: string, enum: [start, stop] }
    post:
      operationId: scrubPool
      responses:
        '202': { $ref: '#/components/responses/Accepted' }

  /pools/{name}/trim:
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string }
      - in: query
        name: action
        schema: { type: string, enum: [start, stop] }
    post:
      operationId: trimPool
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PoolTrimRequest' }
      responses:
        '202': { $ref: '#/components/responses/Accepted' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /pools/{name}/properties:
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string }
    patch:
      operationId: patchPoolProperties
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PoolPropertiesPatch' }
      responses:
        '202': { $ref: '#/components/responses/Accepted' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /pools/{name}/checkpoint:
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string }
    post:
      operationId: checkpointPool
      description: Create a pool-wide checkpoint that can be rolled back to.
      responses:
        '202': { $ref: '#/components/responses/Accepted' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /pools/{name}/discard-checkpoint:
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string }
    post:
      operationId: discardPoolCheckpoint
      description: Discard a previously-created pool checkpoint.
      responses:
        '202': { $ref: '#/components/responses/Accepted' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /pools/{name}/upgrade:
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string }
      - in: query
        name: all
        schema: { type: boolean }
        description: When true, upgrade all pools (`zpool upgrade -a`); the path name is ignored.
    post:
      operationId: upgradePool
      description: Upgrade the on-disk format of the named pool, or all pools when `all=true`.
      responses:
        '202': { $ref: '#/components/responses/Accepted' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /pools/{name}/reguid:
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string }
    post:
      operationId: reguidPool
      description: Generate a new unique identifier for the pool.
      responses:
        '202': { $ref: '#/components/responses/Accepted' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /pools/sync:
    post:
      operationId: syncPools
      description: Force in-flight transaction groups to disk for the named pools, or all pools when names is empty/omitted. Synchronous.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PoolSyncRequest' }
      responses:
        '200':
          description: Sync completed
        '400': { $ref: '#/components/responses/BadRequest' }

  /pools/{name}/wait:
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string }
      - in: query
        name: activity
        required: true
        schema: { type: string, enum: [discard, free, initialize, replace, remove, resilver, scrub, trim] }
      - in: query
        name: timeoutSec
        schema: { type: integer, minimum: 0 }
    post:
      operationId: waitPool
      description: Synchronously block until the named pool activity completes or the timeout elapses.
      responses:
        '200':
          description: Activity completed
        '400': { $ref: '#/components/responses/BadRequest' }
        '504':
          description: Wait timed out
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /pools/{name}/metadata:
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string }
    patch:
      operationId: patchPoolMetadata
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MetadataPatch' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ResourceMetadata' }

  /datasets:
    get:
      operationId: listDatasets
      parameters:
        - in: query
          name: pool
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Dataset' }
    post:
      operationId: createDataset
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DatasetCreateSpec' }
      responses:
        '202': { $ref: '#/components/responses/Accepted' }

  /datasets/{fullname}:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string, description: URL-encoded dataset name }
    get:
      operationId: getDataset
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DatasetDetail' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: patchDatasetProps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [properties]
              properties:
                properties:
                  type: object
                  additionalProperties: { type: string }
      responses:
        '202': { $ref: '#/components/responses/Accepted' }
    delete:
      operationId: destroyDataset
      parameters:
        - in: query
          name: recursive
          schema: { type: boolean }
      responses:
        '202': { $ref: '#/components/responses/Accepted' }

  /datasets/{fullname}/rename:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string }
    post:
      operationId: renameDataset
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DatasetRenameRequest' }
      responses:
        '202': { $ref: '#/components/responses/Accepted' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /datasets/{fullname}/clone:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string, description: URL-encoded snapshot name (must contain '@') }
    post:
      operationId: cloneDataset
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DatasetCloneRequest' }
      responses:
        '202': { $ref: '#/components/responses/Accepted' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /datasets/{fullname}/promote:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string }
    post:
      operationId: promoteDataset
      responses:
        '202': { $ref: '#/components/responses/Accepted' }

  /datasets/{fullname}/encryption:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string, description: URL-encoded full dataset name }
    post:
      operationId: initializeDatasetEncryption
      description: |
        Provisions a new encrypted dataset. nova-api generates a fresh 32-byte
        raw key, TPM-wraps it via internal/host/tpm.WrapAEAD, escrows the wrapped
        blob in OpenBao under nova/zfs-keys/<dataset>, and runs `zfs create` with
        the key piped to stdin. Rolls back the OpenBao escrow if `zfs create`
        fails. The plaintext key is never written to disk.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EncryptionInitRequest' }
      responses:
        '201':
          description: Encrypted dataset created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EncryptionInitResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '503':
          description: TPM unavailable on this host

  /datasets/{fullname}/encryption/load-key:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string }
    post:
      operationId: encryptionLoadKey
      description: Fetches the wrapped blob from OpenBao, TPM-unwraps, pipes to `zfs load-key`. Idempotent.
      responses:
        '202': { $ref: '#/components/responses/Accepted' }
        '503':
          description: TPM unavailable on this host

  /datasets/{fullname}/encryption/unload-key:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string }
    post:
      operationId: encryptionUnloadKey
      responses:
        '202': { $ref: '#/components/responses/Accepted' }

  /datasets/{fullname}/encryption/recover:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string }
    post:
      operationId: encryptionRecover
      description: |
        Break-glass: returns the unwrapped 32-byte raw key as hex. Gated by
        PermPoolEncryptionRecover (admin only). Every call writes an explicit
        `encryption.recover` audit row capturing actor + dataset + timestamp;
        the recovered key value is NOT in the audit payload.
      responses:
        '200':
          description: Unwrapped raw key (hex)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EncryptionRecoverResponse' }
        '403':
          description: Caller lacks PermPoolEncryptionRecover
        '404':
          description: No escrowed key for this dataset
        '503':
          description: TPM unavailable on this host

  /datasets/{fullname}/load-key:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string }
    post:
      operationId: loadDatasetKey
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoadKeyRequest' }
      responses:
        '202': { $ref: '#/components/responses/Accepted' }

  /datasets/{fullname}/unload-key:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string }
    post:
      operationId: unloadDatasetKey
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                recursive: { type: boolean }
      responses:
        '202': { $ref: '#/components/responses/Accepted' }

  /datasets/{fullname}/change-key:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string }
    post:
      operationId: changeDatasetKey
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangeKeyRequest' }
      responses:
        '202': { $ref: '#/components/responses/Accepted' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /datasets/{fullname}/send:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string, description: URL-encoded snapshot name }
      - in: query
        name: recursive
        schema: { type: boolean }
      - in: query
        name: raw
        schema: { type: boolean }
      - in: query
        name: compressed
        schema: { type: boolean }
      - in: query
        name: largeBlock
        schema: { type: boolean }
      - in: query
        name: embeddedData
        schema: { type: boolean }
      - in: query
        name: from
        schema: { type: string, description: Incremental base snapshot (`-i`); accepts full or @short name }
    post:
      operationId: sendDataset
      description: Streams the result of `zfs send` as application/octet-stream. Synchronous — not dispatched as a job.
      responses:
        '200':
          description: Binary ZFS send stream
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '400': { $ref: '#/components/responses/BadRequest' }

  /datasets/{fullname}/receive:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string, description: URL-encoded target dataset name }
      - in: query
        name: force
        schema: { type: boolean }
      - in: query
        name: resumable
        schema: { type: boolean }
      - in: query
        name: origin
        schema: { type: string, description: '`-o origin=<snap>` for receiving a clone stream' }
    post:
      operationId: receiveDataset
      description: Pipes the request body into `zfs receive`. Synchronous — not dispatched as a job.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        '200':
          description: Receive completed
        '400': { $ref: '#/components/responses/BadRequest' }
        '500':
          description: Receive failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /datasets/{fullname}/bookmark:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string, description: URL-encoded snapshot name (must contain '@') }
    post:
      operationId: bookmarkSnapshot
      description: Create a bookmark for a snapshot (`zfs bookmark`).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DatasetBookmarkRequest' }
      responses:
        '202': { $ref: '#/components/responses/Accepted' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /datasets/{fullname}/destroy-bookmark:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string, description: URL-encoded dataset name (no '@', no '#') }
    post:
      operationId: destroyDatasetBookmark
      description: |
        Destroy a ZFS bookmark. The URL `{fullname}` is the dataset; the
        request body's `bookmark` field is either the short name (e.g.
        `b1`) — which is combined with the URL dataset to form
        `<dataset>#<short>` — or the full bookmark name `<dataset>#<short>`,
        in which case the dataset prefix must match the URL.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BookmarkDestroyRequest' }
      responses:
        '202': { $ref: '#/components/responses/Accepted' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /datasets/{fullname}/diff:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string, description: URL-encoded from-snapshot name (must contain '@') }
      - in: query
        name: to
        schema: { type: string, description: Optional second argument; either a snapshot or a dataset name }
    get:
      operationId: diffDataset
      description: Return the result of `zfs diff -H <from> [<to>]`. Synchronous.
      responses:
        '200':
          description: Diff entries
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DatasetDiffEntry' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /datasets/{fullname}/bookmarks:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string, description: URL-encoded dataset name }
    get:
      operationId: listDatasetBookmarks
      description: List bookmarks under a dataset (`zfs list -t bookmark -r`). Synchronous.
      responses:
        '200':
          description: Bookmark list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Bookmark' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /datasets/{fullname}/acl:
    parameters:
      - in: path
        name: fullname
        required: true
        description: 'URL-encoded dataset fullname (pool/dataset).'
        schema: { type: string }
    get:
      operationId: getDatasetACL
      summary: Read the NFSv4 ACL on the dataset's mount path (synchronous).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DatasetACE' }
        '400': { $ref: '#/components/responses/BadRequest' }
    put:
      operationId: setDatasetACL
      summary: Replace the entire NFSv4 ACL on the dataset (async).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DatasetACLSetRequest' }
      responses:
        '202': { $ref: '#/components/responses/Accepted' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /datasets/{fullname}/acl/append:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string }
    post:
      operationId: appendDatasetACE
      summary: Append a single ACE to the dataset's NFSv4 ACL (async).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DatasetACLAppendRequest' }
      responses:
        '202': { $ref: '#/components/responses/Accepted' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /datasets/{fullname}/acl/{index}:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string }
      - in: path
        name: index
        required: true
        description: '0-based index in the order returned by GET /acl.'
        schema: { type: integer, minimum: 0 }
    delete:
      operationId: removeDatasetACE
      summary: Remove the ACE at index from the dataset's NFSv4 ACL (async).
      responses:
        '202': { $ref: '#/components/responses/Accepted' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /datasets/{fullname}/metadata:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string }
    patch:
      operationId: patchDatasetMetadata
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MetadataPatch' }
      responses:
        '200':
          description: OK

  /datasets/{fullname}/rollback:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string }
    post:
      operationId: rollbackDataset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [snapshot]
              properties:
                snapshot: { type: string }
      responses:
        '202': { $ref: '#/components/responses/Accepted' }

  /snapshots:
    get:
      operationId: listSnapshots
      parameters:
        - in: query
          name: dataset
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Snapshot' }
    post:
      operationId: createSnapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dataset, name]
              properties:
                dataset: { type: string }
                name:    { type: string }
                recursive: { type: boolean, default: false }
      responses:
        '202': { $ref: '#/components/responses/Accepted' }

  /snapshots/{fullname}:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string }
    delete:
      operationId: destroySnapshot
      responses:
        '202': { $ref: '#/components/responses/Accepted' }

  /snapshots/{fullname}/hold:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string, description: URL-encoded snapshot name }
    post:
      operationId: holdSnapshot
      description: Place a user hold on a snapshot (`zfs hold`).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SnapshotHoldRequest' }
      responses:
        '202': { $ref: '#/components/responses/Accepted' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /snapshots/{fullname}/release:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string, description: URL-encoded snapshot name }
    post:
      operationId: releaseSnapshot
      description: Release a user hold from a snapshot (`zfs release`).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SnapshotReleaseRequest' }
      responses:
        '202': { $ref: '#/components/responses/Accepted' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /snapshots/{fullname}/holds:
    parameters:
      - in: path
        name: fullname
        required: true
        schema: { type: string, description: URL-encoded snapshot name }
    get:
      operationId: listSnapshotHolds
      description: List user holds on a snapshot (`zfs holds -H -p`). Synchronous.
      responses:
        '200':
          description: Holds list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Hold' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /snapshots/{fullname}/metadata:
