  /notifications/smtp:
    get:
      operationId: getSMTPConfig
      summary: Read the current SMTP relay configuration
      description: |
        Returns the SMTP relay config used for outbound email
        (transactional + alert pages). The password is always redacted
        as `"***"` in the response — operators must consult the
        configured password file out-of-band to inspect the cleartext.
      x-required-permissions: [PermNotificationsRead]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SMTPConfig' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    put:
      operationId: putSMTPConfig
      summary: Replace the SMTP relay configuration
      description: |
        Updates host/port/credentials at runtime without restarting
        nova-api. To preserve the currently stored password without
        re-typing it, send `"password": "***"`.
      x-required-permissions: [PermNotificationsWrite]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SMTPConfig' }
      responses:
        '200':
          description: Updated; body echoes the redacted post-update config.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SMTPConfig' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /notifications/smtp/test:
    post:
      operationId: sendSMTPTest
      summary: Send a synchronous test email through the configured relay
      description: |
        Bypasses the outbox and rate limiter — the response reflects
        the relay's verdict in real time. 502 with code `smtp_error`
        means the relay refused or the connection failed; the message
        contains the underlying error.
      x-required-permissions: [PermNotificationsWrite]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to]
              properties:
                to: { type: string, format: email }
      responses:
        '200':
          description: Relay accepted the message.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  to:     { type: string, format: email }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '502':
          description: SMTP relay refused the message or connection failed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

