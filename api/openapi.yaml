    get:
      operationId: listLogLabelValues
      x-required-permissions: [PermLogsRead]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object }
  /logs/series:
    get:
      operationId: listLogSeries
      x-required-permissions: [PermLogsRead]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object }
  /logs/tail:
    get:
      operationId: tailLogs
      summary: WebSocket tail (not yet implemented in v1)
      x-required-permissions: [PermLogsRead]
      responses:
        '501': { description: Not implemented }

  /auth/sessions:
    get:
      operationId: listOwnSessions
      x-required-permissions: [PermSessionsRead]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
