          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/LoginEvent' }

  /system/version:
    get:
      operationId: getSystemVersion
      x-required-permissions: [PermSystemRead]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemVersion' }
  /system/updates:
    get:
