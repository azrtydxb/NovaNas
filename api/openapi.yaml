        schema: { type: string, format: uuid }
    get:
      operationId: streamJob
      responses:
        '200':
          description: SSE stream of job state events
          content:
            text/event-stream:
              schema: { type: string }

  /workloads/index:
    get:
      operationId: listWorkloadIndex
      summary: List the curated chart catalog (Apps).
      description: Returns the operator-curated index of installable apps. Each
        entry is a Helm chart pinned to a specific version. Permissions
        nova:workloads:read.
      x-required-permissions: [nova:workloads:read]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/WorkloadIndexEntry' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /workloads/index/{name}:
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string }
    get:
      operationId: getWorkloadIndexEntry
      summary: Get one chart catalog entry plus README and values schema.
      x-required-permissions: [nova:workloads:read]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkloadIndexEntryDetail' }
        '404': { $ref: '#/components/responses/NotFound' }

  /workloads/index/reload:
    post:
      operationId: reloadWorkloadIndex
      summary: Re-read the on-disk chart index (operator/admin only).
      x-required-permissions: [nova:workloads:write]
      responses:
        '200':
          description: Reloaded
          content:
            application/json:
              schema:
                type: object
                properties: { status: { type: string } }

  /workloads:
    get:
      operationId: listWorkloads
      summary: List installed apps (Helm releases in nova-app-* namespaces).
      x-required-permissions: [nova:workloads:read]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/WorkloadRelease' }
    post:
      operationId: installWorkload
      summary: Install an app from the curated index.
      x-required-permissions: [nova:workloads:write]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WorkloadInstallRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkloadRelease' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409':
          description: A release with the same name already exists.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /workloads/{releaseName}:
    parameters:
      - in: path
        name: releaseName
        required: true
        schema: { type: string }
    get:
      operationId: getWorkload
      summary: Installed-app detail (status, values, k8s resources, pods).
      x-required-permissions: [nova:workloads:read]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkloadReleaseDetail' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: upgradeWorkload
      summary: Upgrade a release (new version, new values, or both).
      x-required-permissions: [nova:workloads:write]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WorkloadUpgradeRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkloadRelease' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: uninstallWorkload
      summary: Uninstall a release and drop its namespace.
      x-required-permissions: [nova:workloads:write]
      responses:
        '204':
          description: No content
        '404': { $ref: '#/components/responses/NotFound' }

  /workloads/{releaseName}/rollback:
    parameters:
      - in: path
        name: releaseName
        required: true
        schema: { type: string }
    post:
      operationId: rollbackWorkload
      summary: Roll a release back to a previous Helm revision.
      x-required-permissions: [nova:workloads:write]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                revision:
                  type: integer
                  minimum: 1
                  description: Helm revision to roll back to. Defaults to 1.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkloadRelease' }
        '404': { $ref: '#/components/responses/NotFound' }

  /workloads/{releaseName}/events:
    parameters:
      - in: path
        name: releaseName
        required: true
        schema: { type: string }
    get:
      operationId: listWorkloadEvents
      summary: Recent k8s events scoped to the release namespace.
      x-required-permissions: [nova:workloads:read]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/WorkloadEvent' }

  /workloads/{releaseName}/logs:
    parameters:
      - in: path
        name: releaseName
        required: true
        schema: { type: string }
      - in: query
        name: pod
        schema: { type: string }
      - in: query
        name: container
        schema: { type: string }
      - in: query
        name: follow
        schema: { type: boolean }
      - in: query
        name: tail
        schema: { type: integer }
      - in: query
        name: sinceSeconds
        schema: { type: integer }
      - in: query
        name: timestamps
        schema: { type: boolean }
      - in: query
        name: previous
        schema: { type: boolean }
    get:
      operationId: streamWorkloadLogs
      summary: Stream pod logs from a release's namespace.
      description: |
        Streams logs as text/plain. When `follow=true` the connection is
        held open until the client cancels.
      x-required-permissions: [nova:workloads:read]
      responses:
        '200':
          description: Log stream
          content:
            text/plain:
              schema: { type: string }
        '404': { $ref: '#/components/responses/NotFound' }
        '503':
          description: Cluster not available.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ---- Tier 2 first-party plugin engine -----------------------------------
  /plugins/index:
    get:
      operationId: listPluginIndex
      summary: List the marketplace catalog.
      description: |
        Returns the cosign-verified marketplace index. Cached server-side
        for 15 minutes; pass `?refresh=true` to force a fresh fetch.
      x-required-permissions: [nova:plugins:read]
      parameters:
        - in: query
          name: refresh
          schema: { type: boolean }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PluginIndex' }
        '502':
          description: Marketplace unreachable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /plugins/index/{name}:
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string }
    get:
      operationId: getPluginIndexEntry
      summary: One plugin's metadata + version list.
      x-required-permissions: [nova:plugins:read]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PluginIndexEntry' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /plugins:
    get:
      operationId: listPlugins
      summary: List installed plugins.
      x-required-permissions: [nova:plugins:read]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PluginInstallation' }
    post:
      operationId: installPlugin
      summary: Install a plugin from the marketplace.
      description: |
        Downloads, verifies (cosign), unpacks, runs auto-provisioning of
        any declared `needs:`, deploys the runtime (helm/systemd), mounts
        API routes, and registers the UI bundle.
      x-required-permissions: [nova:plugins:admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PluginInstallRequest' }
      responses:
        '201':
          description: Installed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PluginInstallation' }
        '400':
          description: Bad request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Already installed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /plugins/{name}:
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string }
    get:
      operationId: getPlugin
      summary: One installed plugin (manifest + status + provisioned resources).
      x-required-permissions: [nova:plugins:read]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PluginInstallation' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    patch:
      operationId: upgradePlugin
      summary: Upgrade an installed plugin to a new version.
      x-required-permissions: [nova:plugins:admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PluginUpgradeRequest' }
      responses:
        '200':
          description: Upgraded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PluginInstallation' }
    delete:
      operationId: uninstallPlugin
      summary: Uninstall a plugin.
      description: |
        With `?purge=true`, the engine also unwinds all auto-provisioned
        `needs:` resources (datasets, oidcClients, …). Without purge they
        are preserved so an immediate reinstall is fast.
      x-required-permissions: [nova:plugins:admin]
      parameters:
        - in: query
          name: purge
          schema: { type: boolean }
      responses:
        '204':
          description: Uninstalled

  # ---- KubeVirt VM management ----------------------------------------------
  /vms:
    get:
      operationId: listVMs
      summary: List VMs across all "vm-*" namespaces.
      x-required-permissions: [nova:vm:read]
      parameters:
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 200 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VMPage' }
        '503':
          description: KubeVirt not available
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    post:
      operationId: createVM
      summary: Create a VM.
      x-required-permissions: [nova:vm:write]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VMCreateRequest' }
      responses:
        '201':
          description: Created
          content: { application/json: { schema: { $ref: '#/components/schemas/VM' } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '503':
          description: KubeVirt not available
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

  /vms/{namespace}/{name}:
    parameters:
      - in: path
        name: namespace
        required: true
        schema: { type: string }
      - in: path
        name: name
        required: true
        schema: { type: string }
    get:
      operationId: getVM
      x-required-permissions: [nova:vm:read]
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/VM' } } }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: patchVM
      x-required-permissions: [nova:vm:write]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VMPatchRequest' }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/VM' } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: deleteVM
      x-required-permissions: [nova:vm:write]
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /vms/{namespace}/{name}/start:
    parameters:
      - { in: path, name: namespace, required: true, schema: { type: string } }
      - { in: path, name: name, required: true, schema: { type: string } }
    post:
      operationId: startVM
      x-required-permissions: [nova:vm:write]
      responses:
        '202': { description: Accepted }
        '404': { $ref: '#/components/responses/NotFound' }
  /vms/{namespace}/{name}/stop:
    parameters:
      - { in: path, name: namespace, required: true, schema: { type: string } }
      - { in: path, name: name, required: true, schema: { type: string } }
    post:
      operationId: stopVM
      x-required-permissions: [nova:vm:write]
      responses:
        '202': { description: Accepted }
        '404': { $ref: '#/components/responses/NotFound' }
  /vms/{namespace}/{name}/restart:
    parameters:
      - { in: path, name: namespace, required: true, schema: { type: string } }
      - { in: path, name: name, required: true, schema: { type: string } }
    post:
      operationId: restartVM
      x-required-permissions: [nova:vm:write]
      responses:
        '202': { description: Accepted }
        '404': { $ref: '#/components/responses/NotFound' }
  /vms/{namespace}/{name}/pause:
    parameters:
      - { in: path, name: namespace, required: true, schema: { type: string } }
      - { in: path, name: name, required: true, schema: { type: string } }
    post:
      operationId: pauseVM
      x-required-permissions: [nova:vm:write]
      responses:
        '202': { description: Accepted }
        '404': { $ref: '#/components/responses/NotFound' }
  /vms/{namespace}/{name}/unpause:
    parameters:
      - { in: path, name: namespace, required: true, schema: { type: string } }
      - { in: path, name: name, required: true, schema: { type: string } }
    post:
      operationId: unpauseVM
      x-required-permissions: [nova:vm:write]
      responses:
        '202': { description: Accepted }
        '404': { $ref: '#/components/responses/NotFound' }
  /vms/{namespace}/{name}/migrate:
    parameters:
      - { in: path, name: namespace, required: true, schema: { type: string } }
      - { in: path, name: name, required: true, schema: { type: string } }
    post:
      operationId: migrateVM
      summary: Live-migrate a VM. Returns 501 on single-node clusters.
      x-required-permissions: [nova:vm:write]
      responses:
        '202': { description: Accepted }
        '501':
          description: Not implemented (single-node cluster)
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
        '404': { $ref: '#/components/responses/NotFound' }

  /vms/{namespace}/{name}/console:
    parameters:
      - { in: path, name: namespace, required: true, schema: { type: string } }
      - { in: path, name: name, required: true, schema: { type: string } }
      - in: query
        name: kind
        schema: { type: string, enum: [vnc, spice, serial] }
    get:
      operationId: getVMConsole
      summary: Mint a short-lived WebSocket session for the VM's graphical console.
      x-required-permissions: [nova:vm:read]
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/VMConsoleSession' } } }
        '409':
          description: VM is not running
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
        '404': { $ref: '#/components/responses/NotFound' }
  /vms/{namespace}/{name}/serial:
    parameters:
      - { in: path, name: namespace, required: true, schema: { type: string } }
      - { in: path, name: name, required: true, schema: { type: string } }
    get:
      operationId: getVMSerial
      x-required-permissions: [nova:vm:read]
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/VMConsoleSession' } } }
        '409':
          description: VM is not running
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
        '404': { $ref: '#/components/responses/NotFound' }

  /vm-templates:
    get:
      operationId: listVMTemplates
      summary: List the curated VM template catalog.
      x-required-permissions: [nova:vm:read]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/VMTemplate' }

  /vm-snapshots:
    get:
      operationId: listVMSnapshots
      x-required-permissions: [nova:vm:read]
      parameters:
        - in: query
          name: namespace
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/VMSnapshot' }
    post:
      operationId: createVMSnapshot
      x-required-permissions: [nova:vm:write]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VMSnapshotCreateRequest' }
      responses:
        '201':
          description: Created
          content: { application/json: { schema: { $ref: '#/components/schemas/VMSnapshot' } } }
        '400': { $ref: '#/components/responses/BadRequest' }

  /vm-snapshots/{namespace}/{name}:
    parameters:
      - { in: path, name: namespace, required: true, schema: { type: string } }
      - { in: path, name: name, required: true, schema: { type: string } }
    delete:
      operationId: deleteVMSnapshot
      x-required-permissions: [nova:vm:write]
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /vm-restores:
    get:
      operationId: listVMRestores
      x-required-permissions: [nova:vm:read]
      parameters:
        - in: query
          name: namespace
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/VMRestore' }
    post:
      operationId: createVMRestore
      x-required-permissions: [nova:vm:write]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VMRestoreCreateRequest' }
      responses:
        '201':
          description: Created
          content: { application/json: { schema: { $ref: '#/components/schemas/VMRestore' } } }
        '400': { $ref: '#/components/responses/BadRequest' }

  /vm-restores/{namespace}/{name}:
    parameters:
      - { in: path, name: namespace, required: true, schema: { type: string } }
      - { in: path, name: name, required: true, schema: { type: string } }
    delete:
      operationId: deleteVMRestore
      x-required-permissions: [nova:vm:write]
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

components:
  responses:
    Accepted:
      description: Async operation accepted; check Location header for job URL.
      headers:
        Location:
          schema: { type: string }
      content:
        application/json:
          schema:
            type: object
            properties:
              jobId: { type: string, format: uuid }
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Authenticated but lacking the required permission
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        OIDC-issued JWT (typically from Keycloak). The verifier checks the
        signature against the issuer's JWKS, validates `aud` and `exp`,
        and projects realm/resource roles into the request Identity.
        Operators map roles to nova:* permissions via the RoleMap; see
        internal/auth/rbac.go for the canonical permission constants.

  schemas:
    Error:
      type: object
      properties:
        error:   { type: string }
        message: { type: string }
    SMTPConfig:
      type: object
      description: |
        Outbound SMTP relay configuration. The `password` field is
        write-only — GET responses always return `"***"`. To preserve
        the stored password during a PUT, send the literal string
        `"***"` for `password`; any other non-empty value replaces it.
      required: [host, port, fromAddress, tlsMode]
      properties:
        host:         { type: string, description: "SMTP relay hostname (e.g. smtp.sendgrid.net)." }
        port:         { type: integer, minimum: 1, maximum: 65535 }
        username:     { type: string }
        password:     { type: string, description: "Cleartext on PUT, redacted on GET." }
        fromAddress:  { type: string, format: email }
        tlsMode:
          type: string
          enum: [none, starttls, tls]
          description: "STARTTLS is recommended for port 587; tls (implicit TLS) for port 465."
        maxPerMinute:
          type: integer
          minimum: 1
          description: "Per-recipient leaky-bucket rate limit. Default 30."
    NotificationEvent:
      type: object
      description: |
        A unified notification event aggregated from Alertmanager,
        the jobs subsystem, the audit log, or the system itself.
        Per-user state (read/dismissed/snoozed) is embedded under
        `userState` and is computed for the calling user at read time.
      required: [id, source, sourceId, severity, title, createdAt, userState]
      properties:
        id:        { type: string, format: uuid }
        tenantId:  { type: string }
        source:
          type: string
          enum: [alertmanager, jobs, audit, system]
        sourceId:  { type: string, description: "Stable per-source identifier (alert fingerprint, job_id, audit_id, ...)." }
        severity:
          type: string
          enum: [info, warning, critical]
        title:     { type: string }
        body:      { type: string }
        link:      { type: string, description: "Relative path the UI should navigate to (e.g. /jobs/<id>)." }
        createdAt: { type: string, format: date-time }
        userState: { $ref: '#/components/schemas/NotificationUserState' }
    NotificationUserState:
      type: object
      description: Per-user state for a notification.
      required: [read, dismissed, snoozed]
      properties:
        read:         { type: boolean }
        dismissed:    { type: boolean }
        snoozed:      { type: boolean }
        readAt:       { type: string, format: date-time }
        dismissedAt:  { type: string, format: date-time }
        snoozedUntil: { type: string, format: date-time }
    NotificationEventList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/NotificationEvent' }
        nextCursor:
          type: string
          description: Opaque cursor — pass back as `cursor=` to fetch the next page.
    Identity:
      type: object
      description: Authenticated principal as projected from a verified JWT.
      required: [sub, roles, scopes, expiresAt]
      properties:
        sub:               { type: string, description: "Subject (stable user id)." }
        preferredUsername: { type: string }
        email:             { type: string, format: email }
        realm:             { type: string, description: "Keycloak realm derived from the issuer." }
        roles:
          type: array
          items: { type: string }
        scopes:
          type: array
          items: { type: string }
        expiresAt:         { type: string, format: date-time }
    Disk:
      type: object
      properties:
        name:        { type: string }
        sizeBytes:   { type: integer, format: int64 }
        model:       { type: string }
        serial:      { type: string }
        wwn:         { type: string }
        rotational:  { type: boolean }
        inUseByPool: { type: boolean }
    Pool:
      type: object
      properties:
        name:             { type: string }
        sizeBytes:        { type: integer }
        allocated:        { type: integer }
        free:             { type: integer }
        health:           { type: string }
        readOnly:         { type: boolean }
        fragmentationPct: { type: integer }
        capacityPct:      { type: integer }
        dedupRatio:       { type: string }
    PoolDetail:
      type: object
      properties:
        pool:       { $ref: '#/components/schemas/Pool' }
        properties: { type: object, additionalProperties: { type: string } }
        status:
          type: object
          properties:
            state: { type: string }
            vdevs:
              type: array
              items: { $ref: '#/components/schemas/Vdev' }
    Vdev:
      type: object
      properties:
        type:           { type: string }
        path:           { type: string }
        state:          { type: string }
        readErrors:     { type: integer }
        writeErrors:    { type: integer }
        checksumErrors: { type: integer }
        children:
          type: array
          items: { $ref: '#/components/schemas/Vdev' }
    VdevSpec:
      type: object
      required: [type, disks]
      properties:
        type:  { type: string, enum: [mirror, raidz1, raidz2, raidz3, stripe, disk] }
        disks: { type: array, items: { type: string } }
    PoolCreateSpec:
      type: object
      required: [name, vdevs]
      properties:
        name: { type: string }
        vdevs:
          type: array
          items: { $ref: '#/components/schemas/VdevSpec' }
        # Log accepts mirror|stripe|disk vdevs only (raidz/draid are rejected
        # by the API — ZFS does not support them for log vdevs).
        log:   { type: array, items: { $ref: '#/components/schemas/VdevSpec' } }
        cache: { type: array, items: { type: string } }
        spare: { type: array, items: { type: string } }
    Dataset:
      type: object
      properties:
        name:            { type: string }
        type:            { type: string, enum: [filesystem, volume] }
        usedBytes:       { type: integer }
        availableBytes:  { type: integer }
        referencedBytes: { type: integer }
        mountpoint:      { type: string }
        compression:     { type: string }
        recordSizeBytes: { type: integer }
        encryptionEnabled:   { type: boolean, description: True if the dataset uses ZFS native encryption with a NovaNAS-escrowed key }
        encryptionAlgorithm: { type: string, description: ZFS encryption algorithm (e.g. aes-256-gcm); empty if not encrypted }
    DatasetDetail:
      type: object
      properties:
        dataset:    { $ref: '#/components/schemas/Dataset' }
        properties: { type: object, additionalProperties: { type: string } }
    DatasetCreateSpec:
      type: object
      required: [parent, name, type]
      properties:
        parent: { type: string }
        name:   { type: string }
        type:   { type: string, enum: [filesystem, volume] }
        volumeSizeBytes: { type: integer }
        properties:
          type: object
          additionalProperties: { type: string }
        encryptionEnabled:   { type: boolean, description: When true the dataset is provisioned via the encryption endpoints which generate + escrow a TPM-wrapped raw key }
        encryptionAlgorithm: { type: string, default: aes-256-gcm }
    EncryptionInitRequest:
      type: object
      required: [type]
      properties:
        type:            { type: string, enum: [filesystem, volume] }
        volumeSizeBytes: { type: integer, description: Required for type=volume }
        algorithm:       { type: string, default: aes-256-gcm }
        properties:
          type: object
          additionalProperties: { type: string }
          description: Extra `-o key=value` pairs. Reserved keys (encryption, keyformat, keylocation) are rejected.
    EncryptionInitResponse:
      type: object
      required: [dataset, algorithm, created]
      properties:
        dataset:   { type: string }
        algorithm: { type: string }
        created:   { type: string, format: date-time }
    EncryptionRecoverResponse:
      type: object
      required: [dataset, keyHex]
      properties:
        dataset: { type: string }
        keyHex:
          type: string
          description: 64-character hex encoding of the unwrapped 32-byte raw key
          pattern: '^[0-9a-f]{64}$'
    Snapshot:
      type: object
      properties:
        name:            { type: string }
        dataset:         { type: string }
        shortName:       { type: string }
        usedBytes:       { type: integer }
        referencedBytes: { type: integer }
        creationUnix:    { type: integer }
    Job:
      type: object
      properties:
        id:        { type: string, format: uuid }
        kind:      { type: string }
        target:    { type: string }
        state:     { type: string }
        command:   { type: string }
        stdout:    { type: string }
        stderr:    { type: string }
        exitCode:  { type: integer, nullable: true }
        error:     { type: string, nullable: true }
        createdAt:  { type: string, format: date-time }
        startedAt:  { type: string, format: date-time, nullable: true }
        finishedAt: { type: string, format: date-time, nullable: true }
    AuditEvent:
      type: object
      required: [id, timestamp, action, resource, outcome]
      properties:
        id:         { type: integer, format: int64 }
        timestamp:  { type: string, format: date-time }
        actor:      { type: string }
        action:     { type: string, description: "HTTP method + path, e.g. 'POST /api/v1/pools'" }
        resource:   { type: string, description: "Resource path (URL of the affected object)" }
        request_id: { type: string }
        payload:    { description: "Redacted request body (when JSON)." }
        outcome:    { type: string, enum: [accepted, rejected] }
    AuditListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/AuditEvent' }
        next_cursor:
          type: string
          description: |
            Opaque cursor; pass back as ?cursor=... to fetch the next
            page. Empty when there are no more rows.
    AuditSummaryRow:
      type: object
      required: [actor, action, outcome, count]
      properties:
        actor:   { type: string }
        action:  { type: string }
        outcome: { type: string }
        count:   { type: integer, format: int64 }
    MetadataPatch:
      type: object
      properties:
        display_name: { type: string }
        description:  { type: string }
        tags:
          type: object
          additionalProperties: { type: string }
    DatasetRenameRequest:
      type: object
      required: [newName]
      properties:
        newName:   { type: string }
        recursive: { type: boolean, default: false }
    DatasetCloneRequest:
      type: object
      required: [target]
      properties:
        target: { type: string }
        properties:
          type: object
          additionalProperties: { type: string }
    LoadKeyRequest:
      type: object
      properties:
        keylocation: { type: string }
        recursive:   { type: boolean, default: false }
    ChangeKeyRequest:
      type: object
      required: [properties]
      properties:
        properties:
          type: object
          additionalProperties: { type: string }
    PoolTrimRequest:
      type: object
      properties:
        disk: { type: string, description: Optional vdev path; absent trims the whole pool }
    PoolPropertiesPatch:
      type: object
      required: [properties]
      properties:
        properties:
          type: object
          additionalProperties: { type: string }
    ResourceMetadata:
      type: object
      properties:
        id:           { type: integer }
        kind:         { type: string }
        zfsName:      { type: string }
        displayName:  { type: string, nullable: true }
        description:  { type: string, nullable: true }
        tags:         { type: object, nullable: true, additionalProperties: { type: string } }
    DatasetBookmarkRequest:
      type: object
      required: [bookmark]
      properties:
        bookmark:
          type: string
          description: Full bookmark name `<dataset>#<short>`.
    BookmarkDestroyRequest:
      type: object
      required: [bookmark]
      properties:
        bookmark:
          type: string
          description: Either a short name (combined with the URL dataset) or full `<dataset>#<short>`.
    SnapshotHoldRequest:
      type: object
      required: [tag]
      properties:
        tag:       { type: string }
        recursive: { type: boolean, default: false }
    SnapshotReleaseRequest:
      type: object
      required: [tag]
      properties:
        tag:       { type: string }
        recursive: { type: boolean, default: false }
    PoolUpgradeRequest:
      type: object
      properties:
        all: { type: boolean, default: false }
    PoolSyncRequest:
      type: object
      properties:
        names:
          type: array
          description: Pool names to sync; empty/omitted means all pools.
          items: { type: string }
    DatasetDiffEntry:
      type: object
      required: [change, path]
      properties:
        change:  { type: string, enum: ['+', '-', M, R], description: Change type — added, removed, modified, renamed }
        path:    { type: string }
        newPath: { type: string, description: Set only when change is `R` (rename) }
    Bookmark:
      type: object
      required: [name, creationUnix]
      properties:
        name:         { type: string }
        creationUnix: { type: integer, format: int64 }
    Hold:
      type: object
      required: [snapshot, tag, creationUnix]
      properties:
        snapshot:     { type: string }
        tag:          { type: string }
        creationUnix: { type: integer, format: int64 }
    IscsiTarget:
      type: object
      required: [iqn]
      properties:
        iqn: { type: string }
    IscsiPortal:
      type: object
      required: [ip, port]
      properties:
        ip:        { type: string }
        port:      { type: integer }
        transport: { type: string, enum: [tcp, iser] }
    IscsiLUN:
      type: object
      required: [id, backstore]
      properties:
        id:        { type: integer }
        zvol:      { type: string, description: '/dev/zvol/<pool>/<name>' }
        backstore: { type: string }
    IscsiACL:
      type: object
      required: [initiatorIqn]
      properties:
        initiatorIqn: { type: string }
        chapUser:     { type: string }
        chapSecret:   { type: string, description: '12-16 characters per RFC 3720; never returned on reads' }
    IscsiTargetDetail:
      type: object
      properties:
        target:  { $ref: '#/components/schemas/IscsiTarget' }
        portals: { type: array, items: { $ref: '#/components/schemas/IscsiPortal' } }
        luns:    { type: array, items: { $ref: '#/components/schemas/IscsiLUN' } }
        acls:    { type: array, items: { $ref: '#/components/schemas/IscsiACL' } }
    NvmeofSubsystem:
      type: object
      required: [nqn]
      properties:
        nqn:          { type: string }
        allowAnyHost: { type: boolean }
        serial:       { type: string }
    NvmeofNamespace:
      type: object
      required: [nsid, devicePath]
      properties:
        nsid:       { type: integer }
        devicePath: { type: string, description: 'Must start with /dev/' }
        enabled:    { type: boolean }
    NvmeofPort:
      type: object
      required: [id, ip, port, transport]
      properties:
        id:        { type: integer }
        ip:        { type: string }
        port:      { type: integer }
        transport: { type: string, enum: [tcp, rdma] }
    NvmeofHost:
      type: object
      required: [hostNqn]
      properties:
        hostNqn: { type: string }
    NvmeofDHChapConfig:
      type: object
      description: 'Per-host DH-HMAC-CHAP (NVMe TP4022) configuration. Secrets must be in "DHHC-1:NN:..." form. Empty fields are left unchanged on PATCH-style updates.'
      properties:
        key:     { type: string, description: 'Host secret in TP4022 format' }
        ctrlKey: { type: string, description: 'Controller secret for bidirectional auth' }
        hash:    { type: string, enum: ['hmac(sha256)', 'hmac(sha384)', 'hmac(sha512)'] }
        dhgroup: { type: string, enum: [null, ffdhe2048, ffdhe3072, ffdhe4096, ffdhe6144, ffdhe8192] }
    NvmeofDHChapDetail:
      type: object
      description: 'Read-side DH-HMAC-CHAP detail. Raw key material is never returned.'
      required: [hasKey, hasCtrlKey]
      properties:
        hasKey:     { type: boolean }
        hasCtrlKey: { type: boolean }
        hash:       { type: string }
        dhgroup:    { type: string }
    NvmeofSubsystemDetail:
      type: object
      properties:
        subsystem:    { $ref: '#/components/schemas/NvmeofSubsystem' }
        namespaces:   { type: array, items: { $ref: '#/components/schemas/NvmeofNamespace' } }
        allowedHosts: { type: array, items: { type: string } }
    NfsClientRule:
      type: object
      required: [spec, options]
      properties:
        spec:    { type: string, description: 'CIDR, IP, "*", or hostname/wildcard pattern' }
        options: { type: string, description: 'Comma-separated NFS export options (e.g. "rw,sync,sec=krb5p")' }
    NfsExport:
      type: object
      required: [name, path, clients]
      properties:
        name:    { type: string, description: 'Filename-safe identifier (alnum, -, _; 1-64 chars)' }
        path:    { type: string, description: 'Absolute host path' }
        clients:
          type: array
          items: { $ref: '#/components/schemas/NfsClientRule' }
    NfsActiveExport:
      type: object
      required: [Path, Client, Options]
      properties:
        Path:    { type: string }
        Client:  { type: string }
        Options: { type: string }
    Krb5Realm:
      type: object
      required: [kdc]
      properties:
        kdc:
          type: array
          items: { type: string, description: 'host or host:port' }
        adminServer:   { type: string }
        defaultDomain: { type: string }
    Krb5Config:
      type: object
      required: [defaultRealm, realms]
      properties:
        defaultRealm: { type: string, description: 'Uppercase realm name (e.g. EXAMPLE.COM)' }
        realms:
          type: object
          additionalProperties: { $ref: '#/components/schemas/Krb5Realm' }
        domainRealm:
          type: object
          additionalProperties: { type: string }
        dnsLookupKdc:   { type: boolean }
        dnsLookupRealm: { type: boolean }
    Krb5IdmapdConfig:
      type: object
      required: [domain]
      properties:
        domain:    { type: string, description: 'NFSv4 ID-map domain (typically lowercase realm)' }
        verbosity: { type: integer, minimum: 0, maximum: 9 }
    Krb5KeytabEntry:
      type: object
      required: [kvno, principal, encryption]
      properties:
        kvno:       { type: integer }
        principal:  { type: string }
        encryption: { type: string }
    Krb5KeytabUpload:
      type: object
      required: [data]
      properties:
        data:
          type: string
          format: byte
          description: 'Base64-encoded raw keytab bytes (must begin with magic byte 0x05)'
    Krb5KDCStatus:
      type: object
      required: [running, realm, databaseExists, stashSealed, principalCount]
      properties:
        running:        { type: boolean, description: 'Is krb5kdc.service active?' }
        realm:          { type: string,  description: 'Configured realm (e.g. NOVANAS.LOCAL)' }
        databaseExists: { type: boolean, description: 'Has the principal DB been bootstrapped?' }
        stashSealed:    { type: boolean, description: 'Is the master-key stash file present?' }
        principalCount: { type: integer, description: 'Number of principals known to the KDC' }
    Krb5Principal:
      type: object
      required: [name]
      properties:
        name:       { type: string, description: 'Fully-qualified principal (e.g. nfs/host@REALM)' }
        kvno:       { type: integer, description: 'Current key version number' }
        expiration: { type: string,  description: 'kadmin-formatted expiration ([never] or RFC date)' }
        attributes: { type: string,  description: 'kadmin attribute flags (REQUIRES_PRE_AUTH, ...)' }
    Krb5PrincipalCreate:
      type: object
      required: [name]
      properties:
        name:     { type: string,  description: 'Principal name; realm optional' }
        randkey:  { type: boolean, description: 'Generate a random key (default for service principals)' }
        password: { type: string,  description: 'Initial password (mutually exclusive with randkey)' }
    RdmaAdapter:
      type: object
      required: [name]
      properties:
        name:    { type: string, description: 'e.g. mlx5_0' }
        boardId: { type: string }
        hcaType: { type: string }
        ports:
          type: array
          items: { $ref: '#/components/schemas/RdmaAdapterPort' }
    RdmaAdapterPort:
      type: object
      required: [number, state, linkLayer]
      properties:
        number:    { type: integer }
        state:     { type: string, description: 'ACTIVE, DOWN, INIT, ARMED' }
        linkLayer: { type: string, description: 'InfiniBand or Ethernet (RoCE)' }
        gids:
          type: array
          items: { type: string }

    SambaShare:
      type: object
      required: [name, path]
      properties:
        name:          { type: string }
        path:          { type: string, description: 'Absolute path on the host' }
        comment:       { type: string }
        browseable:    { type: boolean }
        writable:      { type: boolean }
        guestOk:       { type: boolean }
        readOnly:      { type: boolean }
        validUsers:    { type: array, items: { type: string } }
        writeList:     { type: array, items: { type: string } }
        adminUsers:    { type: array, items: { type: string } }
        createMask:    { type: string }
        directoryMask: { type: string }
        veto:          { type: array, items: { type: string } }
    SambaUser:
      type: object
      required: [username]
      properties:
        username: { type: string }
    SambaUserCredentials:
      type: object
      required: [password]
      properties:
        username: { type: string, description: 'Required on POST /samba/users; ignored on PUT password.' }
        password: { type: string }

    SmartHealth:
      type: object
      properties:
        deviceName:    { type: string }
        model:         { type: string }
        serialNumber:  { type: string }
        firmware:      { type: string }
        capacityBytes: { type: integer, format: int64 }
        overallPassed: { type: boolean }
        temperatureC:  { type: integer }
        powerOnHours:  { type: integer }
        powerCycles:   { type: integer }
        attributes:
          type: array
          items: { $ref: '#/components/schemas/SmartAttribute' }
        lastTest: { $ref: '#/components/schemas/SmartSelfTest' }
        hasErrors: { type: boolean }
        errorSummary:
          type: array
          items: { type: string }
    SmartAttribute:
      type: object
      properties:
        id:         { type: integer }
        name:       { type: string }
        value:      { type: integer }
        worst:      { type: integer }
        threshold:  { type: integer }
        rawValue:   { type: string }
        whenFailed: { type: string }
    SmartSelfTest:
      type: object
      properties:
        type:            { type: string }
        status:          { type: string }
        lifetimeHours:   { type: integer }
        lbaOfFirstError: { type: integer, format: int64 }

    SnapshotSchedule:
      type: object
      properties:
        id:               { type: string, format: uuid, readOnly: true }
        dataset:          { type: string }
        name:             { type: string }
        cron:             { type: string, description: 'Standard 5-field cron expression' }
        recursive:        { type: boolean }
        snapshotPrefix:   { type: string }
        retentionHourly:  { type: integer }
        retentionDaily:   { type: integer }
        retentionWeekly:  { type: integer }
        retentionMonthly: { type: integer }
        retentionYearly:  { type: integer }
        enabled:          { type: boolean }
    ReplicationTarget:
      type: object
      properties:
        id:            { type: string, format: uuid, readOnly: true }
        name:          { type: string }
        host:          { type: string }
        port:          { type: integer, default: 22 }
        sshUser:       { type: string }
        sshKeyPath:    { type: string }
        datasetPrefix: { type: string }
    ReplicationSchedule:
      type: object
      properties:
        id:              { type: string, format: uuid, readOnly: true }
        srcDataset:      { type: string }
        targetId:        { type: string, format: uuid }
        cron:            { type: string }
        snapshotPrefix:  { type: string }
        retentionRemote: { type: integer }
        enabled:         { type: boolean }

    ReplicationSpec:
      description: 'Per-backend connection details. Only the fields meaningful to the chosen backend + direction need to be set.'
      type: object
      properties:
        dataset:  { type: string, description: 'ZFS dataset (e.g. tank/data) — zfs/rsync.' }
        path:     { type: string, description: 'Local filesystem path — rsync/s3-push.' }
        host:     { type: string, description: 'Remote host — zfs/rsync.' }
        sshUser:  { type: string }
        bucket:   { type: string, description: 'S3 bucket — s3 only.' }
        prefix:   { type: string, description: 'S3 key prefix — s3 only.' }
        endpoint: { type: string, description: 'S3 endpoint URL (RustFS/MinIO/...).' }
        region:   { type: string, description: 'S3 region.' }
    RetentionPolicy:
      description: 'Run retention policy. Zero values mean "no limit" for that bucket.'
      type: object
      properties:
        keepLastN:   { type: integer, minimum: 0 }
        keepDaily:   { type: integer, minimum: 0 }
        keepWeekly:  { type: integer, minimum: 0 }
        keepMonthly: { type: integer, minimum: 0 }
        keepYearly:  { type: integer, minimum: 0 }
    ReplicationJob:
      type: object
      required: [name, backend, direction]
      properties:
        id:           { type: string, format: uuid, readOnly: true }
        name:         { type: string }
        backend:      { type: string, enum: [zfs, s3, rsync] }
        direction:    { type: string, enum: [push, pull] }
        source:       { $ref: '#/components/schemas/ReplicationSpec' }
        destination:  { $ref: '#/components/schemas/ReplicationSpec' }
        schedule:     { type: string, description: '5-field cron expression. Empty = manual-only.' }
        retention:    { $ref: '#/components/schemas/RetentionPolicy' }
        enabled:      { type: boolean }
        secretRef:    { type: string, description: 'OpenBao key prefix for credentials, e.g. nova/replication/<id>.' }
        lastSnapshot: { type: string, description: 'Last replicated snapshot (zfs only).', readOnly: true }
        createdAt:    { type: string, format: date-time, readOnly: true }
        updatedAt:    { type: string, format: date-time, readOnly: true }
    ReplicationRun:
      type: object
      required: [id, jobId, startedAt, outcome, bytesTransferred]
      properties:
        id:               { type: string, format: uuid }
        jobId:            { type: string, format: uuid }
        startedAt:        { type: string, format: date-time }
        finishedAt:       { type: string, format: date-time }
        outcome:          { type: string, enum: [pending, running, succeeded, failed, cancelled] }
        bytesTransferred: { type: integer, format: int64 }
        snapshot:         { type: string }
        error:            { type: string }
    ReplicationJobDetail:
      allOf:
        - $ref: '#/components/schemas/ReplicationJob'
        - type: object
          properties:
            runs:
              type: array
              items: { $ref: '#/components/schemas/ReplicationRun' }
    ReplicationRunsPage:
      type: object
      required: [runs]
      properties:
        runs:
          type: array
          items: { $ref: '#/components/schemas/ReplicationRun' }
        nextCursor: { type: string, description: 'Opaque cursor; absent on the last page.' }

    ScrubPolicy:
      type: object
      properties:
        id:          { type: string, format: uuid, readOnly: true }
        name:        { type: string }
        pools:       { type: string, description: 'Either "*" (all pools at fire time) or a comma-separated list of pool names.' }
        cron:        { type: string, description: 'Standard 5-field cron expression' }
        priority:    { type: string, enum: [low, medium, high] }
        enabled:     { type: boolean }
        builtin:     { type: boolean, readOnly: true, description: 'true for the operator-default policy installed on a fresh install.' }
        lastFiredAt: { type: string, format: date-time, readOnly: true }
        lastError:   { type: string, readOnly: true }

    LiveInterface:
      type: object
      properties:
        name:      { type: string }
        state:     { type: string }
        mac:       { type: string }
        addresses: { type: array, items: { type: string, description: 'CIDR' } }
        gateway:   { type: string }
        type:      { type: string, description: 'ether|vlan|bond|bridge' }
    NetworkInterfaceConfig:
      type: object
      required: [name, matchName]
      properties:
        name:      { type: string }
        matchName: { type: string, description: '[Match] Name= glob (supports * and ?)' }
        dhcp:      { type: string, enum: ['', yes, no, ipv4, ipv6] }
        addresses: { type: array, items: { type: string, description: 'CIDR' } }
        gateway:   { type: string }
        dns:       { type: array, items: { type: string } }
        domains:   { type: array, items: { type: string } }
        mtu:       { type: integer }
        linkLocal: { type: string }
        dryRun:    { type: boolean }
    NetworkVLAN:
      type: object
      required: [name, parent, id]
      properties:
        name:    { type: string }
        parent:  { type: string }
        id:      { type: integer, minimum: 1, maximum: 4094 }
        address: { type: string, description: 'CIDR' }
        dryRun:  { type: boolean }
    NetworkBond:
      type: object
      required: [name, mode, members]
      properties:
        name:    { type: string }
        mode:    { type: string, enum: [balance-rr, active-backup, balance-xor, broadcast, '802.3ad', balance-tlb, balance-alb] }
        members: { type: array, items: { type: string } }
        address: { type: string }
        miiMonSec: { type: integer }
        dryRun:  { type: boolean }
    NetworkInterface:
      description: 'Envelope used by ListConfigs/GetConfig.'
      type: object
      required: [name, kind]
      properties:
        name: { type: string }
        kind: { type: string, enum: [interface, vlan, bond] }
        interface: { $ref: '#/components/schemas/NetworkInterfaceConfig' }
        vlan:      { $ref: '#/components/schemas/NetworkVLAN' }
        bond:      { $ref: '#/components/schemas/NetworkBond' }

    SystemMemoryStats:
      type: object
      properties:
        totalKB:     { type: integer, format: int64 }
        availableKB: { type: integer, format: int64 }
        swapTotalKB: { type: integer, format: int64 }
        swapFreeKB:  { type: integer, format: int64 }
    SystemCPUInfo:
      type: object
      properties:
        model:   { type: string }
        sockets: { type: integer }
        cores:   { type: integer }
        threads: { type: integer }
    SystemInfo:
      type: object
      properties:
        hostname:      { type: string }
        osPretty:      { type: string }
        kernelRelease: { type: string }
        architecture:  { type: string }
        uptime:        { type: string, description: 'Go duration string (e.g. 1h2m3s)' }
        loadAvg:
          type: array
          items: { type: number }
          minItems: 3
          maxItems: 3
        memory: { $ref: '#/components/schemas/SystemMemoryStats' }
        cpu:    { $ref: '#/components/schemas/SystemCPUInfo' }
        zfsVersion: { type: string }
    SystemTimeConfig:
      type: object
      properties:
        timezone:     { type: string }
        ntp:          { type: boolean }
        ntpServers:   { type: array, items: { type: string } }
        synchronized: { type: boolean }
    SystemHostnameRequest:
      type: object
      required: [hostname]
      properties:
        hostname: { type: string }
    SystemTimezoneRequest:
      type: object
      required: [timezone]
      properties:
        timezone: { type: string, description: 'IANA zoneinfo name (e.g. Europe/Brussels)' }
    SystemNTPRequest:
      type: object
      required: [enabled]
      properties:
        enabled: { type: boolean }
        servers: { type: array, items: { type: string } }

    DatasetACLPerm:
      type: string
      enum: [read, write, execute, append, delete, delete_child, read_acl, write_acl, write_owner, read_attrs, write_attrs, read_xattr, write_xattr, synchronize, full_control, modify, read_only]
    DatasetInheritFlag:
      type: string
      enum: [file, dir, no_propagate, inherit_only]
    DatasetACE:
      type: object
      required: [type, principal, permissions]
      properties:
        type:
          type: string
          enum: [allow, deny]
        principal:
          type: string
          description: 'user:<name>", "group:<name>", or one of "OWNER@","GROUP@","EVERYONE@"'
        permissions:
          type: array
          items: { $ref: '#/components/schemas/DatasetACLPerm' }
        inheritance:
          type: array
          items: { $ref: '#/components/schemas/DatasetInheritFlag' }
    DatasetACLSetRequest:
      type: object
      required: [aces]
      properties:
        aces:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/DatasetACE' }
    DatasetACLAppendRequest:
      type: object
      required: [ace]
      properties:
        ace: { $ref: '#/components/schemas/DatasetACE' }

    SambaGlobalsOpts:
      type: object
      properties:
        workgroup:     { type: string, description: 'Default WORKGROUP' }
        serverString:  { type: string, description: 'Default NovaNAS' }
        aclProfile:
          type: string
          enum: [nfsv4, posix]
          description: 'Default nfsv4. Selects vfs_zfsacl vs acl_xattr.'
        securityMode:
          type: string
          enum: [user, ads]
        realm:         { type: string, description: 'Required when securityMode=ads.' }
        enableNetbios: { type: boolean }
        customLines:
          type: array
          items: { type: string, description: 'Verbatim "key = value" line appended to [global].' }

    Protocol:
      type: string
      enum: [nfs, smb]
    ProtocolNFSOpts:
      type: object
      required: [clients]
      properties:
        clients:
          type: array
          items: { $ref: '#/components/schemas/NfsClientRule' }
    ProtocolSMBOpts:
      type: object
      properties:
        comment:    { type: string }
        browseable: { type: boolean }
        guestOk:    { type: boolean }
        validUsers: { type: array, items: { type: string } }
        writeList:  { type: array, items: { type: string } }
    ProtocolShare:
      type: object
      required: [name, pool, datasetName, protocols, acls]
      properties:
        name:        { type: string, description: '1-64 alnum/-/_ identifier.' }
        pool:        { type: string }
        datasetName: { type: string }
        protocols:
          type: array
          items: { $ref: '#/components/schemas/Protocol' }
        acls:
          type: array
          items: { $ref: '#/components/schemas/DatasetACE' }
        quotaBytes:  { type: integer, format: int64 }
        nfs: { $ref: '#/components/schemas/ProtocolNFSOpts' }
        smb: { $ref: '#/components/schemas/ProtocolSMBOpts' }
    ProtocolStatus:
      type: object
      required: [protocol, active]
      properties:
        protocol: { $ref: '#/components/schemas/Protocol' }
        active:   { type: boolean }
        detail:   { type: string }
    ProtocolShareDetail:
      type: object
      required: [share, path, acl, protocolsStatus]
      properties:
        share: { $ref: '#/components/schemas/ProtocolShare' }
        path:  { type: string }
        acl:
          type: array
          items: { $ref: '#/components/schemas/DatasetACE' }
        protocolsStatus:
          type: array
          items: { $ref: '#/components/schemas/ProtocolStatus' }

    Alert:
      type: object
      properties:
        fingerprint: { type: string }
        labels:
          type: object
          additionalProperties: { type: string }
        annotations:
          type: object
          additionalProperties: { type: string }
        startsAt:     { type: string }
        endsAt:       { type: string }
        updatedAt:    { type: string }
        generatorURL: { type: string }
        status:
          type: object
          properties:
            state:       { type: string }
            silencedBy:  { type: array, items: { type: string } }
            inhibitedBy: { type: array, items: { type: string } }
    SilenceMatcher:
      type: object
      required: [name, value, isRegex]
      properties:
        name:    { type: string }
        value:   { type: string }
        isRegex: { type: boolean }
        isEqual: { type: boolean }
    Silence:
      type: object
      required: [matchers, startsAt, endsAt, createdBy, comment]
      properties:
        id:        { type: string }
        matchers:
          type: array
          items: { $ref: '#/components/schemas/SilenceMatcher' }
        startsAt:  { type: string }
        endsAt:    { type: string }
        createdBy: { type: string }
        comment:   { type: string }
        status:
          type: object
          properties:
            state: { type: string }
    AlertReceiver:
      type: object
      properties:
        name: { type: string }

    LogStream:
      type: object
      description: 'Loki stream envelope; the inner data shape is opaque pass-through.'
      additionalProperties: true

    Session:
      type: object
      properties:
        id:         { type: string }
        username:   { type: string }
        userId:     { type: string }
        ipAddress:  { type: string }
        start:      { type: integer, format: int64 }
        lastAccess: { type: integer, format: int64 }
        clients:
          type: object
          additionalProperties: { type: string }
        type:
          type: string
          description: '"user" or "offline" — distinguishes login sessions from refresh-only offline sessions.'
    LoginEvent:
      type: object
      properties:
        time:      { type: integer, format: int64 }
        type:      { type: string }
        realmId:   { type: string }
        clientId:  { type: string }
        userId:    { type: string }
        ipAddress: { type: string }
        error:     { type: string }
        details:
          type: object
          additionalProperties: { type: string }

    SystemVersion:
      type: object
      properties:
        goVersion: { type: string }
        commit:    { type: string }
        buildTime: { type: string }
        module:    { type: string }
        version:   { type: string }
    SystemUpdate:
      type: object
      properties:
        available:        { type: boolean }
        reason:           { type: string }
        currentVersion:   { type: string }
        availableVersion: { type: string }
        channel:          { type: string }
        lastChecked:      { type: string, format: date-time }
        status:
          type: string
          enum: [idle, checking, downloading, installed-pending-reboot]

    WorkloadIndexEntry:
      type: object
      required: [name, chart, version, repoURL]
      properties:
        name:             { type: string, description: Stable identifier used as the indexName on install. }
        displayName:      { type: string }
        category:         { type: string }
        description:      { type: string }
        chart:            { type: string, description: Helm chart name. }
        version:          { type: string, description: Pinned chart version. }
        repoURL:          { type: string, format: uri }
        appVersion:       { type: string }
        icon:             { type: string }
        homepage:         { type: string }
        readmeURL:        { type: string }
        defaultNamespace: { type: string }
        permissions:
          type: array
          items: { type: string }
        defaultValues:
          type: object
          additionalProperties: true

    WorkloadIndexEntryDetail:
      allOf:
        - $ref: '#/components/schemas/WorkloadIndexEntry'
        - type: object
          properties:
            readme:       { type: string }
            valuesSchema:
              type: object
              additionalProperties: true

    WorkloadRelease:
      type: object
      required: [name, namespace, status]
      properties:
        name:        { type: string }
        namespace:   { type: string }
        indexName:   { type: string }
        chart:       { type: string }
        version:     { type: string }
        appVersion:  { type: string }
        status:      { type: string, description: Helm status (deployed, failed, pending-install, ...). }
        revision:    { type: integer }
        updated:     { type: string, format: date-time }
        installedBy: { type: string }
        notes:       { type: string }

    WorkloadResourceRef:
      type: object
      required: [kind, name]
      properties:
        apiVersion: { type: string }
        kind:       { type: string }
        name:       { type: string }
        namespace:  { type: string }

    WorkloadPodInfo:
      type: object
      required: [name, phase]
      properties:
        name:     { type: string }
        phase:    { type: string }
        ready:    { type: boolean }
        restarts: { type: integer }
        containers:
          type: array
          items: { type: string }
        nodeName: { type: string }

    WorkloadReleaseDetail:
      allOf:
        - $ref: '#/components/schemas/WorkloadRelease'
        - type: object
          properties:
            values:
              type: object
              additionalProperties: true
            resources:
              type: array
              items: { $ref: '#/components/schemas/WorkloadResourceRef' }
            pods:
              type: array
              items: { $ref: '#/components/schemas/WorkloadPodInfo' }

    WorkloadEvent:
      type: object
      required: [type, reason, message, object]
      properties:
        type:      { type: string }
        reason:    { type: string }
        message:   { type: string }
        object:    { type: string }
        count:     { type: integer }
        firstSeen: { type: string, format: date-time }
        lastSeen:  { type: string, format: date-time }

    WorkloadInstallRequest:
      type: object
      required: [indexName, releaseName]
      properties:
        indexName:   { type: string }
        releaseName: { type: string, description: DNS-1123 release name (a-z0-9 plus '-'). }
        valuesYAML:  { type: string }
        namespace:   { type: string, description: Defaults to nova-app-<releaseName>. }

    WorkloadUpgradeRequest:
      type: object
      properties:
        version:    { type: string }
        valuesYAML: { type: string }

    # ---- KubeVirt VM management schemas ------------------------------------
    VMDisk:
      type: object
      required: [name, sizeGB, source]
      properties:
        name:         { type: string }
        sizeGB:       { type: integer, minimum: 1 }
        source:       { type: string, description: 'template:<id> | blank | url:<https://…>' }
        boot:         { type: boolean }
        bus:          { type: string, enum: [virtio, sata, scsi] }
        storageClass: { type: string }
    VMNetwork:
      type: object
      required: [name, type]
      properties:
        name: { type: string }
        type: { type: string, description: 'pod | multus:<network-attachment>' }
    VMCondition:
      type: object
      required: [type, status]
      properties:
        type:    { type: string }
        status:  { type: string }
        reason:  { type: string }
        message: { type: string }
    VMCloudInit:
      type: object
      properties:
        user:     { type: string }
        password: { type: string }
        sshKeys:
          type: array
          items: { type: string }
        hostname: { type: string }
        userData: { type: string, description: Raw cloud-init NoCloud user-data; if set, overrides the other fields. }
    VM:
      type: object
      required: [namespace, name, cpu, memoryMB, running, phase]
      properties:
        namespace: { type: string }
        name:      { type: string }
        uid:       { type: string }
        cpu:       { type: integer }
        memoryMB:  { type: integer }
        running:   { type: boolean }
        phase:     { type: string, enum: [Unknown, Pending, Scheduling, Scheduled, Running, Succeeded, Failed, Paused, Stopped] }
        ip:        { type: string }
        nodeName:  { type: string }
        disks:
          type: array
          items: { $ref: '#/components/schemas/VMDisk' }
        networks:
          type: array
          items: { $ref: '#/components/schemas/VMNetwork' }
        labels:      { type: object, additionalProperties: { type: string } }
        annotations: { type: object, additionalProperties: { type: string } }
        createdAt:   { type: string, format: date-time }
        conditions:
          type: array
          items: { $ref: '#/components/schemas/VMCondition' }
        templateID: { type: string }
    VMPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/VM' }
        nextCursor: { type: string }
    VMCreateRequest:
      type: object
      required: [name]
      properties:
        namespace:     { type: string, description: Defaults to vm-<name>. }
        name:          { type: string }
        templateID:    { type: string }
        cpu:           { type: integer, minimum: 1, maximum: 64 }
        memoryMB:      { type: integer, minimum: 1, maximum: 262144 }
        disks:
          type: array
          items: { $ref: '#/components/schemas/VMDisk' }
        networks:
          type: array
          items: { $ref: '#/components/schemas/VMNetwork' }
        cloudInit:     { $ref: '#/components/schemas/VMCloudInit' }
        startOnCreate: { type: boolean }
        labels:        { type: object, additionalProperties: { type: string } }
    VMPatchRequest:
      type: object
      properties:
        cpu:      { type: integer, minimum: 1, maximum: 64 }
        memoryMB: { type: integer, minimum: 1, maximum: 262144 }
        disks:
          type: array
          items: { $ref: '#/components/schemas/VMDisk' }
        labels: { type: object, additionalProperties: { type: string } }
    VMTemplate:
      type: object
      required: [id, displayName]
      properties:
        id:                       { type: string }
        displayName:              { type: string }
        os:                       { type: string }
        family:                   { type: string }
        version:                  { type: string }
        arch:                     { type: string }
        imageURL:                 { type: string }
        imageFormat:              { type: string }
        defaultCPU:               { type: integer }
        defaultMemoryMB:          { type: integer }
        defaultDiskGB:            { type: integer }
        cloudInitFriendly:        { type: boolean }
        guestUser:                { type: string }
        requiresUserSuppliedISO:  { type: boolean }
        requiresLicenseKey:       { type: boolean }
        description:              { type: string }
    VMSnapshot:
      type: object
      required: [namespace, name, vmName]
      properties:
        namespace:  { type: string }
        name:       { type: string }
        vmName:     { type: string }
        phase:      { type: string }
        readyToUse: { type: boolean }
        createdAt:  { type: string, format: date-time }
    VMSnapshotCreateRequest:
      type: object
      required: [namespace, name, vmName]
      properties:
        namespace: { type: string }
        name:      { type: string }
        vmName:    { type: string }
    VMRestore:
      type: object
      required: [namespace, name, vmName, snapshotName]
      properties:
        namespace:    { type: string }
        name:         { type: string }
        vmName:       { type: string }
        snapshotName: { type: string }
        complete:     { type: boolean }
    VMRestoreCreateRequest:
      type: object
      required: [namespace, name, vmName, snapshotName]
      properties:
        namespace:    { type: string }
        name:         { type: string }
        vmName:       { type: string }
        snapshotName: { type: string }
    VMConsoleSession:
      type: object
      required: [wsUrl, token, expiresAt, kind]
      properties:
        wsUrl:     { type: string }
        token:     { type: string }
        expiresAt: { type: string, format: date-time }
        kind:      { type: string, enum: [vnc, spice, serial] }

    # ---- Tier 2 first-party plugin engine ----------------------------------
    PluginIndexVersion:
      type: object
      required: [version, tarballUrl, signatureUrl]
      properties:
        version:      { type: string }
        tarballUrl:   { type: string }
        signatureUrl: { type: string }
        sha256:       { type: string }
        size:         { type: integer, format: int64 }
        releasedAt:   { type: string, format: date-time }
    PluginIndexEntry:
      type: object
      required: [name, vendor, category, versions]
      properties:
        name:        { type: string }
        displayName: { type: string }
        vendor:      { type: string }
        category:    { type: string }
        description: { type: string }
        icon:        { type: string }
        homepage:    { type: string }
        versions:
          type: array
          items: { $ref: '#/components/schemas/PluginIndexVersion' }
    PluginIndex:
      type: object
      required: [version, plugins]
      properties:
        version: { type: integer }
        updated: { type: string, format: date-time }
        plugins:
          type: array
          items: { $ref: '#/components/schemas/PluginIndexEntry' }
    PluginResource:
      type: object
      required: [type, id]
      properties:
        type: { type: string, enum: [dataset, oidcClient, tlsCert, permission] }
        id:   { type: string }
    PluginInstallation:
      type: object
      required: [id, name, version, status]
      properties:
        id:          { type: string, format: uuid }
        name:        { type: string }
        version:     { type: string }
        manifest:    { type: object }
        status:      { type: string, enum: [installed, failed, upgrading] }
        installedAt: { type: string, format: date-time }
        updatedAt:   { type: string, format: date-time }
        resources:
          type: array
          items: { $ref: '#/components/schemas/PluginResource' }
    PluginInstallRequest:
      type: object
      required: [name]
      properties:
        name:       { type: string }
        version:    { type: string }
        valuesYAML: { type: string }
    PluginUpgradeRequest:
      type: object
      required: [version]
      properties:
        version: { type: string }
