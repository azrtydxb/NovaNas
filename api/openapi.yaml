  /auth/login-history:
    get:
      operationId: listOwnLoginHistory
      x-required-permissions: [PermSessionsRead]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/LoginEvent' }
  /auth/users/{id}/login-history:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      operationId: listUserLoginHistory
      x-required-permissions: [PermSessionsAdmin]
      responses:
