      x-required-permissions: [PermSystemRead]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemUpdate' }

  /jobs/{id}/stream:
    parameters:
      - in: path
        name: id
