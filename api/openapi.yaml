    post:
      operationId: createAlertSilence
      x-required-permissions: [PermAlertsWrite]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Silence' }
      responses:
        '200':
          description: Created. Body is the AM-assigned silence ID envelope.
          content:
            application/json:
              schema: { type: object }
  /alert-silences/{id}:
    parameters:
      - in: path
        name: id
