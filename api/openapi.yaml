  /notifications/smtp:
    get:
      operationId: getSMTPConfig
      summary: Read the current SMTP relay configuration
      description: |
        Returns the SMTP relay config used for outbound email
        (transactional + alert pages). The password is always redacted
        as `"***"` in the response — operators must consult the
        configured password file out-of-band to inspect the cleartext.
      x-required-permissions: [PermNotificationsRead]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SMTPConfig' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    put:
      operationId: putSMTPConfig
      summary: Replace the SMTP relay configuration
      description: |
        Updates host/port/credentials at runtime without restarting
        nova-api. To preserve the currently stored password without
        re-typing it, send `"password": "***"`.
      x-required-permissions: [PermNotificationsWrite]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SMTPConfig' }
      responses:
        '200':
          description: Updated; body echoes the redacted post-update config.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SMTPConfig' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /notifications/smtp/test:
    post:
      operationId: sendSMTPTest
      summary: Send a synchronous test email through the configured relay
      description: |
        Bypasses the outbox and rate limiter — the response reflects
        the relay's verdict in real time. 502 with code `smtp_error`
        means the relay refused or the connection failed; the message
        contains the underlying error.
      x-required-permissions: [PermNotificationsWrite]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to]
              properties:
                to: { type: string, format: email }
      responses:
        '200':
          description: Relay accepted the message.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  to:     { type: string, format: email }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '502':
          description: SMTP relay refused the message or connection failed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /notifications/events:
    get:
      operationId: listNotificationEvents
      summary: List aggregated notification events
      description: |
        Returns notification events visible to the calling user, with
        per-user state (read/dismissed/snoozed) attached. Dismissed
        and currently-snoozed events are hidden by default; pass
        `includeDismissed=true` or `onlySnoozed=true` to surface them.
      x-required-permissions: [PermNotificationsEventsRead]
      parameters:
        - in: query
          name: severity
          schema: { type: string, enum: [info, warning, critical] }
        - in: query
          name: source
          schema: { type: string, enum: [alertmanager, jobs, audit, system] }
        - in: query
          name: unread
          schema: { type: boolean }
        - in: query
          name: includeDismissed
          schema: { type: boolean }
        - in: query
          name: includeSnoozed
          schema: { type: boolean }
        - in: query
          name: onlySnoozed
          schema: { type: boolean }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500 }
        - in: query
          name: cursor
          description: Opaque pagination cursor returned as `nextCursor` in the previous page.
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationEventList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /notifications/events/unread-count:
    get:
      operationId: getNotificationUnreadCount
      summary: Count of unread, undismissed, non-snoozed notifications
      x-required-permissions: [PermNotificationsEventsRead]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [count]
                properties:
                  count: { type: integer, format: int64 }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /notifications/events/stream:
    get:
      operationId: streamNotificationEvents
      summary: SSE stream of newly-aggregated notification events
      description: |
        Server-Sent Events endpoint. Each event is emitted as
        `event: notification` with the full `NotificationEvent` JSON
        on the `data:` line. Heartbeat comments (`: keepalive`) are
        sent every 15s to keep the connection alive across proxies.
        See docs/notifications/events.md for the on-the-wire format.
      x-required-permissions: [PermNotificationsEventsRead]
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema: { type: string }

  /notifications/events/{id}/read:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: markNotificationRead
      summary: Mark an event read for the calling user
      x-required-permissions: [PermNotificationsEventsWrite]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }

  /notifications/events/{id}/dismiss:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: dismissNotification
      summary: Dismiss an event for the calling user
      description: |
        Dismissed events are hidden from the default list view and
        omitted from the unread count. The underlying notification is
        retained server-side so other users still see it.
      x-required-permissions: [PermNotificationsEventsWrite]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }

  /notifications/events/{id}/snooze:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: snoozeNotification
      summary: Hide an event for the calling user until a future time
      x-required-permissions: [PermNotificationsEventsWrite]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [until]
              properties:
                until: { type: string, format: date-time }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  until:  { type: string, format: date-time }
        '400': { $ref: '#/components/responses/BadRequest' }

  /notifications/events/read-all:
    post:
      operationId: markAllNotificationsRead
      summary: Mark all currently-unread notifications read for the calling user
      x-required-permissions: [PermNotificationsEventsWrite]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }

  /alerts:
    get:
      operationId: listAlerts
      summary: List firing/active/resolved alerts (Alertmanager pass-through)
      x-required-permissions: [PermAlertsRead]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Alert' }
  /alerts/{fingerprint}:
    parameters:
      - in: path
