          schema: { type: string }
        - in: query
          name: end
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object }
  /logs/query/instant:
    get:
      operationId: queryLogsInstant
      x-required-permissions: [PermLogsRead]
      parameters:
        - in: query
