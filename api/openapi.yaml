          schema: { type: integer, minimum: 1, maximum: 500 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Job' }

  /jobs/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getJob
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Job' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: cancelJob
      responses:
        '204':
          description: Cancelled

  /audit:
    get:
      operationId: listAudit
      summary: List audit events (cursor-paginated)
      description: |
        Returns audit events ordered ts DESC, id DESC. Pagination is
        cursor-based: pass `next_cursor` from the previous response back as
        the `cursor` query param. The cursor is opaque (base64) and stable
        under concurrent inserts. Operator+ only (PermAuditRead).
      parameters:
        - in: query
          name: actor
          schema: { type: string }
        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: resource
          description: Prefix-matched against the event's resource path.
          schema: { type: string }
        - in: query
          name: outcome
          schema: { type: string, enum: [accepted, rejected] }
        - in: query
          name: since
          schema: { type: string, format: date-time }
        - in: query
          name: until
          schema: { type: string, format: date-time }
        - in: query
          name: source_ip
          description: IP or CIDR; matched against payload->>'source_ip'.
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000, default: 100 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuditListResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /audit/summary:
    get:
      operationId: summarizeAudit
      summary: Aggregate audit counts by (actor, action, outcome).
      description: |
        Returns counts grouped by (actor, action, outcome) within an
        optional time window. Used for "who did what last week" UIs.
        Operator+ only (PermAuditRead).
      parameters:
        - in: query
          name: since
          schema: { type: string, format: date-time }
        - in: query
          name: until
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AuditSummaryRow' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /audit/export:
    get:
      operationId: exportAudit
      summary: Stream audit events as CSV or JSONL.
      description: |
        Streams matching events using chunked transfer encoding. Each row
        is written as it is read from the database; the server never
        buffers the full result set. One concurrent export per user;
        additional requests get 429 until the first finishes. The export
        itself is recorded in the audit log. Operator+ only.
      parameters:
        - in: query
          name: format
          schema: { type: string, enum: [csv, jsonl], default: csv }
        - in: query
          name: actor
          schema: { type: string }
        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: resource
          schema: { type: string }
        - in: query
          name: outcome
          schema: { type: string, enum: [accepted, rejected] }
        - in: query
          name: since
          schema: { type: string, format: date-time }
        - in: query
          name: until
          schema: { type: string, format: date-time }
        - in: query
          name: source_ip
          schema: { type: string }
      responses:
        '200':
          description: Streaming export
          content:
            text/csv:
              schema: { type: string }
            application/x-ndjson:
              schema: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429':
          description: Another export is already running for this user.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

