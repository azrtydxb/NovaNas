        schema: { type: string }
    delete:
      operationId: deleteAlertSilence
      x-required-permissions: [PermAlertsWrite]
      responses:
        '200': { description: Expired }
  /alert-receivers:
    get:
      operationId: listAlertReceivers
      x-required-permissions: [PermAlertsRead]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AlertReceiver' }

  /logs/query:
    get:
      operationId: queryLogsRange
      summary: LogQL range query (Loki pass-through)
      x-required-permissions: [PermLogsRead]
      parameters:
        - in: query
          name: query
