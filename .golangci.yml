version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - unused
  settings:
    staticcheck:
      checks:
        - all
        - -QF1002  # could use tagged switch — cosmetic
        - -QF1008  # could remove embedded field selector — cosmetic
        - -ST1000  # missing package comment — non-blocking
        - -ST1003  # naming preference (ApiToken vs APIToken) — CRD types mirror user-chosen names
        - -SA1019  # deprecation warnings — handled case by case with //lint:ignore
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters: [unused]
      - path: zz_generated.*\.go
        linters: [unused, staticcheck]
