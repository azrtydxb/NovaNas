run:
  timeout: 5m
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - gosec
    - misspell
linters-settings:
  revive:
    rules:
      - name: exported
issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
