apiVersion: v1
kind: Namespace
metadata:
  name: nova-csi
  labels:
    app.kubernetes.io/name: nova-csi
    app.kubernetes.io/part-of: novanas
    # Give CSI sidecars + the privileged node DaemonSet room to operate.
    # Pod Security restricted profile would block hostPath / privileged.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
