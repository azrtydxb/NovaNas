apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: novanas-fs
  annotations:
    # Default for pods that don't pin a StorageClass. Filesystem mode is
    # safer for general workloads; switch to novanas-block explicitly when
    # you need raw block.
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: csi.novanas.io
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  pool: tank
  parent: tank/csi
  compression: lz4
  recordsize: "16K"
mountOptions:
  - noatime
# allowed accessModes: ReadWriteOnce, ReadWriteMany. K8s validates against
# the driver's CSI capabilities; declaring them here is informational.
