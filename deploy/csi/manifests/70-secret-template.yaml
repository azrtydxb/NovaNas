# DO NOT apply this file directly. It is a template documenting the shape
# of the Secret the CSI controller and node pods read at /etc/nova-csi/.
#
# nova-csi uses the OAuth2 client_credentials grant against Keycloak. The
# binary fetches a fresh access token at startup and refreshes it in the
# background at ~70% of each token's remaining lifetime. The static `token`
# key is no longer required (and is ignored if present).
#
# Populate the Secret with:
#
#   # Generate a service-account client in Keycloak and capture its secret:
#   ./deploy/keycloak/create-csi-client.sh > /tmp/nova-csi-client.json
#   SECRET=$(jq -r .clientSecret /tmp/nova-csi-client.json)
#
#   kubectl -n nova-csi create secret generic nova-csi-auth \
#     --from-literal=oidc-client-id=nova-csi \
#     --from-literal=oidc-client-secret="${SECRET}" \
#     --from-file=ca.crt=/etc/nova-ca/ca.crt
#
# The Keycloak client must:
#   - have clientAuthenticatorType=client-secret
#   - have serviceAccountsEnabled=true (standardFlow + directAccessGrants OFF)
#   - have realm role `nova-operator` mapped to its service account
#
# Rotation: re-create the Secret with a fresh client secret (rotate the
# Keycloak client first), then `kubectl -n nova-csi rollout restart` both
# workloads. The driver will re-bootstrap from the new credentials.
---
apiVersion: v1
kind: Secret
metadata:
  name: nova-csi-auth
  namespace: nova-csi
type: Opaque
stringData:
  # Plaintext for clarity; switch to `data:` + base64 for production.
  oidc-client-id: nova-csi
  oidc-client-secret: REPLACE_WITH_KEYCLOAK_CLIENT_SECRET
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_NOVA_CA_PEM
    -----END CERTIFICATE-----
