# DO NOT apply this file directly. It is a template documenting the shape
# of the Secret the CSI controller and node pods read at /etc/nova-csi/.
#
# Populate it with:
#
#   kubectl -n nova-csi create secret generic nova-csi-auth \
#     --from-file=token=/path/to/jwt \
#     --from-file=ca.crt=/path/to/nova-ca.crt
#
# The token must be a JWT issued by Keycloak for a service account that
# carries the `nova-operator` role (or whatever role nova-api requires
# for dataset/snapshot mutation). Treat it like a database password.
#
# Rotate by re-creating the Secret in place; nova-csi reloads the file on
# SIGHUP, but the simplest path is to restart the controller pod and
# DaemonSet pods after rotation:
#
#   kubectl -n nova-csi rollout restart deployment/nova-csi-controller
#   kubectl -n nova-csi rollout restart daemonset/nova-csi-node
---
apiVersion: v1
kind: Secret
metadata:
  name: nova-csi-auth
  namespace: nova-csi
type: Opaque
data:
  # base64(JWT) — do NOT commit a real value
  token: <BASE64_JWT_HERE>
  # base64(PEM) of the local CA that signed nova-api's TLS cert
  ca.crt: <BASE64_CA_PEM_HERE>
