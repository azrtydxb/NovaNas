---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nova-csi-controller
  namespace: nova-csi
  labels:
    app.kubernetes.io/name: nova-csi
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  strategy:
    type: Recreate  # single-writer to the local socket; no rolling overlap
  selector:
    matchLabels:
      app.kubernetes.io/name: nova-csi
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nova-csi
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: nova-csi-controller
      # hostNetwork: true so the controller can reach the nova-api systemd
      # service on the host (loopback). The alternative is to expose
      # nova-api on the docker0/cni0 bridge IP and pass it via NOVANAS_URL,
      # but loopback keeps the API surface off the cluster network entirely.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # Single-node for now. When the platform grows beyond one storage
      # host, replace this with a label like `novanas.io/storage-host=true`
      # and run one controller per pool.
      nodeSelector:
        kubernetes.io/hostname: novanas
      priorityClassName: system-cluster-critical
      tolerations:
        - operator: Exists
      containers:
        # ----------------------------------------------------------------
        # nova-csi controller: serves CSI Identity + Controller services.
        # ----------------------------------------------------------------
        - name: nova-csi
          image: novanas/csi:0.1.0-dev
          imagePullPolicy: IfNotPresent
          args:
            - --endpoint=unix:///csi/csi.sock
            - --node-id=$(NODE_NAME)
            - --novanas-url=$(NOVANAS_URL)
            # Static-token fallback path is left empty; OIDC client_credentials
            # below is the production path. The flag is harmless when unset.
            - --novanas-token-file=
            - --novanas-ca-cert=/etc/nova-csi/ca.crt
            # OIDC client_credentials: nova-csi fetches a fresh access token
            # at startup and refreshes it in the background. Issuer URL
            # comes from the nova-csi-config ConfigMap.
            - --oidc-issuer-url=$(OIDC_ISSUER_URL)
            - --oidc-client-id-file=/etc/nova-csi/oidc-client-id
            - --oidc-client-secret-file=/etc/nova-csi/oidc-client-secret
            - --oidc-ca-cert=/etc/nova-csi/ca.crt
            - --default-pool=tank
            - --default-parent=tank/csi
            - --log-level=info
          envFrom:
            # OIDC_ISSUER_URL is consumed; NFS_* / NOVANAS_URL from the same
            # ConfigMap are unused by the controller (NOVANAS_URL is set
            # explicitly below to loopback because the controller runs with
            # hostNetwork=true on the storage host).
            - configMapRef:
                name: nova-csi-config
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Override NOVANAS_URL from the ConfigMap: with hostNetwork=true
            # we reach nova-api via loopback. If you ever move nova-api
            # off the storage host, drop this and let the ConfigMap value
            # (the LAN IP) propagate.
            - name: NOVANAS_URL
              value: https://127.0.0.1:8444
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: nova-csi-secrets
              mountPath: /etc/nova-csi
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
        # ----------------------------------------------------------------
        # external-provisioner: watches PVCs, calls CreateVolume.
        # ----------------------------------------------------------------
        - name: csi-provisioner
          image: registry.k8s.io/sig-storage/csi-provisioner:v5.1.0
          args:
            - --csi-address=/csi/csi.sock
            - --leader-election=true
            - --leader-election-namespace=nova-csi
            - --feature-gates=Topology=false
            - --extra-create-metadata=true
            - --default-fstype=ext4
            - --timeout=60s
            - --v=2
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 128Mi }
        # ----------------------------------------------------------------
        # external-resizer: watches PVCs for resize events.
        # ----------------------------------------------------------------
        - name: csi-resizer
          image: registry.k8s.io/sig-storage/csi-resizer:v1.12.0
          args:
            - --csi-address=/csi/csi.sock
            - --leader-election=true
            - --leader-election-namespace=nova-csi
            - --timeout=60s
            - --v=2
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 128Mi }
        # ----------------------------------------------------------------
        # external-snapshotter: handles VolumeSnapshot* objects.
        # ----------------------------------------------------------------
        - name: csi-snapshotter
          image: registry.k8s.io/sig-storage/csi-snapshotter:v8.1.0
          args:
            - --csi-address=/csi/csi.sock
            - --leader-election=true
            - --leader-election-namespace=nova-csi
            - --timeout=60s
            - --v=2
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 128Mi }
      volumes:
        - name: socket-dir
          emptyDir: {}
        - name: nova-csi-secrets
          secret:
            secretName: nova-csi-auth
            defaultMode: 0400
            items:
              - key: oidc-client-id
                path: oidc-client-id
              - key: oidc-client-secret
                path: oidc-client-secret
              - key: ca.crt
                path: ca.crt
