---
# Adjacent service alerts: OpenBao, Keycloak, Postgres, Redis, KubeVirt VMs,
# and per-component scrape liveness.
groups:
  - name: novanas-openbao
    interval: 30s
    rules:
      - alert: OpenBaoSealed
        # vault_core_unsealed = 0 when sealed. OpenBao reuses the vault_*
        # metric namespace from upstream Vault.
        expr: vault_core_unsealed == 0
        for: 1m
        labels:
          severity: critical
          component: openbao
          runbook_url: https://github.com/azrtydxb/NovaNas/blob/main/docs/observability/alerts.md#openbaosealed
        annotations:
          summary: "OpenBao instance {{ $labels.instance }} is SEALED"
          description: "An OpenBao node is sealed and cannot serve secrets."
          why: "All services that read secrets at runtime (alertmanager SMTP, grafana OIDC, replication keys) are blocked."
          fix: "Run nova-bao-unseal or `bao operator unseal` with the unseal keys."

      - alert: OpenBaoDown
        expr: up{job="openbao"} == 0
        for: 2m
        labels:
          severity: critical
          component: openbao
          runbook_url: https://github.com/azrtydxb/NovaNas/blob/main/docs/observability/alerts.md#openbaodown
        annotations:
          summary: "OpenBao scrape failing on {{ $labels.instance }}"
          description: "Prometheus cannot scrape OpenBao for >2m."
          why: "OpenBao is the secrets backbone — without it no secret rotation happens and clients fail to start."
          fix: "Check `systemctl status openbao` and TLS material on :8200."

  - name: novanas-keycloak
    interval: 30s
    rules:
      - alert: KeycloakDown
        # blackbox_exporter probe of the Keycloak health endpoint, OR a
        # nova-api side liveness check. We accept either signal so this
        # rule lights up regardless of which probe lands first.
        expr: |
          (probe_success{job="keycloak"} == 0)
          or
          (up{job="keycloak"} == 0)
        for: 3m
        labels:
          severity: critical
          component: keycloak
          runbook_url: https://github.com/azrtydxb/NovaNas/blob/main/docs/observability/alerts.md#keycloakdown
        annotations:
          summary: "Keycloak unreachable from {{ $labels.instance }}"
          description: "Keycloak health probe has been failing for >3m."
          why: "All SSO logins (Grafana, oauth2-proxy on Prometheus/Alertmanager/Loki) break when Keycloak is down."
          fix: "Check `systemctl status keycloak` and the realm import. Validate OIDC discovery URL."

  - name: novanas-postgres
    interval: 30s
    rules:
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 2m
        labels:
          severity: critical
          component: postgres
          runbook_url: https://github.com/azrtydxb/NovaNas/blob/main/docs/observability/alerts.md#postgresdown
        annotations:
          summary: "Postgres exporter scrape failing on {{ $labels.instance }}"
          description: "postgres-exporter is unreachable; Postgres is likely down or auth is broken."
          why: "Postgres backs nova-api persistence and Keycloak — outages here cascade into the entire control plane."
          fix: "Check `systemctl status postgresql`, disk space on the data dir, and exporter credentials."

      - alert: PostgresTooManyConnections
        expr: |
          (sum by (instance) (pg_stat_activity_count))
            /
          on (instance) pg_settings_max_connections
            > 0.9
        for: 10m
        labels:
          severity: warning
          component: postgres
          runbook_url: https://github.com/azrtydxb/NovaNas/blob/main/docs/observability/alerts.md#postgrestoomanyconnections
        annotations:
          summary: "Postgres connection pool >90% on {{ $labels.instance }}"
          description: "Postgres is using more than 90% of max_connections."
          why: "Once max_connections is hit, new clients (including nova-api) cannot connect and start failing."
          fix: "Inspect `pg_stat_activity` for leaks. Bump max_connections or shorten idle_in_transaction timeouts."

  - name: novanas-redis
    interval: 30s
    rules:
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 2m
        labels:
          severity: warning
          component: redis
          runbook_url: https://github.com/azrtydxb/NovaNas/blob/main/docs/observability/alerts.md#redisdown
        annotations:
          summary: "Redis exporter scrape failing on {{ $labels.instance }}"
          description: "redis-exporter unreachable for >2m."
          why: "Redis backs the asynq job queue. Without it, nova-api job dispatch fails."
          fix: "Check `systemctl status redis` and exporter auth."

  - name: novanas-kubevirt
    interval: 30s
    rules:
      - alert: KubeVirtVMCrashLoop
        # kube-state-metrics surfaces pod waiting reasons. Pods with a
        # KubeVirt-managed launcher carry kubevirt.io/created-by; we filter
        # on the more reliable owner_kind label produced by KSM 2.x.
        expr: |
          sum by (namespace, pod) (
            kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}
            * on (namespace, pod) group_left(owner_kind)
            kube_pod_owner{owner_kind="VirtualMachineInstance"}
          ) > 0
        for: 5m
        labels:
          severity: warning
          component: kubevirt
          runbook_url: https://github.com/azrtydxb/NovaNas/blob/main/docs/observability/alerts.md#kubevirtvmcrashloop
        annotations:
          summary: "KubeVirt VM pod {{ $labels.namespace }}/{{ $labels.pod }} in CrashLoopBackOff"
          description: "VirtualMachineInstance pod has been crash-looping for >5m."
          why: "VM is offline; users of the VM are impacted."
          fix: "kubectl describe pod / logs the launcher; check libvirt logs for the failing domain."
