global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'novanas'
    instance: 'novanas-primary'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 127.0.0.1:9093

# Load rules once and periodically evaluate them
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['127.0.0.1:9090']

  # NovaNAS API metrics (public /metrics endpoint)
  - job_name: 'nova-api'
    scheme: https
    tls_config:
      ca_file: /etc/nova-ca/ca.crt
      insecure_skip_verify: false
    static_configs:
      - targets: ['127.0.0.1:8444']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Node exporter (Debian package: prometheus-node-exporter)
  - job_name: 'node'
    static_configs:
      - targets: ['127.0.0.1:9100']

  # PostgreSQL exporter (Debian package: prometheus-postgres-exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['127.0.0.1:9187']
    scrape_interval: 30s

  # Redis exporter (Debian package: prometheus-redis-exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['127.0.0.1:9121']

  # k3s kubelet metrics
  - job_name: 'kubernetes-kubelet'
    scheme: https
    tls_config:
      ca_file: /etc/nova-ca/ca.crt
      insecure_skip_verify: false
    static_configs:
      - targets: ['127.0.0.1:10250']
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/k3s-token

  # k3s etcd metrics
  - job_name: 'kubernetes-etcd'
    scheme: https
    tls_config:
      ca_file: /etc/nova-ca/ca.crt
      insecure_skip_verify: false
    static_configs:
      - targets: ['127.0.0.1:2379']
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/k3s-token

  # k3s kube-proxy metrics
  - job_name: 'kubernetes-kube-proxy'
    scheme: https
    tls_config:
      ca_file: /etc/nova-ca/ca.crt
      insecure_skip_verify: false
    static_configs:
      - targets: ['127.0.0.1:10249']
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/k3s-token

  # kube-state-metrics (deployed in k3s)
  - job_name: 'kubernetes-kube-state-metrics'
    scheme: https
    tls_config:
      ca_file: /etc/nova-ca/ca.crt
      insecure_skip_verify: false
    kubernetes_sd_configs:
      - role: pod
        api_server: https://127.0.0.1:6443
        tls_config:
          ca_file: /etc/nova-ca/ca.crt
          insecure_skip_verify: false
        bearer_token_file: /etc/prometheus/k3s-token
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_pod_label_app_kubernetes_io_name]
        regex: kube-system;kube-state-metrics
        action: keep
      - source_labels: [__meta_kubernetes_pod_container_port_number]
        regex: '8080'
        action: keep
