# /etc/idmapd.conf — NovaNAS production defaults.
#
# Both NFSv4 server (nfs-kernel-server) and clients (mount.nfs4) consult
# nfsidmap to translate wire names like "alice@NOVANAS.LOCAL" to local
# uids/gids. The Domain MUST match between server and clients —
# mismatches silently squash everything to the Nobody-User below.
#
# Method = nsswitch routes lookups through /etc/nsswitch.conf, which
# means NovaNAS honors /etc/passwd, /etc/group, and (when joined to AD
# or FreeIPA) SSSD. This is what makes Kerberos NFS interoperate with
# directory-managed identities.

[General]
Verbosity = 0
Domain = novanas.local

[Translation]
Method = nsswitch

[Mapping]
Nobody-User = nobody
Nobody-Group = nogroup
