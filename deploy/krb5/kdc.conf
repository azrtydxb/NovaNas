# /var/lib/krb5kdc/kdc.conf — MIT KDC server-side config (NovaNAS-managed).
#
# This file is rendered from a template at deploy time. The realm name is
# substituted from /etc/nova-kdc/bootstrap.env (NOVA_KDC_REALM); the
# default is NOVANAS.LOCAL.
#
# Distinct from /etc/krb5.conf which is the *client* config and is
# managed by internal/host/krb5/krb5.go (deploy/krb5/krb5.conf.template).

[kdcdefaults]
    kdc_ports = 88
    kdc_tcp_ports = 88

[realms]
    NOVANAS.LOCAL = {
        database_name      = /var/lib/krb5kdc/principal
        admin_keytab       = FILE:/var/lib/krb5kdc/kadm5.keytab
        acl_file           = /var/lib/krb5kdc/kadm5.acl
        key_stash_file     = /var/lib/krb5kdc/.k5.NOVANAS.LOCAL
        kdc_ports          = 88
        max_life           = 10h 0m 0s
        max_renewable_life = 7d 0h 0m 0s
        # AES-256 only by default. Operators that need legacy clients
        # (older AD, RHEL 6) should add aes128-cts-hmac-sha1-96 manually.
        supported_enctypes = aes256-cts-hmac-sha1-96:normal aes256-cts-hmac-sha384-192:normal
        default_principal_flags = +preauth
    }

[logging]
    kdc          = SYSLOG:INFO:DAEMON
    admin_server = SYSLOG:INFO:DAEMON
