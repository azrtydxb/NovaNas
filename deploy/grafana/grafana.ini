; Grafana configuration
; https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/

[server]
http_port = 3000
http_addr = 127.0.0.1
domain = novanas.local
root_url = https://novanas.local:3000
serve_from_sub_path = false
router_logging = false

[database]
type = sqlite3
path = /var/lib/grafana/grafana.db
log_queries = false

[security]
admin_user = admin
# Operators set password via OpenBao secret: admin_password = {{ SECRET:grafana/admin_pass }}
cookie_secure = true
cookie_samesite = lax
x_content_type_options = nosniff
x_frame_options = DENY

[auth]
signout_redirect_url = https://novanas.local:3000/login

[auth.generic_oauth]
enabled = false
# Operators enable and configure Keycloak OIDC:
# name = Keycloak
# client_id = grafana
# client_secret = {{ SECRET:grafana/oauth_secret }}
# scopes = openid profile email roles
# auth_url = https://192.168.10.204:8443/realms/novanas/protocol/openid-connect/auth
# token_url = https://192.168.10.204:8443/realms/novanas/protocol/openid-connect/token
# api_url = https://192.168.10.204:8443/realms/novanas/protocol/openid-connect/userinfo
# role_attribute_path = contains(realm_access.roles[*], 'nova-admin') && 'Admin' || contains(realm_access.roles[*], 'nova-operator') && 'Editor' || 'Viewer'
# allow_sign_up = true
# auto_login = false

[paths]
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning

[log]
mode = file
level = info
filters =

[logger]
; Set logging level for Grafana's bootstrap process
root.level = info

[users]
allow_sign_up = false
allow_org_create = false

[session]
session_manager = database
session_lifetime = 86400

[feature_toggles]
; Enable features as needed
