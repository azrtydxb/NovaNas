; Grafana configuration
; https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/

[server]
http_port = 3000
# Bind to all interfaces so browsers can reach the OIDC login flow.
# Operators who terminate TLS via an external reverse proxy can flip
# this back to 127.0.0.1 and front Grafana with nginx instead.
http_addr = 0.0.0.0
domain = novanas.local
root_url = https://novanas.local:3000
serve_from_sub_path = false
router_logging = false
# Grafana terminates TLS using the host cert issued from the local CA.
protocol = https
cert_file = /etc/grafana/grafana.crt
cert_key = /etc/grafana/grafana.key

[database]
type = sqlite3
path = /var/lib/grafana/grafana.db
log_queries = false

[security]
admin_user = admin
# Break-glass admin: keep the local admin user available so operators
# can recover from a Keycloak outage. Password is set out-of-band (env
# var GF_SECURITY_ADMIN_PASSWORD or OpenBao-rendered grafana.env).
# admin_password = {{ SECRET:grafana/admin_pass }}
disable_initial_admin_creation = false
cookie_secure = true
cookie_samesite = lax
x_content_type_options = nosniff
x_frame_options = DENY

[auth]
signout_redirect_url = https://192.168.10.204:8443/realms/novanas/protocol/openid-connect/logout
# Keep the local admin login form available alongside OIDC.
disable_login_form = false
oauth_auto_login = false

[auth.generic_oauth]
enabled = true
name = Keycloak
allow_sign_up = true
auto_login = false
client_id = grafana
# The operator drops the client secret rotated by create-grafana-client.sh
# into /etc/grafana/oidc-secret (mode 0400, owned by grafana).
client_secret_file = /etc/grafana/oidc-secret
scopes = openid profile email
empty_scopes = false
auth_url = https://192.168.10.204:8443/realms/novanas/protocol/openid-connect/auth
token_url = https://192.168.10.204:8443/realms/novanas/protocol/openid-connect/token
api_url = https://192.168.10.204:8443/realms/novanas/protocol/openid-connect/userinfo
signout_redirect_url = https://192.168.10.204:8443/realms/novanas/protocol/openid-connect/logout
# Grafana trusts Keycloak's TLS chain (signed by /etc/nova-ca/ca.crt).
tls_client_ca = /etc/nova-ca/ca.crt
tls_skip_verify_insecure = false
# Map Keycloak realm roles -> Grafana org roles.
# nova-admin   -> Admin (full)
# nova-operator -> Editor (dashboard/alert edit)
# everyone else (including nova-viewer) -> Viewer (read-only)
role_attribute_path = contains(realm_access.roles[*], 'nova-admin') && 'Admin' || contains(realm_access.roles[*], 'nova-operator') && 'Editor' || 'Viewer'
role_attribute_strict = false
# Promote nova-admin to Grafana Server Admin (cluster-wide).
allow_assign_grafana_admin = true
# Use email claim as the unique login attribute for stable user mapping.
login_attribute_path = preferred_username
email_attribute_path = email
name_attribute_path = name
use_pkce = true
use_refresh_token = true

[paths]
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning

[log]
mode = file
level = info
filters =

[logger]
; Set logging level for Grafana's bootstrap process
root.level = info

[users]
allow_sign_up = false
allow_org_create = false
# Fallback role for users whose realm roles do not match the JMESPath
# expression in [auth.generic_oauth] role_attribute_path.
auto_assign_org_role = Viewer

[session]
session_manager = database
session_lifetime = 86400

[feature_toggles]
; Enable features as needed
