# oauth2-proxy v7.6.x configuration: Prometheus front
#
# Operator-provided files (created by create-oauth2-proxy-clients.sh):
#   /etc/oauth2-proxy/prometheus-client-secret   (mode 0400, oauth2-proxy:oauth2-proxy)
#   /etc/oauth2-proxy/prometheus-cookie-secret   (mode 0400, oauth2-proxy:oauth2-proxy)
# Loaded by the systemd unit via $OAUTH2_PROXY_CLIENT_SECRET_FILE /
# $OAUTH2_PROXY_COOKIE_SECRET environment variables.
#
# Endpoint exposes an HTTPS listener on :9091 in front of Prometheus
# (which itself stays bound to 127.0.0.1:9090).

provider           = "keycloak-oidc"
provider_display_name = "Keycloak"
oidc_issuer_url    = "https://192.168.10.204:8443/realms/novanas"
client_id          = "oauth2-proxy-prometheus"
# client_secret is supplied via $OAUTH2_PROXY_CLIENT_SECRET_FILE in the unit.

# Browser-facing URL of THIS proxy.
redirect_url       = "https://novanas.local:9091/oauth2/callback"

# Upstream is Prometheus on localhost (HTTPS, signed by nova-ca).
upstreams          = ["https://127.0.0.1:9090/"]
ssl_upstream_insecure_skip_verify = false
provider_ca_files  = ["/etc/nova-ca/ca.crt"]

# Listen / TLS termination at the proxy.
http_address       = ""
https_address      = "0.0.0.0:9091"
tls_cert_file      = "/etc/oauth2-proxy/tls/prometheus.crt"
tls_key_file       = "/etc/oauth2-proxy/tls/prometheus.key"

# Cookies.
cookie_name        = "_oauth2_proxy_prometheus"
cookie_secure      = true
cookie_httponly    = true
cookie_samesite    = "lax"
cookie_expire      = "12h"
cookie_refresh     = "1h"

# Auth.
email_domains      = ["*"]
scope              = "openid profile email"
pass_access_token  = false
pass_authorization_header = true
set_authorization_header  = true
pass_user_headers  = true
set_xauthrequest   = true
skip_provider_button = true

# Role/group gating: only nova-admin and nova-operator may reach Prometheus.
# keycloak-oidc provider extracts realm roles into the `groups` claim.
allowed_groups     = ["nova-admin", "nova-operator"]

# Allow unauthenticated probes for the readiness/liveness endpoints so
# Prometheus, the systemd watchdog and external uptime checks do not
# bounce off the OIDC dance.
skip_auth_routes   = ["^/-/healthy$", "^/-/ready$"]

# Reverse-proxy headers are honoured (in case we ever sit behind nginx).
reverse_proxy      = true
real_client_ip_header = "X-Forwarded-For"
