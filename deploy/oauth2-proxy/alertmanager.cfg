# oauth2-proxy v7.6.x configuration: Alertmanager front
#
# Operator-provided files (created by create-oauth2-proxy-clients.sh):
#   /etc/oauth2-proxy/alertmanager-client-secret   (mode 0400)
#   /etc/oauth2-proxy/alertmanager-cookie-secret   (mode 0400)
#
# Listens on :9094 HTTPS, fronts Alertmanager at 127.0.0.1:9093.

provider           = "keycloak-oidc"
provider_display_name = "Keycloak"
oidc_issuer_url    = "https://192.168.10.204:8443/realms/novanas"
client_id          = "oauth2-proxy-alertmanager"

redirect_url       = "https://novanas.local:9094/oauth2/callback"

upstreams          = ["https://127.0.0.1:9093/"]
ssl_upstream_insecure_skip_verify = false
provider_ca_files  = ["/etc/nova-ca/ca.crt"]

http_address       = ""
https_address      = "0.0.0.0:9094"
tls_cert_file      = "/etc/oauth2-proxy/tls/alertmanager.crt"
tls_key_file       = "/etc/oauth2-proxy/tls/alertmanager.key"

cookie_name        = "_oauth2_proxy_alertmanager"
cookie_secure      = true
cookie_httponly    = true
cookie_samesite    = "lax"
cookie_expire      = "12h"
cookie_refresh     = "1h"

email_domains      = ["*"]
scope              = "openid profile email"
pass_authorization_header = true
set_authorization_header  = true
pass_user_headers  = true
set_xauthrequest   = true
skip_provider_button = true

# Operators only (admin + operator). Viewers do not get to silence alerts.
allowed_groups     = ["nova-admin", "nova-operator"]

skip_auth_routes   = ["^/-/healthy$", "^/-/ready$"]

reverse_proxy      = true
real_client_ip_header = "X-Forwarded-For"
