# oauth2-proxy v7.6.x configuration: Loki front
#
# Operator-provided files (created by create-oauth2-proxy-clients.sh):
#   /etc/oauth2-proxy/loki-client-secret   (mode 0400)
#   /etc/oauth2-proxy/loki-cookie-secret   (mode 0400)
#
# Listens on :3101 HTTPS, fronts Loki at 127.0.0.1:3100.
# Loki itself runs HTTP on localhost (per existing loki-config.yaml).

provider           = "keycloak-oidc"
provider_display_name = "Keycloak"
oidc_issuer_url    = "https://192.168.10.204:8443/realms/novanas"
client_id          = "oauth2-proxy-loki"

redirect_url       = "https://novanas.local:3101/oauth2/callback"

upstreams          = ["http://127.0.0.1:3100/"]

http_address       = ""
https_address      = "0.0.0.0:3101"
tls_cert_file      = "/etc/oauth2-proxy/tls/loki.crt"
tls_key_file       = "/etc/oauth2-proxy/tls/loki.key"

cookie_name        = "_oauth2_proxy_loki"
cookie_secure      = true
cookie_httponly    = true
cookie_samesite    = "lax"
cookie_expire      = "12h"
cookie_refresh     = "1h"

email_domains      = ["*"]
scope              = "openid profile email"
pass_authorization_header = true
set_authorization_header  = true
pass_user_headers  = true
set_xauthrequest   = true
skip_provider_button = true

# Loki: any authenticated NovaNAS realm role may query logs (mirrors
# Grafana, which uses Loki as a datasource).
allowed_groups     = ["nova-admin", "nova-operator", "nova-viewer"]

# Loki readiness endpoints used by Promtail / health probes.
# Promtail itself pushes via the loopback address (bypasses oauth2-proxy)
# so /loki/api/v1/push does not need an auth bypass.
skip_auth_routes   = ["^/ready$", "^/metrics$"]

reverse_proxy      = true
real_client_ip_header = "X-Forwarded-For"
