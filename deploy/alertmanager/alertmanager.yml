global:
  resolve_timeout: 5m
  # SMTP relay (shared with nova-api). Credentials are sourced from
  # /etc/alertmanager/smtp.env (see deploy/systemd/alertmanager.service —
  # LoadCredential= drops the file at $CREDENTIALS_DIRECTORY/smtp.env and
  # the EnvironmentFile= line in alertmanager.env interpolates
  # $SMTP_USERNAME / $SMTP_PASSWORD into this file at process start).
  smtp_smarthost: '${SMTP_HOST}:${SMTP_PORT}'
  smtp_from: '${SMTP_FROM}'
  smtp_auth_username: '${SMTP_USERNAME}'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true

# Inhibition rules
inhibit_rules:
  # Suppress warning alerts if critical is firing for the same instance
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

# Default receiver (null — operators add real routing)
route:
  receiver: 'null'
  group_by: ['alertname', 'instance']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  routes:
    # Storage alerts
    - match_re:
        alertname: 'NovaNAS.*'
      receiver: 'null'
    # API alerts
    - match_re:
        job: 'nova-api'
      receiver: 'null'

receivers:
  - name: 'null'
    # Null receiver intentionally does nothing; operators configure webhook_configs, email_configs, etc.

  # Email pages via the shared SMTP relay (see global.smtp_*). Add the
  # receiver to a route's `receiver:` to start delivering. The `to:`
  # value below is a sane default; operators usually template per-team.
  - name: 'email-ops'
    email_configs:
      - to: 'ops@novanas.local'
        send_resolved: true
        headers:
          Subject: '[NovaNAS] {{ .Status | toUpper }} {{ .CommonLabels.alertname }}'

  # Example webhook receiver (commented out)
  # - name: 'slack'
  #   slack_configs:
  #     - api_url: '{{ SECRET:alertmanager/slack_webhook }}'
  #       channel: '#alerts'
  #       send_resolved: true

templates:
  - /etc/alertmanager/templates/*.tmpl
