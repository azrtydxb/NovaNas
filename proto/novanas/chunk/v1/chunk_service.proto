syntax = "proto3";

package novanas.chunk.v1;

import "novanas/chunk/v1/chunk.proto";
import "novanas/common/v1/types.proto";

option go_package = "github.com/azrtydxb/novanas/proto/gen/go/novanas/chunk/v1;chunkv1";

// ChunkService is the content-addressed blob API exposed by the storage
// engine. Callers upload, fetch, verify and remove chunks by id.
//
// This surface is derived from NovaStor's chunk ChunkService and
// dataplane chunk RPCs. It intentionally exposes a narrower, coarser
// contract: detailed bdev / store selection is an internal concern of
// the storage engine and lives under DataplaneService.
service ChunkService {
  // Put uploads a chunk. The caller streams data frames; the server
  // returns once the chunk is durably committed (quorum per the volume's
  // protection policy).
  rpc Put(stream PutChunkRequest) returns (PutChunkResponse);

  // Get streams a chunk back to the caller. The first response frame
  // carries id and total_size; subsequent frames carry payload.
  rpc Get(GetChunkRequest) returns (stream ChunkData);

  // Delete removes a chunk or decrements its reference count.
  rpc Delete(DeleteChunkRequest) returns (DeleteChunkResponse);

  // Verify recomputes the chunk's checksum on at least one replica and
  // returns whether the stored content matches the declared id.
  rpc Verify(VerifyChunkRequest) returns (VerifyChunkResponse);

  // Stat returns metadata for a chunk without transferring its data.
  rpc Stat(StatChunkRequest) returns (StatChunkResponse);

  // ========== Open-chunk lifecycle (A4-Metadata-As-Chunks) ==========
  //
  // Open-chunks are mutable, append-only, UUID-identified chunks that
  // exist to provide WAL-style low-latency semantics on top of the
  // 4 MiB content-addressed chunk substrate. They are used by the
  // metadata service (BadgerDB value-log), and may be used by other
  // append-heavy paths in the future.
  //
  // Lifecycle: Open -> (Append, Append, ...) -> (Full || Timeout) -> Seal.
  // After sealing, the chunk is immutable and addressable by its
  // content-hash ChunkId. The OpenChunkId is retired.

  // OpenChunk allocates a new mutable open-chunk in the given pool and
  // returns its UUID. The caller uses AppendChunk to write data, then
  // SealChunk to finalise it into a content-addressed chunk.
  rpc OpenChunk(OpenChunkRequest) returns (OpenChunkResponse);

  // AppendChunk appends data to an open-chunk at the given offset.
  // offset MUST equal the current length (strict append-only).
  rpc AppendChunk(AppendChunkRequest) returns (AppendChunkResponse);

  // SealChunk transitions the open-chunk to immutable and returns the
  // resulting content-addressed ChunkId (SHA-256 of the final data).
  rpc SealChunk(SealChunkRequest) returns (SealChunkResponse);
}

message OpenChunkRequest {
  novanas.common.v1.RequestContext context = 1;
  // pool_id selects the CRUSH pool for replica placement.
  string pool_id = 2;
  // capacity_bytes is the maximum byte length this open-chunk will grow
  // to before being sealed. Must be > 0 and <= 4 MiB.
  uint64 capacity_bytes = 3;
}

message OpenChunkResponse {
  // open_chunk_id is an opaque UUID identifying this open-chunk. It is
  // NOT the eventual content-addressed ChunkId.
  string open_chunk_id = 1;
  // durable_replicas is how many replicas have acknowledged the open.
  uint32 durable_replicas = 2;
}

message AppendChunkRequest {
  novanas.common.v1.RequestContext context = 1;
  string open_chunk_id = 2;
  // offset MUST equal the open-chunk's current length.
  uint64 offset = 3;
  bytes data = 4;
}

message AppendChunkResponse {
  // length_after is the new total byte length of the open-chunk after
  // this append. When length_after == capacity, the chunk is ready to
  // be sealed.
  uint64 length_after = 1;
  uint32 durable_replicas = 2;
}

message SealChunkRequest {
  novanas.common.v1.RequestContext context = 1;
  string open_chunk_id = 2;
}

message SealChunkResponse {
  // sealed_id is the content-addressed ChunkId of the now-immutable
  // chunk. The open_chunk_id is retired after this RPC.
  ChunkId sealed_id = 1;
  uint64 size_bytes = 2;
}

message PutChunkRequest {
  // context is carried only on the first frame of the stream.
  novanas.common.v1.RequestContext context = 1;
  // data frame. The first frame MUST set id and total_size.
  ChunkData data = 2;
  // volume_id identifies the logical volume; used for per-volume DK
  // lookup to transparently encrypt chunks on encrypted volumes.
  string volume_id = 3;
}

message PutChunkResponse {
  ChunkId id = 1;
  uint64 bytes_written = 2;
  // durable_replicas is how many replicas acknowledged the write.
  uint32 durable_replicas = 3;
}

message GetChunkRequest {
  novanas.common.v1.RequestContext context = 1;
  ChunkId id = 2;
  // offset / length allow ranged reads; length == 0 means "to end".
  uint64 offset = 3;
  uint64 length = 4;
  // volume_id is required to decrypt chunks stored on encrypted volumes.
  string volume_id = 5;
}

message DeleteChunkRequest {
  novanas.common.v1.RequestContext context = 1;
  ChunkId id = 2;
  // If force is false, the server only decrements the reference count;
  // when it reaches zero the chunk is queued for GC.
  bool force = 3;
}

message DeleteChunkResponse {
  uint64 reference_count_after = 1;
}

message VerifyChunkRequest {
  novanas.common.v1.RequestContext context = 1;
  ChunkId id = 2;
  // deep performs a byte-by-byte cross-replica comparison in addition to
  // per-replica checksum verification.
  bool deep = 3;
}

message VerifyChunkResponse {
  bool ok = 1;
  novanas.common.v1.Checksum observed = 2;
  // divergent_placements lists device ids whose stored content does not
  // match the declared checksum (empty when ok is true).
  repeated string divergent_placements = 3;
}

message StatChunkRequest {
  novanas.common.v1.RequestContext context = 1;
  ChunkId id = 2;
}

message StatChunkResponse {
  ChunkMetadata metadata = 1;
}
