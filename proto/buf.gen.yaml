version: v2
# Generation is disabled by default for NovaNas Wave 2 — toolchains are not
# required at check-in time. Consumers (operators/API, UI) regenerate locally
# via `buf generate` once their language plugins are provisioned.
#
# Outputs land in `proto/gen/<lang>/...` which is gitignored. Do NOT commit
# generated code into this repo — each consumer vendors its own generated
# bindings or regenerates on build.
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
  # TypeScript (uncomment once ts-proto is wired into the UI build):
  # - remote: buf.build/community/stephenh-ts-proto
  #   out: gen/ts
  #   opt:
  #     - outputServices=grpc-js
  #     - esModuleInterop=true
