kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: novanas-e2e
# 3-node cluster lets us exercise basic anti-affinity & multi-node
# reconciliation paths without burning too much CI time.
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true,node-role.novanas.io/control=true"
    extraPortMappings:
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 9000
        hostPort: 9000   # s3gw
        protocol: TCP
  - role: worker
    labels:
      node-role.novanas.io/storage: "true"
  - role: worker
    labels:
      node-role.novanas.io/storage: "true"
featureGates: {}
networking:
  apiServerAddress: "0.0.0.0"
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
containerdConfigPatches:
  - |
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."ghcr.io"]
      endpoint = ["https://ghcr.io"]
