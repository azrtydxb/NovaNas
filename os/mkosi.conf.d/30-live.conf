# Live-ISO-only configuration.
#
# The journald no-rate-limit drop-in lives here and NOT in rootfs/ so it does
# not leak into the RAUC-bundled rootfs (on an installed system the default
# rate-limiting is correct; disabling it there would fill /var/log/journal on
# any chatty service).
#
# Match on the mkosi "live" profile: `mkosi --profile=live build`.

[Match]
Profile=live

[Content]
ExtraTrees=mkosi.extra-live
