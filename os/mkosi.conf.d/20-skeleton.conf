# Overlay the NovaNas rootfs skeleton (systemd units, helper scripts,
# etc/novanas stamps). SkeletonTrees are applied BEFORE package install so
# apt postinsts can see our files (e.g. /etc/default/grub); ExtraTrees are
# applied after, which matters for files that would otherwise be overwritten
# by package postinsts.
#
# We use ExtraTrees= for the rootfs tree so our overrides win.

[Content]
ExtraTrees=rootfs
