# All Debian packages installed into the NovaNas rootfs.
#
# mkosi does not distinguish "base" vs "layered" — it runs one apt transaction
# with this combined set. The old mmdebstrap → chroot apt install two-stage
# dance was a workaround for mmdebstrap's limitations, not a build-graph
# requirement.

[Content]
Packages=
        # --- base system ---
        ca-certificates
        linux-image-amd64
        systemd
        systemd-sysv
        systemd-timesyncd
        systemd-resolved
        dbus
        udev
        kmod
        iproute2
        iputils-ping
        less
        nano
        sudo
        openssh-server
        curl
        wget
        gnupg
        zstd
        xz-utils
        locales
        tzdata
        # --- live-boot (needed so the same rootfs boots from the ISO) ---
        live-boot
        live-boot-initramfs-tools
        live-config
        live-config-systemd
        squashfs-tools
        # --- storage / OS plumbing ---
        tpm2-tools
        cryptsetup
        lvm2
        mdadm
        smartmontools
        nvme-cli
        parted
        gdisk
        e2fsprogs
        xfsprogs
        dosfstools
        rauc
        # --- firmware ---
        firmware-linux
        firmware-linux-nonfree
        firmware-iwlwifi
        firmware-realtek
        intel-microcode
        amd64-microcode
        # --- bootloader (RAUC flips grub default) ---
        grub-efi-amd64
        grub-pc-bin
        efibootmgr
        # --- network / runtime tools ---
        iptables
        nftables
        conntrack
        ethtool
        jq
        python3
        python3-yaml
