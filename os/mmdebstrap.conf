# mmdebstrap configuration consumed by build/build-rootfs.sh.
# Shell-sourced (KEY=VALUE). Keep it dependency-free; no arrays, no bashisms
# beyond `export`.

# Debian suite targeted for v1. Trixie is the oldstable/stable window we ride.
SUITE="trixie"

# Debian mirror. CI overrides to an internal caching proxy.
MIRROR="https://deb.debian.org/debian"

# Security mirror (applied for <suite>-security).
SECURITY_MIRROR="https://security.debian.org/debian-security"

# Architecture; v1 ships amd64 only. ARM64 plumbing stays wired.
ARCH="amd64"

# Variant: "minbase" gives us the smallest usable base. Extras are added via
# INCLUDE below.
VARIANT="minbase"

# Components enabled in /etc/apt/sources.list of the built rootfs.
COMPONENTS="main contrib non-free non-free-firmware"

# Comma-separated packages installed at debootstrap time. Everything else is
# apt-installed in the layered stage.
INCLUDE="\
ca-certificates,\
linux-image-amd64,\
systemd,\
systemd-sysv,\
systemd-timesyncd,\
dbus,\
udev,\
kmod,\
iproute2,\
iputils-ping,\
less,\
nano,\
sudo,\
openssh-server,\
curl,\
wget,\
gnupg,\
zstd,\
xz-utils,\
locales,\
tzdata"

# Additional packages installed in the layered stage (post-debootstrap),
# split out so the base tar stays small and cacheable.
LAYERED_PACKAGES="\
systemd-networkd \
systemd-resolved \
nmstate \
tpm2-tools \
tpm2-abrmd \
cryptsetup \
lvm2 \
mdadm \
smartmontools \
nvme-cli \
parted \
gdisk \
e2fsprogs \
xfsprogs \
dosfstools \
rauc \
firmware-linux \
firmware-linux-nonfree \
firmware-iwlwifi \
firmware-realtek \
intel-microcode \
amd64-microcode \
grub-efi-amd64 \
grub-pc-bin \
efibootmgr \
iptables \
nftables \
conntrack \
ethtool \
jq \
python3 \
python3-yaml \
ca-certificates"

# k3s version pulled at layered-stage build time. Pinned; Renovate bumps it.
K3S_VERSION="v1.31.3+k3s1"

# NovaNas locale defaults.
LOCALE="en_US.UTF-8"
TIMEZONE="UTC"

# Non-root operator account baked into the image. Password is unset and SSH is
# disabled by default; the first-boot wizard enrolls credentials via Keycloak.
DEFAULT_USER="novanas"
DEFAULT_UID="1000"
