# NovaNas OS image configuration for mkosi.
#
# This replaces os/mmdebstrap.conf + os/build/build-rootfs.sh. The full build
# graph is:
#
#   mkosi build      -> build/out/rootfs/        (directory tree)
#   build-images.sh  -> rootfs.img, boot.img, filesystem.squashfs, kernel.*
#   build-rauc-bundle.sh  -> novanas-<ver>.raucb
#   build-iso.sh     -> novanas-<ver>.iso
#
# The layered details (packages, skeleton tree, finalize scripts) live under
# mkosi.conf.d/ and mkosi.finalize. mkosi profiles differentiate the live-ISO
# rootfs (which ships a journald no-rate-limit drop-in for debug visibility)
# from the RAUC-bundled rootfs (which must not).

[Distribution]
Distribution=debian
Release=trixie
Mirror=https://deb.debian.org/debian
Repositories=main,contrib,non-free,non-free-firmware

[Output]
Format=directory
# The version/channel are read from env at build time (see Makefile). Image
# name stays stable so downstream tooling can find it regardless of version.
ImageId=novanas
OutputDirectory=build/out/mkosi
CacheDirectory=build/cache/mkosi

[Build]
# Finalize hook turns the bootstrapped tree into the artefacts the rest of the
# pipeline expects (squashfs, ext4, exported kernel/initrd) and injects the Go
# installer binary.
Environment=
        NOVANAS_VERSION
        NOVANAS_CHANNEL
        NOVANAS_K3S_VERSION
        NOVANAS_INSTALLER_BINARY
        NOVANAS_PROFILE

[Content]
# mkosi's own Bootable/Bootloader machinery is not used: live-boot needs a
# squashfs-wrapped rootfs on an ISO, not an ESP disk image. We extract the
# kernel + initrd from the built tree and drive grub-mkrescue ourselves.
Bootable=no
WithDocs=no
WithNetwork=yes
Locale=en_US.UTF-8
Timezone=UTC
Hostname=novanas-installer

# Profiles:
#   live   - rootfs baked into the installer ISO (includes debug drop-ins)
#   update - rootfs packed into the A/B RAUC bundle (no debug drop-ins)
# Selected via `mkosi --profile=<name> build`.
