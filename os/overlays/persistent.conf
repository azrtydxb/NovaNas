# NovaNas overlayfs layout.
#
# The rootfs is mounted read-only. Mutable paths are overlayed from the
# persistent partition (GPT partlabel=Persistent) so that operator edits and
# runtime state survive both reboots and RAUC A/B flips.
#
# This file is informational. The active wiring lives in the systemd mount
# units under `rootfs/usr/lib/systemd/system/novanas-*.mount`, copied into
# /etc/systemd/system at image build time.
#
# Layout:
#
#   /mnt/persistent/            (ext4, partlabel=Persistent, ~80 GB)
#   ├── etc/                    upper dir for /etc overlay
#   ├── etc.work/               overlayfs workdir for /etc
#   ├── var/                    upper dir for /var overlay
#   ├── var.work/               overlayfs workdir for /var
#   ├── home/                   upper dir for /home overlay (admin sessions)
#   ├── home.work/              overlayfs workdir for /home
#   ├── postgres/               bind-mounted to /var/lib/postgresql
#   ├── openbao/                bind-mounted to /opt/openbao/data (mode 0700)
#   ├── k3s/                    bind-mounted to /var/lib/rancher/k3s
#   ├── rauc/                   RAUC state + data-directory
#   ├── logs/                   bind-mounted to /var/log
#   └── novanas/                first-boot sentinel, operator config, backups
#
# Why overlayfs (not simple bind mounts): /etc and /var have a large volume of
# shipped state that must come from the image; operator + package-manager
# writes go to the upper dir so a RAUC slot flip doesn't lose them, and a
# factory reset is just an rm -rf of /mnt/persistent/etc /mnt/persistent/var.
