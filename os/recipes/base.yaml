# debos-compatible recipe for the base Debian rootfs.
# Consumed by `debos recipes/base.yaml` or, equivalently, by
# build/build-rootfs.sh --stage=base which drives mmdebstrap directly.
# The shell driver is the reference implementation; this YAML is kept as a
# portable description that downstream rebuilders can consume.

{{- $arch       := or .arch       "amd64"    -}}
{{- $suite      := or .suite      "trixie"   -}}
{{- $mirror     := or .mirror     "https://deb.debian.org/debian" -}}
{{- $version    := or .version    "0.0.0-dev" -}}
{{- $channel    := or .channel    "dev"       -}}

architecture: {{ $arch }}

actions:
  - action: debootstrap
    suite: {{ $suite }}
    components:
      - main
      - contrib
      - non-free
      - non-free-firmware
    mirror: {{ $mirror }}
    variant: minbase

  - action: apt
    packages:
      - ca-certificates
      - linux-image-amd64
      - systemd
      - systemd-sysv
      - systemd-resolved
      - systemd-timesyncd
      - systemd-networkd
      - dbus
      - udev
      - kmod
      - iproute2
      - iputils-ping
      - less
      - nano
      - sudo
      - openssh-server
      - curl
      - wget
      - gnupg
      - zstd
      - xz-utils
      - locales
      - tzdata
      - apt-transport-https

  - action: run
    description: Configure locale + timezone
    chroot: true
    command: |
      set -eu
      echo "en_US.UTF-8 UTF-8" > /etc/locale.gen
      locale-gen
      update-locale LANG=en_US.UTF-8
      ln -sf /usr/share/zoneinfo/UTC /etc/localtime

  - action: run
    description: Stamp version + channel
    chroot: false
    command: |
      set -eu
      mkdir -p "${ROOTDIR}/etc/novanas"
      echo "{{ $version }}" > "${ROOTDIR}/etc/novanas/version"
      echo "{{ $channel }}" > "${ROOTDIR}/etc/novanas/channel"

  - action: pack
    file: base-rootfs-{{ $version }}.tar
    compression: none
