# RAUC slot configuration for NovaNas.
# Referenced by both the rauc service on the appliance and the bundle tool
# during build. Partitions are located by GPT partlabel so the installer and
# RAUC agree without pulling /dev/disk names into this file.

[system]
compatible=novanas-amd64
bootloader=grub
bundle-formats=verity
data-directory=/mnt/persistent/rauc
grubenv=/boot/grub/grubenv
statusfile=/mnt/persistent/rauc/status.ini

[keyring]
path=/etc/rauc/keyring.pem

[slot.rootfs.0]
device=/dev/disk/by-partlabel/OS-A
type=ext4
bootname=A
readonly=true

[slot.rootfs.1]
device=/dev/disk/by-partlabel/OS-B
type=ext4
bootname=B
readonly=true

[slot.boot.0]
device=/dev/disk/by-partlabel/Boot
type=ext4
parent=rootfs.0

[slot.boot.1]
device=/dev/disk/by-partlabel/Boot
type=ext4
parent=rootfs.1

[slot.efi.0]
device=/dev/disk/by-partlabel/EFI
type=vfat
parent=rootfs.0
