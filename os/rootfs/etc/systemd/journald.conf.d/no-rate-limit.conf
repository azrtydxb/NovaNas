# Disable journald rate-limiting on the live-boot ISO.
#
# Default (RateLimitBurst=10000, RateLimitIntervalSec=30s) combined with a
# chatty early-boot sequence (AppArmor profile loads + mdadm + kernel
# module probes + live-boot init scripts) blows past the burst within the
# first second of systemd's run. Journald then silently drops every
# subsequent message in the 30s window. What the operator sees on the
# console is one line, then a ~30s silence, then one more line — which
# looks *exactly* like "systemd is hanging on every unit" but is actually
# "systemd is fine, journald is throttling output".
#
# On installed systems the default rate-limit is reasonable and should
# stay. This drop-in lives in the rootfs skeleton and will be copied
# onto the installed system; the installer SHOULD remove it after
# install. (TODO: installer step to delete this file.)
[Journal]
RateLimitIntervalSec=0
RateLimitBurst=0
