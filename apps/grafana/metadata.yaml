apiVersion: novanas.io/v1alpha1
kind: AppMetadata
name: grafana
displayName: Grafana
version: 11.2.2
appVersion: 11.2.2
category: observability
description: "Open observability platform."
longDescription: |
  Grafana — Open observability platform.
  Packaged for NovaNas by the NovaNas team. See upstream project for full
  documentation and support channels.
icon: icon.svg
maintainers:
  - name: NovaNas
    url: https://github.com/azrtydxb/novanas
website: https://grafana.com
source:
  - https://grafana.com
license: AGPL-3.0
requirements:
  minRamMB: 256
  minCpu: 1
  requiresGpu: false
  ports: [3000]
tags: [observability]
schema:
  type: object
  properties:
    image:
      type: object
      properties:
        tag:
          type: string
          default: "11.2.2"
          title: "Image tag"
    persistence:
      type: object
      properties:
        config:
          type: object
          properties:
            size:
              type: string
              default: "5Gi"
              title: "Config volume size"
    ingress:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        host:
          type: string
          default: "grafana.nas.local"
