apiVersion: novanas.io/v1alpha1
kind: AppMetadata
name: redis
displayName: Redis
version: 7.4.1
appVersion: 7.4.1
category: database
description: "In-memory data structure store."
longDescription: |
  Redis — In-memory data structure store.
  Packaged for NovaNas by the NovaNas team. See upstream project for full
  documentation and support channels.
icon: icon.svg
maintainers:
  - name: NovaNas
    url: https://github.com/azrtydxb/novanas
website: https://redis.io
source:
  - https://redis.io
license: BSD-3-Clause
requirements:
  minRamMB: 256
  minCpu: 1
  requiresGpu: false
  ports: [6379]
tags: [database]
schema:
  type: object
  properties:
    image:
      type: object
      properties:
        tag:
          type: string
          default: "7.4.1"
          title: "Image tag"
    persistence:
      type: object
      properties:
        config:
          type: object
          properties:
            size:
              type: string
              default: "5Gi"
              title: "Config volume size"
    ingress:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        host:
          type: string
          default: "redis.nas.local"
