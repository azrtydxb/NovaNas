apiVersion: novanas.io/v1alpha1
kind: AppMetadata
name: loki
displayName: Loki
version: 3.2.1
appVersion: 3.2.1
category: observability
description: "Horizontally-scalable log aggregation system."
longDescription: |
  Loki — Horizontally-scalable log aggregation system.
  Packaged for NovaNas by the NovaNas team. See upstream project for full
  documentation and support channels.
icon: icon.svg
maintainers:
  - name: NovaNas
    url: https://github.com/azrtydxb/novanas
website: https://grafana.com/oss/loki
source:
  - https://grafana.com/oss/loki
license: AGPL-3.0
requirements:
  minRamMB: 256
  minCpu: 1
  requiresGpu: false
  ports: [3100]
tags: [observability]
schema:
  type: object
  properties:
    image:
      type: object
      properties:
        tag:
          type: string
          default: "3.2.1"
          title: "Image tag"
    persistence:
      type: object
      properties:
        config:
          type: object
          properties:
            size:
              type: string
              default: "5Gi"
              title: "Config volume size"
    ingress:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        host:
          type: string
          default: "loki.nas.local"
