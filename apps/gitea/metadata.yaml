apiVersion: novanas.io/v1alpha1
kind: AppMetadata
name: gitea
displayName: Gitea
version: 1.22.3
appVersion: 1.22.3
category: dev
description: "Self-hosted Git service."
longDescription: |
  Gitea — Self-hosted Git service.
  Packaged for NovaNas by the NovaNas team. See upstream project for full
  documentation and support channels.
icon: icon.svg
maintainers:
  - name: NovaNas
    url: https://github.com/azrtydxb/novanas
website: https://gitea.io
source:
  - https://gitea.io
license: MIT
requirements:
  minRamMB: 512
  minCpu: 1
  requiresGpu: false
  ports: [3000]
tags: [dev]
schema:
  type: object
  properties:
    image:
      type: object
      properties:
        tag:
          type: string
          default: "1.22.3"
          title: "Image tag"
    persistence:
      type: object
      properties:
        config:
          type: object
          properties:
            size:
              type: string
              default: "5Gi"
              title: "Config volume size"
    ingress:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        host:
          type: string
          default: "gitea.nas.local"
