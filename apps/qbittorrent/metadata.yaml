apiVersion: novanas.io/v1alpha1
kind: AppMetadata
name: qbittorrent
displayName: qBittorrent
version: 5.0.1
appVersion: 5.0.1
category: arr
description: "Open-source BitTorrent client with web UI."
longDescription: |
  qBittorrent — Open-source BitTorrent client with web UI.
  Packaged for NovaNas by the NovaNas team. See upstream project for full
  documentation and support channels.
icon: icon.svg
maintainers:
  - name: NovaNas
    url: https://github.com/azrtydxb/novanas
website: https://www.qbittorrent.org
source:
  - https://www.qbittorrent.org
license: GPL-2.0
requirements:
  minRamMB: 512
  minCpu: 1
  requiresGpu: false
  ports: [8080]
tags: [arr]
schema:
  type: object
  properties:
    image:
      type: object
      properties:
        tag:
          type: string
          default: "5.0.1"
          title: "Image tag"
    persistence:
      type: object
      properties:
        config:
          type: object
          properties:
            size:
              type: string
              default: "5Gi"
              title: "Config volume size"
    ingress:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        host:
          type: string
          default: "qbittorrent.nas.local"
