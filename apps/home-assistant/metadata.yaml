apiVersion: novanas.io/v1alpha1
kind: AppMetadata
name: home-assistant
displayName: Home Assistant
version: 2024.10.3
appVersion: 2024.10.3
category: home
description: "Open source home automation."
longDescription: |
  Home Assistant — Open source home automation.
  Packaged for NovaNas by the NovaNas team. See upstream project for full
  documentation and support channels.
icon: icon.svg
maintainers:
  - name: NovaNas
    url: https://github.com/azrtydxb/novanas
website: https://www.home-assistant.io
source:
  - https://www.home-assistant.io
license: Apache-2.0
requirements:
  minRamMB: 512
  minCpu: 1
  requiresGpu: false
  ports: [8123]
tags: [home]
schema:
  type: object
  properties:
    image:
      type: object
      properties:
        tag:
          type: string
          default: "2024.10.3"
          title: "Image tag"
    persistence:
      type: object
      properties:
        config:
          type: object
          properties:
            size:
              type: string
              default: "5Gi"
              title: "Config volume size"
    ingress:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        host:
          type: string
          default: "home-assistant.nas.local"
