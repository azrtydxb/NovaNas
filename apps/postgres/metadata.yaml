apiVersion: novanas.io/v1alpha1
kind: AppMetadata
name: postgres
displayName: PostgreSQL
version: 16.4
appVersion: 16.4
category: database
description: "Powerful open-source relational database."
longDescription: |
  PostgreSQL — Powerful open-source relational database.
  Packaged for NovaNas by the NovaNas team. See upstream project for full
  documentation and support channels.
icon: icon.svg
maintainers:
  - name: NovaNas
    url: https://github.com/azrtydxb/novanas
website: https://www.postgresql.org
source:
  - https://www.postgresql.org
license: PostgreSQL
requirements:
  minRamMB: 512
  minCpu: 1
  requiresGpu: false
  ports: [5432]
tags: [database]
schema:
  type: object
  properties:
    image:
      type: object
      properties:
        tag:
          type: string
          default: "16.4"
          title: "Image tag"
    persistence:
      type: object
      properties:
        config:
          type: object
          properties:
            size:
              type: string
              default: "5Gi"
              title: "Config volume size"
    ingress:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        host:
          type: string
          default: "postgres.nas.local"
