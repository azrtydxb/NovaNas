apiVersion: novanas.io/v1alpha1
kind: AppMetadata
name: zigbee2mqtt
displayName: Zigbee2MQTT
version: 1.41.0
appVersion: 1.41.0
category: home
description: "Zigbee to MQTT bridge."
longDescription: |
  Zigbee2MQTT — Zigbee to MQTT bridge.
  Packaged for NovaNas by the NovaNas team. See upstream project for full
  documentation and support channels.
icon: icon.svg
maintainers:
  - name: NovaNas
    url: https://github.com/azrtydxb/novanas
website: https://www.zigbee2mqtt.io
source:
  - https://www.zigbee2mqtt.io
license: GPL-3.0
requirements:
  minRamMB: 128
  minCpu: 1
  requiresGpu: false
  ports: [8080]
tags: [home]
schema:
  type: object
  properties:
    image:
      type: object
      properties:
        tag:
          type: string
          default: "1.41.0"
          title: "Image tag"
    persistence:
      type: object
      properties:
        config:
          type: object
          properties:
            size:
              type: string
              default: "5Gi"
              title: "Config volume size"
    ingress:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        host:
          type: string
          default: "zigbee2mqtt.nas.local"
