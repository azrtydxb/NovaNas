apiVersion: novanas.io/v1alpha1
kind: AppMetadata
name: mongodb
displayName: MongoDB
version: 7.0.14
appVersion: 7.0.14
category: database
description: "Document-oriented NoSQL database."
longDescription: |
  MongoDB — Document-oriented NoSQL database.
  Packaged for NovaNas by the NovaNas team. See upstream project for full
  documentation and support channels.
icon: icon.svg
maintainers:
  - name: NovaNas
    url: https://github.com/azrtydxb/novanas
website: https://www.mongodb.com
source:
  - https://www.mongodb.com
license: SSPL
requirements:
  minRamMB: 512
  minCpu: 1
  requiresGpu: false
  ports: [27017]
tags: [database]
schema:
  type: object
  properties:
    image:
      type: object
      properties:
        tag:
          type: string
          default: "7.0.14"
          title: "Image tag"
    persistence:
      type: object
      properties:
        config:
          type: object
          properties:
            size:
              type: string
              default: "5Gi"
              title: "Config volume size"
    ingress:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        host:
          type: string
          default: "mongodb.nas.local"
