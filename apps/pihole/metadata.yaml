apiVersion: novanas.io/v1alpha1
kind: AppMetadata
name: pihole
displayName: Pi-hole
version: 2024.07.0
appVersion: 2024.07.0
category: networking
description: "Network-wide ad blocker."
longDescription: |
  Pi-hole — Network-wide ad blocker.
  Packaged for NovaNas by the NovaNas team. See upstream project for full
  documentation and support channels.
icon: icon.svg
maintainers:
  - name: NovaNas
    url: https://github.com/azrtydxb/novanas
website: https://pi-hole.net
source:
  - https://pi-hole.net
license: EUPL-1.2
requirements:
  minRamMB: 256
  minCpu: 1
  requiresGpu: false
  ports: [80]
tags: [networking]
schema:
  type: object
  properties:
    image:
      type: object
      properties:
        tag:
          type: string
          default: "2024.07.0"
          title: "Image tag"
    persistence:
      type: object
      properties:
        config:
          type: object
          properties:
            size:
              type: string
              default: "5Gi"
              title: "Config volume size"
    ingress:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        host:
          type: string
          default: "pihole.nas.local"
