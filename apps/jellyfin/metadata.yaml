apiVersion: novanas.io/v1alpha1
kind: AppMetadata
name: jellyfin
displayName: Jellyfin
version: 10.9.7
appVersion: 10.9.7
category: media
description: "Free software media system, a fork of Emby."
longDescription: |
  Jellyfin — Free software media system, a fork of Emby.
  Packaged for NovaNas by the NovaNas team. See upstream project for full
  documentation and support channels.
icon: icon.svg
maintainers:
  - name: NovaNas
    url: https://github.com/azrtydxb/novanas
website: https://jellyfin.org
source:
  - https://jellyfin.org
license: GPL-2.0
requirements:
  minRamMB: 1024
  minCpu: 1
  requiresGpu: false
  ports: [8096]
tags: [media]
schema:
  type: object
  properties:
    image:
      type: object
      properties:
        tag:
          type: string
          default: "10.9.7"
          title: "Image tag"
    persistence:
      type: object
      properties:
        config:
          type: object
          properties:
            size:
              type: string
              default: "5Gi"
              title: "Config volume size"
    ingress:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        host:
          type: string
          default: "jellyfin.nas.local"
