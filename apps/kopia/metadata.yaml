apiVersion: novanas.io/v1alpha1
kind: AppMetadata
name: kopia
displayName: Kopia
version: 0.17.0
appVersion: 0.17.0
category: backup
description: "Fast and secure open-source backup tool."
longDescription: |
  Kopia — Fast and secure open-source backup tool.
  Packaged for NovaNas by the NovaNas team. See upstream project for full
  documentation and support channels.
icon: icon.svg
maintainers:
  - name: NovaNas
    url: https://github.com/azrtydxb/novanas
website: https://kopia.io
source:
  - https://kopia.io
license: Apache-2.0
requirements:
  minRamMB: 256
  minCpu: 1
  requiresGpu: false
  ports: [51515]
tags: [backup]
schema:
  type: object
  properties:
    image:
      type: object
      properties:
        tag:
          type: string
          default: "0.17.0"
          title: "Image tag"
    persistence:
      type: object
      properties:
        config:
          type: object
          properties:
            size:
              type: string
              default: "5Gi"
              title: "Config volume size"
    ingress:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        host:
          type: string
          default: "kopia.nas.local"
