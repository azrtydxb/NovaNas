apiVersion: novanas.io/v1alpha1
kind: AppMetadata
name: vaultwarden
displayName: Vaultwarden
version: 1.32.1
appVersion: 1.32.1
category: utility
description: "Unofficial Bitwarden compatible server."
longDescription: |
  Vaultwarden — Unofficial Bitwarden compatible server.
  Packaged for NovaNas by the NovaNas team. See upstream project for full
  documentation and support channels.
icon: icon.svg
maintainers:
  - name: NovaNas
    url: https://github.com/azrtydxb/novanas
website: https://github.com/dani-garcia/vaultwarden
source:
  - https://github.com/dani-garcia/vaultwarden
license: AGPL-3.0
requirements:
  minRamMB: 256
  minCpu: 1
  requiresGpu: false
  ports: [80]
tags: [utility]
schema:
  type: object
  properties:
    image:
      type: object
      properties:
        tag:
          type: string
          default: "1.32.1"
          title: "Image tag"
    persistence:
      type: object
      properties:
        config:
          type: object
          properties:
            size:
              type: string
              default: "5Gi"
              title: "Config volume size"
    ingress:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        host:
          type: string
          default: "vaultwarden.nas.local"
