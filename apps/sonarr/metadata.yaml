apiVersion: novanas.io/v1alpha1
kind: AppMetadata
name: sonarr
displayName: Sonarr
version: 4.0.9
appVersion: 4.0.9
category: arr
description: "Smart PVR for newsgroup and bittorrent users."
longDescription: |
  Sonarr — Smart PVR for newsgroup and bittorrent users.
  Packaged for NovaNas by the NovaNas team. See upstream project for full
  documentation and support channels.
icon: icon.svg
maintainers:
  - name: NovaNas
    url: https://github.com/azrtydxb/novanas
website: https://sonarr.tv
source:
  - https://sonarr.tv
license: GPL-3.0
requirements:
  minRamMB: 512
  minCpu: 1
  requiresGpu: false
  ports: [8989]
tags: [arr]
schema:
  type: object
  properties:
    image:
      type: object
      properties:
        tag:
          type: string
          default: "4.0.9"
          title: "Image tag"
    persistence:
      type: object
      properties:
        config:
          type: object
          properties:
            size:
              type: string
              default: "5Gi"
              title: "Config volume size"
    ingress:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        host:
          type: string
          default: "sonarr.nas.local"
