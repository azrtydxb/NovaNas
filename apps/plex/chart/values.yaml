image:
  repository: plexinc/pms-docker
  tag: "1.40.3.8555"
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 32400

persistence:
  config:
    enabled: true
    size: 5Gi
    accessMode: ReadWriteOnce
    storageClass: ""
  data:
    enabled: false
    size: 50Gi
    accessMode: ReadWriteOnce
    storageClass: ""

resources:
  requests:
    cpu: 100m
    memory: 2048Mi
  limits:
    memory: 4096Mi

ingress:
  enabled: true
  className: novaedge
  host: plex.nas.local
  tls:
    enabled: true
    secretName: plex-tls

env: {}
envFrom: []

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

podSecurityContext: {}

probes:
  liveness:
    enabled: true
    path: /
    initialDelaySeconds: 30
    periodSeconds: 30
  readiness:
    enabled: true
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
