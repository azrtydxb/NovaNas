apiVersion: novanas.io/v1alpha1
kind: AppMetadata
name: mysql
displayName: MySQL
version: 8.4.2
appVersion: 8.4.2
category: database
description: "Popular open-source relational database."
longDescription: |
  MySQL — Popular open-source relational database.
  Packaged for NovaNas by the NovaNas team. See upstream project for full
  documentation and support channels.
icon: icon.svg
maintainers:
  - name: NovaNas
    url: https://github.com/azrtydxb/novanas
website: https://www.mysql.com
source:
  - https://www.mysql.com
license: GPL-2.0
requirements:
  minRamMB: 512
  minCpu: 1
  requiresGpu: false
  ports: [3306]
tags: [database]
schema:
  type: object
  properties:
    image:
      type: object
      properties:
        tag:
          type: string
          default: "8.4.2"
          title: "Image tag"
    persistence:
      type: object
      properties:
        config:
          type: object
          properties:
            size:
              type: string
              default: "5Gi"
              title: "Config volume size"
    ingress:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        host:
          type: string
          default: "mysql.nas.local"
