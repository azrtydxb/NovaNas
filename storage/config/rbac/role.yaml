---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: novanas-storage-controller-role
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - persistentvolumes
  - secrets
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - novanas.io
  resources:
  - backendassignments
  - blockvolumes
  - objectstores
  - sharedfilesystems
  - storagepools
  - storagequotas
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - novanas.io
  resources:
  - backendassignments/status
  - blockvolumes/status
  - objectstores/status
  - sharedfilesystems/status
  - storagepools/status
  - storagequotas/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - novanas.io
  resources:
  - blockvolumes/finalizers
  - objectstores/finalizers
  - sharedfilesystems/finalizers
  - storagepools/finalizers
  verbs:
  - update
